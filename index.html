        function startTaskDetailEdit(ticketId, event) {
            event?.stopPropagation?.();
            const ticketState = getTaskDetailById(ticketId);
            if (!ticketState) return;
            taskDetailEditDraft = buildTaskDetailEditDraft(ticketState);
            renderTaskDetailsDrawer();
        }

        function cancelTaskDetailEdit(event) {
            event?.stopPropagation?.();
            taskDetailEditDraft = null;
            renderTaskDetailsDrawer({ animate: true });
        }

        function toggleTaskDetailEditPic(btn) {
            btn.classList.toggle('po-tag-active');
        }

        function saveTaskDetailEdit(event) {
            event?.stopPropagation?.();
            if (!taskDetailEditDraft?.ticket_id) return;

            const titleInput = document.getElementById('taskDetailEditTitle');
            const descInput = document.getElementById('taskDetailEditDesc');
            const noteInput = document.getElementById('taskDetailEditNote');
            const dateInput = document.getElementById('taskDetailEditDate');
            const isPersonalInput = document.getElementById('taskDetailEditIsPersonal');
            if (!titleInput || !descInput || !noteInput || !dateInput || !isPersonalInput) return;

            const title = titleInput.value.trim();
            if (!title) {
                titleInput.classList.add('input-error');
                titleInput.placeholder = 'Tiêu đề không được để trống!';
                titleInput.focus();
                setTimeout(() => titleInput.classList.remove('input-error'), 400);
                return;
            }

            const previousState = getTaskDetailById(taskDetailEditDraft.ticket_id);
            if (!previousState) return;

            const isPersonal = isPersonalInput.value === 'true';
            const selectedKeys = Array.from(document.querySelectorAll('#taskDetailsDrawerRoot [data-pic].po-tag-active'))
                .map((el) => el.dataset.pic)
                .filter((userKey) => userKey && USERS[userKey]);
            const assignees = isPersonal ? [] : buildAssigneeRecordsFromUserKeys(selectedKeys, previousState.assignees || []);
            const nextState = normalizeTicketState({
                ticket_id: previousState.ticket_id,
                title,
                desc: descInput.value.trim(),
                note: noteInput.value.trim(),
                date_raw: dateInput.value,
                is_personal: isPersonal,
                assignees,
                checklist: previousState.checklist || [],
                documents: previousState.documents || [],
                comments: previousState.comments || []
            });

            updateBoardTicket(nextState.ticket_id, nextState);
            saveBoardState();
            taskDetailEditDraft = null;
            renderBoardTickets();
            renderTaskDetailsDrawer();
        }

        function editTaskFromDrawer(ticketId, event) {
            startTaskDetailEdit(ticketId, event);
        }

        function normalizeTicketState(state) {
            if (!state) return null;

            const isPersonal = state.is_personal === true || state.isPersonal === true || state.is_personal === 'true' || state.isPersonal === 'true';
            const assignees = isPersonal
                ? []
                : (Array.isArray(state.assignees) ? state.assignees.map((record) => normalizeAssigneeRecord(record)).filter(Boolean) : []);

            return {
                ticket_id: state.ticket_id || state.ticketId || '',
                title: state.title || '',
                desc: state.desc || '',
                note: state.note || state.progress_note || state.progressNote || '',
                date_raw: state.date_raw || state.dateRaw || '',
                is_personal: isPersonal,
                assignees,
                checklist: Array.isArray(state.checklist) ? state.checklist.map((item, index) => normalizeChecklistItem(item, index)).filter(Boolean) : [],
                documents: Array.isArray(state.documents) ? state.documents.map((item, index) => normalizeTaskDocumentItem(item, index)).filter(Boolean) : [],
                comments: Array.isArray(state.comments) ? state.comments.map((item, index) => normalizeTaskCommentItem(item, index)).filter(Boolean) : []
            };
        }

        function getCardState(card) {
            if (!card) return null;

            if (card.dataset.ticketState) {
                try {
                    const parsedState = JSON.parse(card.dataset.ticketState);
                    const normalizedState = normalizeTicketState(parsedState);
                    if (normalizedState) return normalizedState;
                } catch (error) {
                }
            }

            const titleEl = card.querySelector('.task-title');
            const descEl = card.querySelector('.task-desc');
            const noteEl = card.querySelector('.task-note-text');
            const dateLabelEl = card.querySelector('.task-date-label');
            let dateRaw = '';
            if (dateLabelEl) {
                const dateText = dateLabelEl.textContent.trim();
                if (dateText && dateText !== 'Chưa có hạn') {
                    const parts = dateText.split('/');
                    if (parts.length === 3) dateRaw = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
            }

            return normalizeTicketState({
                ticket_id: card.dataset.ticketId || '',
                title: titleEl ? titleEl.innerText.replace(/^\d+\.\s/, '') : '',
                desc: descEl ? descEl.innerText : '',
                note: noteEl ? noteEl.innerText : '',
                date_raw: dateRaw,
                is_personal: card.dataset.isPersonal === 'true',
                assignees: getCardAssignees(card)
            });
        }

        function setCardState(card, state) {
            const normalizedState = normalizeTicketState(state);
            if (!card || !normalizedState) return;

            card.dataset.ticketId = normalizedState.ticket_id;
            card.dataset.isPersonal = normalizedState.is_personal ? 'true' : 'false';
            card.dataset.ticketState = JSON.stringify(normalizedState);
            setCardAssignees(card, normalizedState.assignees);
        }

        function renderTaskCardInnerHtml(state) {
            const normalizedState = normalizeTicketState(state);
            if (!normalizedState) return '';

            const { dateStr, statusTextHtml } = getTaskDateMeta(normalizedState.date_raw);
            const picsHtml = normalizedState.is_personal
                ? `<div class="w-3 h-3 rounded-full bg-orange-500 border-2 border-white shadow-sm ring-1 ring-orange-200" title="Task Cá nhân"></div>`
                : renderAssigneeTags(normalizedState.assignees);
            const noteHtml = normalizedState.note
                ? `
                <div class="task-card-note-shell">
                    <div class="task-card-note-chip">
                        <span class="task-card-note-label"><i class="fa-regular fa-note-sticky"></i> Note</span>
                        <p class="task-note-text">${normalizedState.note}</p>
                    </div>
                </div>`

            return `
<div class="card-actions-wrap">

                            <svg class="trash-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            <span class="delete-text">Xóa</span>

                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>
                </div>
                <h4 class="task-title font-semibold text-[16px] text-blue-950 group-hover:text-blue-600 transition-colors mb-2 leading-tight pr-8">${normalizedState.title}</h4>
                <p class="task-desc text-[12px] text-slate-500 leading-relaxed ${normalizedState.desc ? 'mb-4' : 'hidden'}">${normalizedState.desc}</p>
                <div class="flex justify-between items-start pt-3 border-t border-slate-100">
                    <div class="flex flex-col gap-0.5">
                        <div class="flex items-center gap-1.5 text-[12px] font-semibold text-slate-400">
                            <i class="fa-regular fa-calendar"></i> <span class="task-date-label">${dateStr}</span>
                        </div>
                        ${statusTextHtml}
                    </div>

                        ${picsHtml}

                </div>
                ${noteHtml}

        function renderTaskCard(card, state) {
            if (!card) return;
            setCardState(card, state);
            card.innerHTML = renderTaskCardInnerHtml(state);
        }

        function createTaskCardElement(state) {
            const card = document.createElement('div');
            card.className = 'task-card animate-in relative bg-white p-4 rounded-xl border border-blue-400 shadow-md hover:shadow-lg transition-all group animate-[fadeIn_0.3s_ease-out]';
            card.setAttribute('onclick', 'openTaskDetailsFromCard(this, event)');
            renderTaskCard(card, state);
            return card;
        }

        function renderBoardTickets() {
            document.querySelectorAll('.kanban-list .task-card').forEach((card) => card.remove());

            const boardUserKey = getBoardTrackingUserKey();
            const visibleTickets = boardTickets.filter((ticketState) => {
                if (ticketState.is_personal) {
                    return boardUserKey === CURRENT_USER_ID;
                }
                return !!getTicketAssignee(ticketState, boardUserKey);
            });

            visibleTickets.forEach((ticketState) => {
                const stateCode = ticketState.is_personal
                    ? getDefaultStateCode().stateCode
                    : getTicketWorkflowState(ticketState, boardUserKey);
                const columnEl = document.getElementById(getStateColumnId(stateCode));
                if (!columnEl) return;
                columnEl.appendChild(createTaskCardElement(ticketState));
            });

            updateCounts();
            syncTaskDetailsDrawer();
        }

        function cycleAssigneeStatus(tag, event) {
            if (event) event.stopPropagation();
            const card = tag.closest('.task-card');
            const userKey = normalizeUserKey(tag.dataset.userKey);
            if (!card || !userKey) return;

            const ticketState = getCardState(card);
            if (!ticketState || ticketState.is_personal) return;

            const updatedAssignees = ticketState.assignees.map((record) => {
                if (record.user_key !== userKey) return record;
                const currentIndex = ASSIGNEE_STATUS_FLOW.indexOf(record.status);
                const nextStatus = ASSIGNEE_STATUS_FLOW[(currentIndex + 1) % ASSIGNEE_STATUS_FLOW.length];
                return { ...record, status: nextStatus };
            });

            updateBoardTicket(ticketState.ticket_id, {
                ...ticketState,
                assignees: updatedAssignees
            });
            renderBoardTickets();
            saveBoardState();
        }

        function generateTicketId() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const currentDateStr = `${yyyy}${mm}${dd}`;

            let storedDate = localStorage.getItem('ticket_date');
            let counter = parseInt(localStorage.getItem('ticket_counter') || '0');

            if (storedDate !== currentDateStr) {
                storedDate = currentDateStr;
                counter = 1;
            } else {
                counter++;
            }

            localStorage.setItem('ticket_date', storedDate);
            localStorage.setItem('ticket_counter', counter.toString());

            const counterStr = String(counter).padStart(4, '0');
            return `${currentDateStr}${counterStr}`;
        }

        function syncTagNames() {
            boardTickets = boardTickets.map((ticketState) => normalizeTicketState(ticketState)).filter(Boolean);
            renderBoardTickets();
        }

        // ==========================================
        // 1. HỆ THỐNG LƯU TRỮ (LOCAL STORAGE)
        // ==========================================
        function updateCounts() {
            KANBAN_STATES.forEach(state => {
                const countEl = document.getElementById(getStateCountId(state.stateCode));
                const columnEl = document.getElementById(getStateColumnId(state.stateCode));
                if (countEl && columnEl) {
                    countEl.innerText = Array.from(columnEl.querySelectorAll('.task-card'))
                        .filter((card) => card.style.display !== 'none').length;
                }
            });
        }

        function saveBoardState() {
            localStorage.setItem(BOARD_STORAGE_KEY, JSON.stringify(boardTickets));
            refreshTrackingSidebarAndBoard();
            syncTaskDetailsDrawer();
        }

        function loadLegacyBoardState() {
            const legacyState = {};
            let hasLegacyData = false;

            KANBAN_STATES.forEach(state => {
                if (!state.legacyStorageKey) return;
                const raw = localStorage.getItem(state.legacyStorageKey);
                if (!raw) return;

                try {
                    legacyState[state.stateCode] = JSON.parse(raw) || [];
                    hasLegacyData = true;
                } catch (error) {
                    legacyState[state.stateCode] = [];
                }
            });

            return hasLegacyData ? legacyState : null;
        }

        function loadBoardState() {
            let boardState = null;
            let loadedFromLegacyStorage = false;

            try {
                boardState = JSON.parse(localStorage.getItem(BOARD_STORAGE_KEY));
            } catch (error) {
                boardState = null;
            }

            if (!boardState || typeof boardState !== 'object') {
                boardState = loadLegacyBoardState();
                loadedFromLegacyStorage = !!boardState;
            }

            boardTickets = [];
            if (Array.isArray(boardState)) {
                boardTickets = boardState.map((ticketState) => normalizeTicketState(ticketState)).filter(Boolean);
            } else if (boardState && typeof boardState === 'object') {
                KANBAN_STATES.forEach((state) => {
                    const tasks = Array.isArray(boardState[state.stateCode]) ? boardState[state.stateCode] : [];
                    tasks.forEach((html) => {
                        const template = document.createElement('template');
                        template.innerHTML = html.trim();
                        const card = template.content.firstElementChild;
                        if (!card) return;
                        const ticketState = getCardState(card);
                        if (!ticketState) return;
                        const migratedTicketState = {
                            ...ticketState,
                            assignees: (ticketState.assignees || []).map((record) => ({
                                ...record,
                                workflow_state: state.stateCode
                            }))
                        };
                        boardTickets.push(normalizeTicketState(migratedTicketState));
                    });
                });
            }

            renderInlinePicSelection();
            syncTagNames();
            refreshTrackingSidebarAndBoard();

            if (loadedFromLegacyStorage) {
                saveBoardState();
            }
        }

        // ==========================================
        // 2. KÉO THẢ TASK (SORTABLE)
        // ==========================================
        const sortableConfig = {
            group: 'shared-tasks',
            animation: 200,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            easing: "cubic-bezier(0.25, 1, 0.5, 1)",
            onEnd: function (evt) {
                const card = evt.item;
                const ticketId = card?.dataset.ticketId;
                const targetStateCode = evt.to?.closest('.kanban-column')?.dataset.stateCode;
                const boardUserKey = getBoardTrackingUserKey();

                if (ticketId && targetStateCode && boardUserKey) {
                    updateBoardTicket(ticketId, (ticketState) => setTicketWorkflowState(ticketState, boardUserKey, targetStateCode));
                }

                renderBoardTickets();
                saveBoardState();
            }
        };

        function initSortableColumns() {
            sortableInstances.forEach(instance => instance.destroy());
            sortableInstances = KANBAN_STATES
                .map(state => document.getElementById(getStateColumnId(state.stateCode)))
                .filter(Boolean)
                .map(columnEl => new Sortable(columnEl, sortableConfig));
        }

        // ==========================================
        // 3. THÊM TASK MỚI (INLINE ADD)
        // ==========================================
        let inlineSelectedPICs = [];

function openInlineForm() {
            const form = document.getElementById('inlineAddForm');
            form.classList.remove('hidden');
            document.getElementById('inlineTitle').focus();

            const dateWrapper = document.getElementById('inlineDateWrapper');
            initCustomDatePicker(dateWrapper);

            // 1. Logic Ngày mặc định = Today
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const hiddenInput = dateWrapper.querySelector('.hidden-date-input');
            const triggerText = dateWrapper.querySelector('.dp-text');
            hiddenInput.value = `${yyyy}-${mm}-${dd}`;
            triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> ${dd}/${mm}/${yyyy}`;
            triggerText.style.color = 'var(--po-text-main)';

            // 2. Kích hoạt Dropdown Privacy
            const privacySelect = document.getElementById('inlinePrivacyWrapper');
            initCustomSelect(privacySelect);

            // 3. LOGIC DEFAULT PIC = Hiếu Phan
            // Reset danh sách chọn cũ

        function saveEditedTask(btn) {
            const card = btn.closest('.task-card');
            const title = card.querySelector('.edit-title').value.trim();
            const desc = card.querySelector('.edit-desc').value.trim();
            const note = card.querySelector('.edit-note').value.trim();

                setTimeout(() => editInput.classList.remove('input-error'), 400);
                return;

            const previousState = getCardState(card);
            const dateRaw = card.querySelector('.edit-date').value;

            // Đọc Select Value thay vì Checkbox
            const isPersonal = card.querySelector('.edit-is-personal').value === 'true';
            const picEls = card.querySelectorAll('.po-tag-active');
            const selectedKeys = Array.from(picEls).map((el) => el.dataset.pic);
            const assignees = isPersonal ? [] : buildAssigneeRecordsFromUserKeys(selectedKeys, previousState?.assignees || []);
            const nextState = normalizeTicketState({
                ticket_id: previousState?.ticket_id || card.dataset.ticketId || '',

                desc,
                note,
                date_raw: dateRaw,
                is_personal: isPersonal,
                assignees,
                checklist: previousState?.checklist || [],
                documents: previousState?.documents || [],
                comments: previousState?.comments || []
            });

            updateBoardTicket(nextState.ticket_id, nextState);
            renderBoardTickets();
            saveBoardState();

// ==========================================

        function confirmDelete(btn, event) {
            event.stopPropagation(); // Ngăn sự kiện click lan ra ngoài
            
            if (!btn.classList.contains('confirm-mode')) {
                // Tắt các nút xóa khác đang mở (nếu có)
                document.querySelectorAll('.delete-btn.confirm-mode').forEach(b => {
                    if (b !== btn) b.classList.remove('confirm-mode');
                });
                // Chuyển sang chế độ xác nhận (Nút đỏ)
                btn.classList.add('confirm-mode');
            } else {
                // Bấm lần 2 -> Thực hiện xóa
                const card = btn.closest('.task-card');
                const ticketId = card?.dataset.ticketId;
                card.classList.add('deleting'); // Chạy CSS thu nhỏ, mờ đi
                
                setTimeout(() => {
                    boardTickets = boardTickets.filter((ticketState) => ticketState.ticket_id !== ticketId);
                    renderBoardTickets();
                    saveBoardState(); // Lưu vào DB / LocalStorage
                }, 300); // Đợi 300ms cho animation chạy xong
            }
        }

        function getBranchConfig(branchKey) { return branchConfigs[branchKey]; }
        function getBranchState(branchKey) { return branchState[branchKey]; }

        function loadBranchPages(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const savedPages = localStorage.getItem(config.storageKey);
            if (savedPages) {
                try {
                    const parsedPages = JSON.parse(savedPages);
                    if (Array.isArray(parsedPages) && parsedPages.length > 0) {
                        state.pages = parsedPages;
                        return;
                    }
                } catch (error) {
                }
            }
            state.pages = config.defaultPages.map((page) => ({ ...page }));
        }

        function saveBranchPages(branchKey) {
            const config = getBranchConfig(branchKey);
            localStorage.setItem(config.storageKey, JSON.stringify(getBranchState(branchKey).pages));
        }

        function syncBranchMenuHeight(branchKey) {
            const config = getBranchConfig(branchKey);
            if (accordionState[config.menuId] && !isSidebarCollapsed) {
                const menu = document.getElementById(config.menuId);
                menu.style.maxHeight = menu.scrollHeight + 'px';
            }
        }

        function clearBranchInvalidState(branchKey, mode) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const input = mode === 'create' ? document.getElementById(config.createInputId) : document.querySelector(`.${branchKey}-edit-input`);
            if (input) input.classList.remove('is-invalid');
            if (state.invalidTimeouts[mode]) {
                clearTimeout(state.invalidTimeouts[mode]);
                state.invalidTimeouts[mode] = null;
            }
        }

        function showBranchInvalidInputState(branchKey, mode, input) {
            const state = getBranchState(branchKey);
            clearBranchInvalidState(branchKey, mode);
            input.classList.remove('is-invalid');
            void input.offsetWidth;
            input.classList.add('is-invalid');
            input.focus();
            state.invalidTimeouts[mode] = setTimeout(() => {
                input.classList.remove('is-invalid');
                state.invalidTimeouts[mode] = null;
            }, 700);
        }

        function animateBranchRowExit(branchKey, pageId, className, callback, duration = 220) {
            const config = getBranchConfig(branchKey);
            const row = document.querySelector(`[${config.rowAttr}="${pageId}"]`);
            if (!row) {
                callback();
                return;
            }
            row.style.maxHeight = row.offsetHeight + 'px';
            row.style.marginTop = '0px';
            row.style.marginBottom = '0px';
            requestAnimationFrame(() => row.classList.add(className));
            setTimeout(callback, duration);
        }

            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const list = document.getElementById(config.listId);

            list.innerHTML = state.pages.map((page, index) => {

                return `
                    <div class="${rowClass}" ${config.rowAttr}="${page.id}">
                        <a href="#" class="${activeClass}" data-member-group="${config.memberGroup}" data-page-id="${page.id}">

                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button type="button" class="${deleteButtonClass}" data-page-id="${page.id}" aria-label="Xóa page">
                                <span class="document-delete-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16" />

                    </div>

            }).join('');

            document.querySelectorAll(`.${branchKey}-edit-btn`).forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    startEditBranchPage(branchKey, button.dataset.pageId);
                });

            document.querySelectorAll(`.${branchKey}-delete-toggle`).forEach((button) => {
                button.addEventListener('click', (event) => {

                        event.preventDefault();
                        saveEditedBranchPage(branchKey, input.dataset.pageId);
                    }
                    if (event.key === 'Escape') {
                        event.preventDefault();
                        cancelEditBranchPage(branchKey);
                    }
                });
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 0);
            });

            initializeSelectableMembers();
            syncBranchMenuHeight(branchKey);
        }

        function openBranchCreateForm(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const createForm = document.getElementById(config.createFormId);
            const createInput = document.getElementById(config.createInputId);
            state.editingId = null;
            state.deleteConfirmId = null;
            createForm.classList.remove('hidden');
            createInput.value = '';
            clearBranchInvalidState(branchKey, 'create');
            if (!accordionState[config.menuId]) toggleAccordion(config.menuId, config.chevronId);
            syncBranchMenuHeight(branchKey);
            setTimeout(() => createInput.focus(), 0);
        }

        function closeBranchCreateForm(branchKey) {
            const config = getBranchConfig(branchKey);
            document.getElementById(config.createFormId).classList.add('hidden');
            document.getElementById(config.createInputId).value = '';
            clearBranchInvalidState(branchKey, 'create');
            syncBranchMenuHeight(branchKey);
        }

        function createBranchPage(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const createInput = document.getElementById(config.createInputId);
            const trimmedName = createInput.value.trim();
            if (!trimmedName) {
                showBranchInvalidInputState(branchKey, 'create', createInput);
                return;
            }
            const newPage = { id: `${config.pageIdPrefix}-${Date.now()}`, name: trimmedName };
            state.pages.push(newPage);
            state.activeId = newPage.id;
            state.animatingId = newPage.id;
            saveBranchPages(branchKey);
            closeBranchCreateForm(branchKey);
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function startEditBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            closeBranchCreateForm(branchKey);
            state.deleteConfirmId = null;
            animateBranchRowExit(branchKey, pageId, 'is-edit-transitioning', () => {
                state.editingId = pageId;
                renderBranchPages(branchKey);
            });
        }

        function cancelEditBranchPage(branchKey) {
            const state = getBranchState(branchKey);
            const pageId = state.editingId;
            state.editingId = null;
            state.animatingId = pageId;
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function saveEditedBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            const page = state.pages.find((item) => item.id === pageId);
            const editInput = document.querySelector(`.${branchKey}-edit-input[data-page-id="${pageId}"]`);
            if (!page || !editInput) return;
            const trimmedName = editInput.value.trim();
            if (!trimmedName) {
                showBranchInvalidInputState(branchKey, 'edit', editInput);
                return;
            }
            page.name = trimmedName;
            state.editingId = null;
            state.animatingId = pageId;
            saveBranchPages(branchKey);
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function deleteBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            state.deleteConfirmId = null;
            state.removingId = pageId;
            animateBranchRowExit(branchKey, pageId, 'is-removing', () => {
                state.pages = state.pages.filter((item) => item.id !== pageId);
                if (state.activeId === pageId) state.activeId = state.pages[0]?.id || null;
                if (state.editingId === pageId) state.editingId = null;
                state.removingId = null;
                saveBranchPages(branchKey);
                renderBranchPages(branchKey);
            }, 300);
        }

        function renderTrackingList(teamKey) {
            const trackingList = document.getElementById('trackingList');
            const members = getSortedTrackingUsers(getUsersByTeamCode(teamKey));

            if (!members.length) {
                activeTrackingUserKey = null;
                trackingList.innerHTML = '<li class="pl-4 py-2 text-xs text-slate-400">Không có user trong team</li>';
                syncActiveNavState();
                return;
            }

            activeTrackingUserKey = getPreferredTrackingUserKey(members);

            trackingList.innerHTML = members.map((userKey, index) => {
                const user = USERS[userKey];
                const isLoggedInUser = userKey === CURRENT_USER_ID;
                const isSelected = userKey === activeTrackingUserKey;
                const currentIndexClass = isLoggedInUser ? 'member-index member-index-current' : 'member-index';
                const activeClass = isSelected ? 'member-link is-active' : 'member-link';
                const previousUser = index > 0 ? USERS[members[index - 1]] : null;
                const shouldRenderDivider = !previousUser || previousUser.job_title_id !== user.job_title_id;
                return `
                    ${shouldRenderDivider ? `<li class="member-group-divider">${getJobTitleName(user.job_title_id)}</li>` : ''}
                    <li>
                        <a href="#" class="${activeClass}" data-member-group="tracking" data-tracking-current="${isLoggedInUser ? 'true' : 'false'}" data-user-key="${userKey}">
                            <span class="${currentIndexClass}">${index + 1}</span>
                            <span class="member-name">${user.full_name}</span>
                            <span class="member-count">${getTaskCountForUser(userKey)}</span>
                        </a>
                    </li>
                `;
            }).join('');
            if (accordionState.trackingMenu && !isSidebarCollapsed) {
                const trackingMenu = document.getElementById('trackingMenu');
                trackingMenu.style.maxHeight = trackingMenu.scrollHeight + 'px';
            }
            initializeSelectableMembers();
        }

            const savedTeam = localStorage.getItem(TEAM_STORAGE_KEY);

        function clearNavActiveStates() {
            document.querySelectorAll('[data-nav-target], [data-nav-link]').forEach((item) => {
                item.classList.remove('is-active');
                item.classList.remove('is-parent-active');
            });
        }

        function clearMemberActiveStates() {
            document.querySelectorAll('.member-link[data-member-group]').forEach((item) => item.classList.remove('is-active'));
        }

        function syncActiveNavState() {
            clearNavActiveStates();
            const activeMember = document.querySelector('.member-link[data-member-group].is-active');
            if (activeMember) {
                const menuId = { tracking: 'trackingMenu', document: 'documentMenu', guide: 'guideMenu' }[activeMember.dataset.memberGroup];
                const navItem = document.querySelector(`[data-nav-target="${menuId}"]`);
                if (navItem) navItem.classList.add('is-active');
                return;
            }
            if (preferredNavLink) {
                const navLink = document.querySelector(`[data-nav-link="${preferredNavLink}"]`);
                if (navLink) navLink.classList.add('is-active');
                return;
            }
            if (preferredNavTarget) {
                const navItem = document.querySelector(`[data-nav-target="${preferredNavTarget}"]`);
                if (navItem) navItem.classList.add('is-active');
            }
        }

        function setActiveNavByMenu(menuId) {
            preferredNavTarget = menuId;
            preferredNavLink = null;
            setWorkspaceView("board");
            syncActiveNavState();
        }

        function setActiveNavByLink(navLink) {
            preferredNavLink = navLink;
            preferredNavTarget = null;
            setWorkspaceView(navLink === "admin" ? "admin" : "board");
            syncActiveNavState();
        }

        function setActiveChildLink(link) {
            clearMemberActiveStates();
            link.classList.add('is-active');
            if (link.dataset.memberGroup === 'tracking') {
                activeTrackingUserKey = normalizeUserKey(link.dataset.userKey) || null;
                applyBoardFilter();
            }
            setWorkspaceView("board");
            if (link.dataset.memberGroup === 'document') getBranchState('document').activeId = link.dataset.pageId || null;
            if (link.dataset.memberGroup === 'guide') getBranchState('guide').activeId = link.dataset.pageId || null;
            syncActiveNavState();
        }

        function initializeSelectableMembers() {
            document.querySelectorAll('.member-link[data-member-group]').forEach((link) => {
                if (link.dataset.activeBound === 'true') return;
                link.dataset.activeBound = 'true';
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    setActiveChildLink(link);
                });
            });
            syncActiveNavState();
        }

        function initializeSelectableNav() {
            document.querySelectorAll('[data-nav-target]').forEach((button) => {
                button.addEventListener('click', () => setActiveNavByMenu(button.dataset.navTarget));
            });
            document.querySelectorAll('.nav-item-branch').forEach((branchItem) => {
                branchItem.addEventListener('click', (event) => {
                    if (!isSidebarCollapsed) return;
                    const menuId = branchItem.dataset.menuId;
                    const chevronId = branchItem.dataset.chevronId;
                    if (!menuId || !chevronId) return;
                    event.preventDefault();
                    event.stopPropagation();
                    toggleSidebar();
                    setActiveNavByMenu(menuId);
                    if (!accordionState[menuId]) toggleAccordion(menuId, chevronId);
                });
            });
            document.querySelectorAll('[data-nav-link]').forEach((link) => {
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    if (isSidebarCollapsed) toggleSidebar();
                    clearMemberActiveStates();
                    setActiveNavByLink(link.dataset.navLink);
                });
            });
        }

            if (!profileCard) return;
            profileCard.addEventListener('click', (event) => {

                const currentTrackingLink = document.querySelector('.member-link[data-member-group="tracking"][data-tracking-current="true"]')

                clearMemberActiveStates();

        function initializeCurrentUserProfile() {
            const currentUser = USERS[CURRENT_USER_ID];
            if (!currentUser) return;

            const avatar = document.getElementById('profileAvatar');
            const name = document.getElementById('profileName');
            const title = document.getElementById('profileTitle');

            if (avatar) {
                const initials = currentUser.full_name
                    .split(/\s+/)
                    .filter(Boolean)
                    .slice(0, 2)
                    .map((part) => part[0]?.toUpperCase() || '')
                    .join('');
                avatar.textContent = initials || 'US';
            }

            if (name) {
                name.textContent = currentUser.full_name;
            }

            if (title) {
                const roles = getEffectiveRoles(CURRENT_USER_ID, getCurrentTeamCode());
                title.textContent = `${getJobTitleName(currentUser.job_title_id)} / ${roles.join(', ') || 'USER'}`;
            }

        function toggleAccordion(menuId, chevronId) {
            if (isSidebarCollapsed) toggleSidebar();
            const menu = document.getElementById(menuId);
            const chevron = document.getElementById(chevronId);
            if (!accordionState[menuId]) {
                menu.style.maxHeight = menu.scrollHeight + 'px';
                chevron.style.transform = 'rotate(180deg)';
                accordionState[menuId] = true;
            } else {
                menu.style.maxHeight = '0px';
                chevron.style.transform = 'rotate(0deg)';
                accordionState[menuId] = false;
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('sidebarToggleIcon');
            isSidebarCollapsed = !isSidebarCollapsed;
            sidebar.classList.toggle('collapsed', isSidebarCollapsed);
            icon.style.transform = isSidebarCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
            if (isSidebarCollapsed) {
                setTeamDropdownOpen(false);
                Object.keys(accordionState).forEach((menuId) => {
                    const menu = document.getElementById(menuId);
                    const chevronId = menuId === 'trackingMenu' ? 'trackingChevron' : menuId === 'documentMenu' ? 'documentChevron' : 'guideChevron';
                    document.getElementById(chevronId).style.transform = 'rotate(0deg)';
                    menu.style.maxHeight = '0px';
                });
            } else {
                Object.keys(accordionState).forEach((menuId) => {
                    if (accordionState[menuId]) {
                        const menu = document.getElementById(menuId);
                        const chevronId = menuId === 'trackingMenu' ? 'trackingChevron' : menuId === 'documentMenu' ? 'documentChevron' : 'guideChevron';
                        document.getElementById(chevronId).style.transform = 'rotate(180deg)';
                        menu.style.maxHeight = menu.scrollHeight + 'px';
                    }
                });
            }
        }

        function getTeamCodeMeta(teamId) {
            const team = getSeedTeamById(teamId);
            if (!team) return { prefix: '', full: '' };
            const department = getSeedDepartmentById(team.department_id);
            const block = department ? getSeedBlockById(department.block_id) : null;
            const prefix = [block?.code, department?.code].filter(Boolean).join('.');
            return {
                prefix,
                full: [prefix, team.code].filter(Boolean).join('.')
            };

        function getOrgEntityCodeMeta(selection) {
            if (!selection?.entity) return { label: '', full: '', prefix: '', suffix: '' };
            if (selection.type === 'block') {
                return {
                    label: 'Mã khối',
                    full: selection.entity.code || '',
                    prefix: '',
                    suffix: selection.entity.code || ''
                };
            }

            if (selection.type === 'department') {
                const blockCode = getSeedBlockById(selection.entity.block_id)?.code || '';
                const prefix = blockCode ? `${blockCode}.` : '';
                return {
                    label: 'Mã phòng hiển thị',
                    full: getDepartmentFullCode(selection.entity.id),
                    prefix,
                    suffix: selection.entity.code || ''
                };
            }

            const draftDepartment = getSeedDepartmentById(selection.entity.department_id);
            const draftBlock = draftDepartment ? getSeedBlockById(draftDepartment.block_id) : null;
            const draftPrefix = [draftBlock?.code, draftDepartment?.code].filter(Boolean).join('.');
            const teamMeta = selection.entity.id && !String(selection.entity.id).startsWith('draft_')
                ? getTeamCodeMeta(selection.entity.id)
                : {
                    prefix: draftPrefix,
                    full: [draftPrefix, selection.entity.code || ''].filter(Boolean).join('.')
                };
            return {
                label: 'Mã nhóm hiển thị',
                full: teamMeta.full,
                prefix: teamMeta.prefix ? `${teamMeta.prefix}.` : '',
                suffix: selection.entity.code || ''
            };
        }

        function saveMemberForm() {
            const userId = document.getElementById('memberUserId')?.value;
            const fullName = document.getElementById('memberFullName');
            const username = document.getElementById('memberUsername');
            const email = document.getElementById('memberEmail');
            const jobTitleId = document.getElementById('memberJobTitleId');
            const teamId = document.getElementById('memberTeamId');
            const roleId = document.getElementById('memberRoleId');
            const color = document.getElementById('memberColor');
            const sortOrder = document.getElementById('memberSortOrder');
            const active = document.getElementById('memberActive');
            const isCreatingMember = !currentMemberEditId;
            const trimmedFullName = fullName?.value.trim() || '';
            const trimmedUsername = username?.value.trim() || '';
            const trimmedEmail = email?.value.trim() || '';
            let user = isCreatingMember ? null : getSeedUserById(userId);

            clearCreateMemberValidation();
            if (isCreatingMember) {
                const invalidFields = [];
                if (!trimmedFullName) invalidFields.push('fullName');
                if (!trimmedUsername) invalidFields.push('username');
                if (!trimmedEmail) invalidFields.push('email');
                if (!(jobTitleId?.value || '').trim()) invalidFields.push('jobTitle');
                if (!(teamId?.value || '').trim()) invalidFields.push('team');
                if (invalidFields.length) {
                    invalidFields.forEach(markCreateMemberFieldError);
                    return;
                }
            }

            if (isCreatingMember) {
                const draft = currentMemberDraft || createMemberDraft();
                const newUser = {
                    id: draft.id,
                    username: trimmedUsername,
                    email: trimmedEmail,
                    full_name: trimmedFullName,
                    job_title_id: jobTitleId?.value || '',
                    color: color?.value.trim() || draft.color,
                    sort_order: Number(sortOrder?.value) || draft.sort_order,
                    is_active: active ? active.checked : true
                };
                ADMIN_SEED.users.push(newUser);
                user = newUser;
            }

            if (!user) return;

            if (fullName) user.full_name = trimmedFullName;
            if (username && !username.disabled) user.username = trimmedUsername || user.username;
            if (email && !email.disabled) user.email = trimmedEmail || user.email;
            if (jobTitleId) user.job_title_id = jobTitleId.value || user.job_title_id;
            if (color) user.color = color.value.trim() || user.color;
            if (sortOrder) user.sort_order = Number(sortOrder.value) || user.sort_order;
            if (active) user.is_active = active.checked;

            const selectedTeamId = teamId?.value || null;
            const selectedRoleId = roleId?.value || '';
            let assignment = ADMIN_SEED.userTeams.find((row) => row.user_id === userId && row.is_active);
            const previousTeamId = assignment?.team_id || null;
            if (assignment && selectedTeamId) {
                assignment.team_id = selectedTeamId;
            } else if (!assignment && selectedTeamId) {
                ADMIN_SEED.userTeams.push({
                    id: `ut_${Date.now()}`,
                    user_id: userId,
                    team_id: selectedTeamId,
                    is_primary: true,
                    is_active: true
                });
            }

            const teamAssignments = ADMIN_SEED.userRoleAssignments.filter((row) => row.user_id === userId && row.is_active && row.team_id);
            if (previousTeamId && selectedTeamId && previousTeamId !== selectedTeamId) {
                teamAssignments
                    .filter((row) => row.team_id === previousTeamId)
                    .forEach((row) => { row.is_active = false; });
            }

            const targetRoleAssignment = getTeamRoleAssignmentForUser(userId, selectedTeamId);
            if (selectedRoleId && selectedTeamId) {
                if (targetRoleAssignment) {
                    targetRoleAssignment.role_id = selectedRoleId;
                } else {
                    ADMIN_SEED.userRoleAssignments.push({
                        id: `ura_${Date.now()}`,
                        user_id: userId,
                        role_id: selectedRoleId,
                        team_id: selectedTeamId,
                        is_active: true
                    });
                }
            } else if (selectedTeamId) {
                teamAssignments
                    .filter((row) => row.team_id === selectedTeamId)
                    .forEach((row) => { row.is_active = false; });
            }

            currentOrgRightPanel = 'members';
            currentMemberMode = 'view';
            currentMemberEditId = user.id;
            currentMemberDraft = null;
            shouldAnimateMemberDrawer = false;
            renderAdminOrgPanel();
            if (isCreatingMember) {
                showAdminToast(`Tạo mới thành viên ${user.full_name || user.id}`);
            } else {
                showAdminToast(`Đã lưu thay đổi cho ${user.full_name || user.id}.`);
            }
        }

        function markCreateMemberFieldError(fieldKey) {
            const config = {
                fullName: document.getElementById('memberFullName'),
                username: document.getElementById('memberUsername'),
                email: document.getElementById('memberEmail'),
                jobTitle: document.querySelector('[data-member-single-lov-trigger="jobTitle"]'),
                team: document.querySelector('[data-member-team-lov-trigger]')
            };
            const field = config[fieldKey];
            if (!field) return;
            const wrapper = field.closest('label');
            wrapper?.classList.add('member-field-error');
            field.classList.remove('is-error-shake');
            void field.offsetWidth;
            field.classList.add('is-error', 'is-error-shake');
            window.setTimeout(() => field.classList.remove('is-error-shake'), 320);
        }

        function clearCreateMemberFieldError(fieldKey) {

        function syncMemberGroupSelectors(preferredTeamId = null, options = {}) {
            const blockInput = document.getElementById('memberBlockId');
            const departmentInput = document.getElementById('memberDepartmentId');
            const teamInput = document.getElementById('memberTeamId');
            const triggerValue = document.getElementById('memberTeamLovValue');
            const triggerButton = document.querySelector('[data-member-team-lov-trigger]');
            const blockList = document.getElementById('memberTeamLovBlocks');
            const departmentList = document.getElementById('memberTeamLovDepartments');
            const teamList = document.getElementById('memberTeamLovTeams');
            const panel = document.getElementById('memberTeamLovPanel');
            if (!blockInput || !departmentInput || !teamInput || !triggerValue || !triggerButton || !blockList || !departmentList || !teamList || !panel) return;

            const { keepTeamSelection = true } = options;
            const isCreatingMember = currentMemberMode === 'edit' && !currentMemberEditId;
            const availableBlocks = getAvailableBlocksForCurrentMemberSelection();
            const scopedTeams = getAvailableTeamsForCurrentSelection();
            const activeTeam = scopedTeams.find((team) => team.id === preferredTeamId)
                || scopedTeams.find((team) => team.id === teamInput.value)
                || (isCreatingMember ? null : scopedTeams[0] || null);
            const activeDepartment = activeTeam ? getSeedDepartmentById(activeTeam.department_id) : null;

            let selectedBlockId = blockInput.value || activeDepartment?.block_id || availableBlocks[0]?.id || '';
            if (!availableBlocks.some((block) => block.id === selectedBlockId)) {
                selectedBlockId = activeDepartment?.block_id || availableBlocks[0]?.id || '';
            }
            blockInput.value = selectedBlockId;

            const availableDepartments = getAvailableDepartmentsForCurrentMemberSelection(selectedBlockId);
            let selectedDepartmentId = departmentInput.value || activeDepartment?.id || availableDepartments[0]?.id || '';
            if (!availableDepartments.some((department) => department.id === selectedDepartmentId)) {
                selectedDepartmentId = activeDepartment?.id || availableDepartments[0]?.id || '';
            }
            departmentInput.value = selectedDepartmentId;

            const availableTeams = getAvailableScopedTeamsForMemberSelection(selectedBlockId, selectedDepartmentId);
            let selectedTeamId = keepTeamSelection
                ? (preferredTeamId || teamInput.value || activeTeam?.id || (isCreatingMember ? '' : availableTeams[0]?.id || ''))
                : (preferredTeamId || teamInput.value || '');
            if (!availableTeams.some((team) => team.id === selectedTeamId)) {
                selectedTeamId = keepTeamSelection ? (activeTeam?.id || (isCreatingMember ? '' : availableTeams[0]?.id || '')) : '';
            }
            teamInput.value = selectedTeamId;

            triggerValue.textContent = getMemberTeamLovValue(selectedTeamId);
            triggerValue.classList.toggle('member-lov-placeholder', !selectedTeamId);
            panel.classList.toggle('hidden', !isMemberTeamLovOpen);
            triggerButton.classList.toggle('is-open', isMemberTeamLovOpen);

            blockList.innerHTML = availableBlocks.map((block) => `
                <button type="button" class="member-lov-item ${selectedBlockId === block.id ? 'is-active' : ''}" onclick="selectMemberLovBlock('${escapeHtml(block.id)}', event)">
                    <span class="member-lov-item-code">${escapeHtml(block.code)}</span>
                    <span class="member-lov-item-name is-hidden"></span>
                </button>
            `).join('') || '<div class="member-lov-empty">Chưa có khối khả dụng</div>';

            departmentList.innerHTML = availableDepartments.map((department) => `
                <button type="button" class="member-lov-item ${selectedDepartmentId === department.id ? 'is-active' : ''}" onclick="selectMemberLovDepartment('${escapeHtml(department.id)}', event)">
                    <span class="member-lov-item-code">${escapeHtml(department.code)}</span>
                    <span class="member-lov-item-name is-hidden"></span>
                </button>
            `).join('') || '<div class="member-lov-empty">Chưa có phòng khả dụng</div>';

            teamList.innerHTML = availableTeams.map((team) => `
                <button type="button" class="member-lov-item ${selectedTeamId === team.id ? 'is-active' : ''}" onclick="selectMemberLovTeam('${escapeHtml(team.id)}', event)">
                    <span class="member-lov-item-code">${escapeHtml(team.code)}</span>
                    <span class="member-lov-item-name is-hidden"></span>
                </button>
            `).join('') || '<div class="member-lov-empty">Chưa có nhóm khả dụng</div>';

            syncMemberRoleByTeam(selectedTeamId);
        }

        function getOrgSelectionMeta() {
            if (isCreatingOrgSelection && currentOrgDraft) {
                return currentOrgDraft;
            }
            const { type, id } = currentOrgSelection;
            if (type === 'block') {
                const block = getSeedBlockById(id);
                if (!block) return null;
                return {
                    type,
                    entity: block,
                    title: 'Thông tin khối',
                    subtitle: 'Chỉnh sửa thông tin khối và định hướng các phòng ban trực thuộc.',
                    parentLabel: 'Root',
                    stats: `${ADMIN_SEED.departments.filter((item) => item.block_id === id).length} phòng`
                };
            }

            if (type === 'department') {
                const department = getSeedDepartmentById(id);
                if (!department) return null;
                const block = getSeedBlockById(department.block_id);
                return {
                    type,
                    entity: department,
                    title: 'Thông tin phòng',
                    subtitle: 'Cập nhật phòng ban và quản lý các nhóm trực thuộc.',
                    parentLabel: block ? `${block.code} - ${block.name}` : 'Chưa có khối',
                    stats: `${ADMIN_SEED.teams.filter((item) => item.department_id === id).length} nhóm`
                };
            }

            const team = getSeedTeamById(id);
            if (!team) return null;
            const department = getSeedDepartmentById(team.department_id);
            const block = department ? getSeedBlockById(department.block_id) : null;
            return {
                type,
                entity: team,
                title: 'Thông tin nhóm',
                subtitle: 'Điều chỉnh nhóm, người phụ trách và cấu trúc triển khai.',
                parentLabel: [block?.code, department?.code].filter(Boolean).join(' / ') || 'Chưa có phòng',
                stats: `${ADMIN_SEED.userTeams.filter((item) => item.team_id === id && item.is_active).length} thành viên`
            };
        }

        function createOrgEntity(type, parentId = null) {
            const draftMeta = buildOrgDraftMeta(type, parentId);
            if (!draftMeta) return;
            currentOrgDraft = draftMeta;
            currentOrgRightPanel = 'info';
            currentOrgDetailMode = 'edit';
            isCreatingOrgSelection = true;
            renderAdminOrgPanel();
        }

        function createOrgEntityFromSelection(type) {
            if (type === 'block') {
                createOrgEntity('block');
                return;
            }

            if (type === 'department') {
                const targetBlockId = currentOrgSelection.type === 'block'
                    ? currentOrgSelection.id
                    : currentOrgSelection.type === 'department'
                        ? getSeedDepartmentById(currentOrgSelection.id)?.block_id
                        : getSeedDepartmentById(getSeedTeamById(currentOrgSelection.id)?.department_id)?.block_id;
                createOrgEntity('department', targetBlockId || ADMIN_SEED.blocks[0]?.id || null);
                return;
            }

            const targetDepartmentId = currentOrgSelection.type === 'department'
                ? currentOrgSelection.id
                : currentOrgSelection.type === 'team'
                    ? getSeedTeamById(currentOrgSelection.id)?.department_id
                    : ADMIN_SEED.departments[0]?.id;
            createOrgEntity('team', targetDepartmentId || ADMIN_SEED.departments[0]?.id || null);
        }

        function saveOrgSelectionChanges() {
            const selection = getOrgSelectionMeta();
            if (!selection) return;

            const codeInput = document.getElementById('orgDetailCode');
            const codeSuffixInput = document.getElementById('orgDetailCodeSuffix');
            const nameInput = document.getElementById('orgDetailName');
            const orderInput = document.getElementById('orgDetailOrder');
            const descriptionInput = document.getElementById('orgDetailDescription');
            const leaderInput = document.getElementById('orgDetailLeader');
            const trimmedCode = (codeSuffixInput?.value || codeInput?.value || '').trim();
            const trimmedName = nameInput?.value.trim() || '';

            clearCreateOrgValidation();
            if (isCreatingOrgSelection) {
                const invalidFields = [];
                if (!trimmedCode) invalidFields.push('code');
                if (!trimmedName) invalidFields.push('name');
                if (invalidFields.length) {
                    invalidFields.forEach(markCreateOrgFieldError);
                    return;
                }
            }

            selection.entity.code = trimmedCode || selection.entity.code;
            selection.entity.name = trimmedName || selection.entity.name;
            if (orderInput) selection.entity.display_order = Number(orderInput.value) || 1;
            if (descriptionInput) selection.entity.description = descriptionInput.value;
            if (leaderInput && selection.type === 'team') selection.entity.leader_user_id = leaderInput.value;

            if (isCreatingOrgSelection && currentOrgDraft) {
                const entityToSave = { ...selection.entity };
                if (selection.type === 'block') {
                    entityToSave.id = `blk_${Date.now()}`;
                    ADMIN_SEED.blocks.push(entityToSave);
                } else if (selection.type === 'department') {
                    entityToSave.id = `dep_${Date.now()}`;
                    ADMIN_SEED.departments.push(entityToSave);
                } else {
                    entityToSave.id = `team_${Date.now()}`;
                    ADMIN_SEED.teams.push(entityToSave);
                }
                currentOrgSelection = { type: selection.type, id: entityToSave.id };
                currentOrgDraft = null;
                showAdminToast(`Đã tạo ${getOrgEntityToastLabel({ type: selection.type, entity: entityToSave })}.`);
            } else {
                showAdminToast(`Đã lưu thay đổi cho ${getOrgEntityToastLabel(selection)}.`);
            }

            isCreatingOrgSelection = false;
            currentOrgDetailMode = 'view';
            renderAdminOrgPanel();
        }

        function buildStateDraft(state) {
            if (!state) return null;
            return {
                id: state.id,
                code: state.code,
                label: state.label,
                description: state.description || '',
                color_theme: state.color_theme,
                display_order: state.display_order,
                is_active: state.is_active,
                is_new: false
            };
        }

        function createStateDraft() {
            const nextIndex = ADMIN_SEED.states.filter((state) => state.id.startsWith('st_custom_')).length + 1;
            const stateId = `st_custom_${String(nextIndex).padStart(3, '0')}`;
            currentStateDraft = {
                id: stateId,
                code: '',
                label: '',
                description: '',
                color_theme: 'blue',
                display_order: ADMIN_SEED.states.length + 1,
                is_active: true,
                is_new: true
            };
            currentStateSelectionId = stateId;
            currentStateDetailMode = 'edit';
            isStateColorLovOpen = false;
            renderAdminStatesPanel();
        }

        function getRoleBySelection() {
            if (currentRoleDraft && currentRoleDraft.id === currentRoleSelectionId) {
                return currentRoleDraft;
            }
            return getSeedRoleById(currentRoleSelectionId) || ADMIN_SEED.roles[0] || null;
        }

        function buildRoleDraft(role) {
            if (!role) return null;
            return {
                id: role.id,
                code: role.code,
                name: role.name,
                scope_type: role.scope_type,
                is_system: role.is_system,
                is_active: role.is_active,
                is_new: false,
                permission_ids: getRolePermissions(role.id).map((item) => item.id)
            };
        }

        function formatAdminLogTime() {
            const now = new Date();
            const day = String(now.getUTCDate()).padStart(2, '0');
            const month = String(now.getUTCMonth() + 1).padStart(2, '0');
            const hours = String(now.getUTCHours()).padStart(2, '0');
            const minutes = String(now.getUTCMinutes()).padStart(2, '0');
            return `${day}/${month} ${hours}:${minutes}`;
        }

        function addAuditLog(module, action, detail) {
            ADMIN_SEED.auditLogs.unshift({
                id: `log_${String(ADMIN_SEED.auditLogs.length + 1).padStart(3, '0')}`,
                time: formatAdminLogTime(),
                user: 'demo.admin',
                module,
                action,
                detail
            });
        }

        function setActiveRole(roleId) {
            if (!getSeedRoleById(roleId) && !(currentRoleDraft && currentRoleDraft.id === roleId)) return;
            isRoleScopeLovOpen = false;
            currentRoleDraft = null;
            currentRoleDetailMode = 'view';
            currentRoleSelectionId = roleId;
            renderAdminRolesPanel();
        }

        function setRoleDetailMode(mode) {
            currentRoleDetailMode = mode === 'edit' ? 'edit' : 'view';
            if (currentRoleDetailMode === 'edit') {
                const role = getSeedRoleById(currentRoleSelectionId);
                if (role) currentRoleDraft = buildRoleDraft(role);
            } else {
                currentRoleDraft = null;
                isRoleScopeLovOpen = false;
            }
            renderAdminRolesPanel();
        }

        function updateRoleField(roleId, field, value) {
            const role = currentRoleDetailMode === 'edit' ? currentRoleDraft : getSeedRoleById(roleId);
            if (!role) return;
            const nextValue = String(value ?? '').trim();
            if (!nextValue) {
                showAdminToast('Thông tin role không được để trống.');
                renderAdminRolesPanel();
                return;
            }
            if (field === 'code') {
                const normalizedCode = nextValue.toUpperCase().replace(/\s+/g, '_');
                const duplicatedRole = ADMIN_SEED.roles.find((item) => item.id !== roleId && item.code === normalizedCode);
                if (duplicatedRole) {
                    showAdminToast(`Code ${normalizedCode} đã tồn tại.`);
                    renderAdminRolesPanel();
                    return;
                }
                role.code = normalizedCode;
            } else {
                role[field] = nextValue;
            }
            if (currentRoleDetailMode === 'edit') {
                currentRoleDraft = { ...role };
                return;
            }
            addAuditLog('Permission', 'UPDATE_ROLE', `Cập nhật ${field} cho ${role.code}`);
            renderAdminRolesPanel();
        }

        function updateRoleScope(roleId, scopeType) {
            const role = currentRoleDetailMode === 'edit' ? currentRoleDraft : getSeedRoleById(roleId);
            if (!role) return;
            role.scope_type = scopeType === 'GLOBAL' ? 'GLOBAL' : 'TEAM';
            isRoleScopeLovOpen = false;
            if (role.scope_type === 'GLOBAL') {
                currentRoleDraft = { ...role };
            }
            if (currentRoleDetailMode === 'edit') {
                renderAdminRolesPanel();
                return;
            }
            ADMIN_SEED.userRoleAssignments.forEach((assignment) => {
                if (assignment.role_id === role.id) assignment.team_id = null;
            });
            addAuditLog('Permission', 'UPDATE_ROLE_SCOPE', `Đổi phạm vi role ${role.code} sang ${role.scope_type}`);
            renderAdminRolesPanel();
        }

        function toggleRoleStatus(roleId, event) {
            const role = currentRoleDetailMode === 'edit' ? currentRoleDraft : getSeedRoleById(roleId);
            if (!role) return;
            role.is_active = !role.is_active;
            const button = event?.currentTarget;
            if (button) {
                button.classList.toggle('is-on', role.is_active);
                button.classList.toggle('is-off', !role.is_active);
            }
            if (currentRoleDetailMode === 'edit') {
                currentRoleDraft = { ...role };
                window.setTimeout(() => {
                    renderAdminRolesPanel();
                }, 180);
                return;
            }
            addAuditLog('Permission', 'TOGGLE_ROLE', `${role.is_active ? 'Kích hoạt' : 'Ngưng'} role ${role.code}`);
            showAdminToast(`${role.is_active ? 'Đã kích hoạt' : 'Đã ngưng'} role ${role.code}.`);
            window.setTimeout(() => {
                renderAdminRolesPanel();
            }, 180);
        }

        function toggleRolePermission(roleId, permissionId, event) {
            const role = currentRoleDetailMode === 'edit' ? currentRoleDraft : getSeedRoleById(roleId);
            const permission = getSeedPermissionById(permissionId);
            if (!role || !permission) return;
            const button = event?.currentTarget;
            if (currentRoleDetailMode === 'edit' && currentRoleDraft) {
                const nextPermissionIds = new Set(currentRoleDraft.permission_ids || []);
                if (nextPermissionIds.has(permissionId)) {
                    nextPermissionIds.delete(permissionId);
                } else {
                    nextPermissionIds.add(permissionId);
                }
                currentRoleDraft = {
                    ...currentRoleDraft,
                    permission_ids: Array.from(nextPermissionIds)
                };
                if (button) {
                    button.classList.toggle('is-on', nextPermissionIds.has(permissionId));
                    button.classList.toggle('is-off', !nextPermissionIds.has(permissionId));
                }
                window.setTimeout(() => {
                    renderAdminRolesPanel();
                }, 180);
                return;
            }
            const itemIndex = ADMIN_SEED.rolePermissions.findIndex((item) => item.role_id === roleId && item.permission_id === permissionId);
            if (itemIndex >= 0) {
                ADMIN_SEED.rolePermissions.splice(itemIndex, 1);
                if (button) {
                    button.classList.remove('is-on');
                    button.classList.add('is-off');
                }
                showAdminToast(`Đã tắt quyền ${permission.code} cho ${role.code}.`);
            } else {
                ADMIN_SEED.rolePermissions.push({ role_id: roleId, permission_id: permissionId });
                if (button) {
                    button.classList.remove('is-off');
                    button.classList.add('is-on');
                }
                showAdminToast(`Đã bật quyền ${permission.code} cho ${role.code}.`);
            }
            addAuditLog('Permission', 'UPDATE_ROLE', `Cập nhật permission ${permission.code} cho ${role.code}`);
            window.setTimeout(() => {
                renderAdminRolesPanel();
            }, 180);
        }

        function createRoleDraft() {
            const nextIndex = ADMIN_SEED.roles.filter((role) => role.id.startsWith('role_custom_')).length + 1;
            const roleId = `role_custom_${String(nextIndex).padStart(3, '0')}`;
            const code = `CUSTOM_ROLE_${String(nextIndex).padStart(2, '0')}`;
            previousRoleSelectionId = currentRoleSelectionId;
            currentRoleDraft = {
                id: roleId,
                code,
                name: `Custom Role ${nextIndex}`,
                scope_type: 'TEAM',
                is_system: false,
                is_active: true,
                is_new: true,
                permission_ids: []
            };
            isRoleScopeLovOpen = false;
            currentRoleDetailMode = 'edit';
            currentRoleSelectionId = roleId;
            renderAdminRolesPanel();
        }

        function toggleRoleScopeLov(event) {
            event?.stopPropagation?.();
            isRoleScopeLovOpen = !isRoleScopeLovOpen;
            renderAdminRolesPanel();
        }

        function closeRoleScopeLov() {
            if (!isRoleScopeLovOpen) return;
            isRoleScopeLovOpen = false;
            renderAdminRolesPanel();
        }

        function selectRoleScopeLov(roleId, scopeType, event) {
            event?.stopPropagation?.();
            updateRoleScope(roleId, scopeType);
        }

        function cancelRoleChanges() {
            isRoleScopeLovOpen = false;
            if (currentRoleDraft?.is_new) {
                currentRoleSelectionId = previousRoleSelectionId || ADMIN_SEED.roles[0]?.id || '';
            }
            currentRoleDraft = null;
            currentRoleDetailMode = 'view';
            renderAdminRolesPanel();
        }

        function saveRoleChanges() {
            if (!currentRoleDraft) return;
            const draft = {
                ...currentRoleDraft,
                code: String(currentRoleDraft.code || '').trim().toUpperCase().replace(/\s+/g, '_'),
                name: String(currentRoleDraft.name || '').trim(),
                permission_ids: Array.from(new Set(currentRoleDraft.permission_ids || []))
            };
            if (!draft.name || !draft.code) {
                showAdminToast('Tên role và mã role không được để trống.');
                return;
            }
            const duplicatedRole = ADMIN_SEED.roles.find((item) => item.id !== draft.id && item.code === draft.code);
            if (duplicatedRole) {
                showAdminToast(`Code ${draft.code} đã tồn tại.`);
                return;
            }

            const nextRole = {
                id: draft.id,
                code: draft.code,
                name: draft.name,
                scope_type: draft.scope_type,
                is_system: draft.is_system,
                is_active: draft.is_active
            };

            if (draft.is_new) {
                ADMIN_SEED.roles.push(nextRole);
                addAuditLog('Permission', 'CREATE_ROLE', `Tạo role ${draft.code}`);
                showAdminToast(`Đã tạo role ${draft.code}.`);
            } else {
                const role = getSeedRoleById(draft.id);
                if (!role) return;
                Object.assign(role, nextRole);
                addAuditLog('Permission', 'UPDATE_ROLE', `Lưu thay đổi cho ${draft.code}`);
                showAdminToast(`Đã lưu thay đổi cho ${draft.code}.`);
            }

            ADMIN_SEED.rolePermissions = ADMIN_SEED.rolePermissions.filter((item) => item.role_id !== draft.id);
            draft.permission_ids.forEach((permissionId) => {
                ADMIN_SEED.rolePermissions.push({ role_id: draft.id, permission_id: permissionId });
            });

            if (draft.scope_type === 'GLOBAL') {
                ADMIN_SEED.userRoleAssignments.forEach((assignment) => {
                    if (assignment.role_id === draft.id) assignment.team_id = null;
                });
            }

            currentRoleSelectionId = draft.id;
            currentRoleDraft = null;
            currentRoleDetailMode = 'view';
            isRoleScopeLovOpen = false;
            renderAdminRolesPanel();
        }

        function getAvailableUsersForRole(role) {
            return ADMIN_SEED.users
                .filter((user) => user.is_active && (role?.scope_type === 'GLOBAL' || getUserPrimaryTeam(user.id)))
                .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
        }

        function createRoleAssignment(roleId) {
            const role = getSeedRoleById(roleId);
            if (!role) return;
            const availableUsers = getAvailableUsersForRole(role);
            if (!availableUsers.length) {
                showAdminToast('Không có user phù hợp để gán role.');
                return;
            }
            const candidate = availableUsers.find((user) => {
                const teamId = role.scope_type === 'TEAM' ? (getUserPrimaryTeam(user.id)?.id || null) : null;
                return !ADMIN_SEED.userRoleAssignments.some((item) => (
                    item.role_id === role.id &&
                    item.user_id === user.id &&
                    item.team_id === teamId &&
                    item.is_active
                ));
            });
            if (!candidate) {
                showAdminToast('Tất cả user phù hợp đã được gán role này rồi.');
                return;
            }
            const defaultUser = candidate;
            const defaultTeam = role.scope_type === 'TEAM' ? getUserPrimaryTeam(defaultUser.id) : null;
            ADMIN_SEED.userRoleAssignments.push({
                id: `ura_${String(ADMIN_SEED.userRoleAssignments.length + 1).padStart(3, '0')}`,
                user_id: defaultUser.id,
                role_id: role.id,
                team_id: defaultTeam?.id || null,
                is_active: true
            });
            addAuditLog('Permission', 'CREATE_ASSIGNMENT', `Gán role ${role.code} cho ${defaultUser.full_name}`);
            showAdminToast(`Đã thêm gán quyền cho ${defaultUser.full_name}.`);
            renderAdminRolesPanel();
        }

        function updateRoleAssignmentField(assignmentId, field, value) {
            const assignment = ADMIN_SEED.userRoleAssignments.find((item) => item.id === assignmentId);
            if (!assignment) return;
            const role = getSeedRoleById(assignment.role_id);
            if (!role) return;
            const previousValue = {
                user_id: assignment.user_id,
                team_id: assignment.team_id,
                is_active: assignment.is_active
            };
            if (field === 'user_id') {
                assignment.user_id = value;
                if (role.scope_type === 'TEAM') {
                    assignment.team_id = getUserPrimaryTeam(value)?.id || null;
                }
            } else if (field === 'team_id') {
                assignment.team_id = value || null;
            } else if (field === 'is_active') {
                assignment.is_active = Boolean(value);
            }
            const duplicated = ADMIN_SEED.userRoleAssignments.find((item) => (
                item.id !== assignment.id &&
                item.role_id === assignment.role_id &&
                item.user_id === assignment.user_id &&
                item.team_id === assignment.team_id &&
                item.is_active
            ));
            if (duplicated) {
                assignment.user_id = previousValue.user_id;
                assignment.team_id = previousValue.team_id;
                assignment.is_active = previousValue.is_active;
                showAdminToast('Role này đã được gán cho user ở phạm vi đã chọn.');
                renderAdminRolesPanel();
                return;
            }
            const user = getSeedUserById(assignment.user_id);
            addAuditLog('Permission', 'UPDATE_ASSIGNMENT', `Cập nhật gán role ${role.code} cho ${user?.full_name || assignment.user_id}`);
            renderAdminRolesPanel();
        }

        function removeRoleAssignment(assignmentId) {
            const assignmentIndex = ADMIN_SEED.userRoleAssignments.findIndex((item) => item.id === assignmentId);
            if (assignmentIndex < 0) return;
            const assignment = ADMIN_SEED.userRoleAssignments[assignmentIndex];
            const role = getSeedRoleById(assignment.role_id);
            const user = getSeedUserById(assignment.user_id);
            ADMIN_SEED.userRoleAssignments.splice(assignmentIndex, 1);
            addAuditLog('Permission', 'DELETE_ASSIGNMENT', `Gỡ role ${role?.code || assignment.role_id} khỏi ${user?.full_name || assignment.user_id}`);
            showAdminToast('Đã gỡ gán quyền.');
            renderAdminRolesPanel();
        }
