<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracking Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* CSS MỚI CỦA BẠN (CÁC BIẾN & STYLE FORM) */
        :root {
            --po-primary: #2563EB;
            --po-primary-hover: #1D4ED8;
            --po-bg-light: #F8FAFC;
            --po-border: #E2E8F0;
            --po-text-main: #1E293B;
            --po-text-muted: #64748B;
            --po-alert-bg: #EFF6FF;
            --po-alert-text: #1E40AF;
        }

        .po-modal {
            background: #FFFFFF;
            width: 100%;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--po-border);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--po-text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .po-input,
        .po-textarea {
            width: 100%;
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            outline: none;
            transition: 0.2s;
        }

        .po-input::placeholder,
        .po-textarea::placeholder {
            color: #94A3B8;
        }

        .po-input:focus,
        .po-textarea:focus {
            border-color: var(--po-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .po-textarea {
            height: 70px;
            resize: none;
        }

        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .po-select {
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            outline: none;
            background: #fff;
            cursor: pointer;
        }

        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border: 1px solid var(--po-border);
            padding: 8px;
            border-radius: 8px;
            min-height: 42px;
            align-items: center;
        }

        .po-tag {
            background: var(--po-bg-light);
            border: 1px solid var(--po-border);
            color: var(--po-text-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .po-tag:hover {
            background: #E2E8F0;
        }

        /* Trạng thái Tag được chọn */
        .po-tag-active {
            background: var(--po-primary) !important;
            color: white !important;
            border-color: var(--po-primary) !important;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-cancel {
            background: transparent;
            border: none;
            color: var(--po-text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            color: var(--po-text-main);
        }

        .btn-submit {
            background: var(--po-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-submit:hover {
            background: var(--po-primary-hover);
            transform: translateY(-1px);
        }

        /* CSS TỔNG QUAN (GIỮ NGUYÊN) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            overflow-x: auto;
        }

        ::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

/* --- HIỆU ỨNG KÉO THẢ (PO WORKSPACE STYLE) --- */
        .sortable-ghost {
            background-color: #f8fafc !important; /* Nền xám nhạt */
            border: 2px dashed #94a3b8 !important; /* Viền đứt nét */
            border-radius: 12px !important;
            opacity: 1 !important;
        }

        .sortable-ghost > * {
            opacity: 0 !important; /* Ẩn toàn bộ nội dung chữ bên trong vùng rớt xuống */
            visibility: hidden !important; 
        }

        .sortable-drag {
            cursor: grabbing !important;
            background-color: #ffffff !important;
            box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.25) !important; /* Bóng đổ xanh dương */
            border: 1px solid #3b82f6 !important;
            border-radius: 12px !important;
            opacity: 1 !important;
            transform: rotate(3deg) scale(1.02) !important; /* Nghiêng 3 độ, to lên 2% */
            z-index: 99999 !important;
            transition: none !important; /* BẮT BUỘC: Tắt transition để thẻ không bị lag trễ so với chuột */
        }

        .kanban-list>div {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        .task-card {
            cursor: grab;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .kanban-list {
            counter-reset: task-counter;
        }

        .task-title::before {
            counter-increment: task-counter;
            content: counter(task-counter) ". ";
            color: #94a3b8;
            font-weight: 700;
        }

        .kanban-column {
            width: 360px;
            flex-shrink: 0;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        .kanban-column-header {
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }

        .kanban-column-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .kanban-count {
            padding: 0.125rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
            margin-left: 0.25rem;
            background: #ffffff;
        }

        .kanban-add-wrap {
            padding: 1rem 1rem 0.25rem;
        }

        .kanban-list-body {
            padding: 1rem;
            padding-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 150px;
        }

        .kanban-column[data-color-theme="slate"] {
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .kanban-column[data-color-theme="slate"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .kanban-column[data-color-theme="slate"] .kanban-dot { background: #94a3b8; }
        .kanban-column[data-color-theme="slate"] .kanban-column-title { color: #475569; }
        .kanban-column[data-color-theme="slate"] .kanban-count { color: #475569; border: 1px solid #e2e8f0; }
        .kanban-column[data-color-theme="slate"] .kanban-menu-btn { color: #94a3b8; }
        .kanban-column[data-color-theme="slate"] .kanban-menu-btn:hover { background: #e2e8f0; }
        .kanban-column[data-color-theme="slate"] .kanban-add-btn {
            border-color: #e2e8f0;
            color: #94a3b8;
        }
        .kanban-column[data-color-theme="slate"] .kanban-add-btn:hover {
            background: #f8fafc;
            border-color: #93c5fd;
            color: #2563eb;
        }
        .kanban-column[data-color-theme="slate"] .task-card { border: 1px solid #cbd5e1 !important; }
        .kanban-column[data-color-theme="slate"] .task-card:hover {
            border-color: #94a3b8 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .kanban-column[data-color-theme="blue"] {
            background: rgba(239, 246, 255, 0.4);
            border: 1px solid rgba(191, 219, 254, 0.6);
        }

        .kanban-column[data-color-theme="blue"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #dbeafe;
        }

        .kanban-column[data-color-theme="blue"] .kanban-dot { background: #3b82f6; }
        .kanban-column[data-color-theme="blue"] .kanban-column-title { color: #1d4ed8; }
        .kanban-column[data-color-theme="blue"] .kanban-count { color: #2563eb; border: 1px solid #bfdbfe; }
        .kanban-column[data-color-theme="blue"] .kanban-menu-btn { color: #60a5fa; }
        .kanban-column[data-color-theme="blue"] .kanban-menu-btn:hover { background: #dbeafe; }
        .kanban-column[data-color-theme="blue"] .task-card { border: 1px solid #93c5fd !important; }
        .kanban-column[data-color-theme="blue"] .task-card:hover {
            border-color: #60a5fa !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.15);
        }

        .kanban-column[data-color-theme="orange"] {
            background: rgba(255, 247, 237, 0.4);
            border: 1px solid rgba(254, 215, 170, 0.6);
        }

        .kanban-column[data-color-theme="orange"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #ffedd5;
        }

        .kanban-column[data-color-theme="orange"] .kanban-dot { background: #f97316; }
        .kanban-column[data-color-theme="orange"] .kanban-column-title { color: #c2410c; }
        .kanban-column[data-color-theme="orange"] .kanban-count { color: #ea580c; border: 1px solid #fed7aa; }
        .kanban-column[data-color-theme="orange"] .kanban-menu-btn { color: #fb923c; }
        .kanban-column[data-color-theme="orange"] .kanban-menu-btn:hover { background: #ffedd5; }
        .kanban-column[data-color-theme="orange"] .task-card { border: 1px solid #fed7aa !important; }
        .kanban-column[data-color-theme="orange"] .task-card:hover { border-color: #fb923c !important; }

        .kanban-column[data-color-theme="indigo"] {
            background: rgba(245, 243, 255, 0.58);
            border: 1px solid rgba(196, 181, 253, 0.7);
        }

        .kanban-column[data-color-theme="indigo"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.62);
            border-bottom: 1px solid #e9d5ff;
        }

        .kanban-column[data-color-theme="indigo"] .kanban-dot { background: #8b5cf6; }
        .kanban-column[data-color-theme="indigo"] .kanban-column-title { color: #6d28d9; }
        .kanban-column[data-color-theme="indigo"] .kanban-count { color: #7c3aed; border: 1px solid #ddd6fe; }
        .kanban-column[data-color-theme="indigo"] .kanban-menu-btn { color: #a78bfa; }
        .kanban-column[data-color-theme="indigo"] .kanban-menu-btn:hover { background: #ede9fe; }
        .kanban-column[data-color-theme="indigo"] .task-card { border: 1px solid #c4b5fd !important; }
        .kanban-column[data-color-theme="indigo"] .task-card:hover {
            border-color: #a78bfa !important;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.16);
        }

        .kanban-column[data-color-theme="emerald"] {
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid rgba(226, 232, 240, 0.8);
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .kanban-column[data-color-theme="emerald"]:hover {
            opacity: 1;
        }

        .kanban-column[data-color-theme="emerald"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .kanban-column[data-color-theme="emerald"] .kanban-dot { background: #10b981; }
        .kanban-column[data-color-theme="emerald"] .kanban-column-title { color: #047857; }
        .kanban-column[data-color-theme="emerald"] .kanban-count { color: #475569; border: 1px solid #e2e8f0; }
        .kanban-column[data-color-theme="emerald"] .kanban-menu-btn { color: #94a3b8; }
        .kanban-column[data-color-theme="emerald"] .kanban-menu-btn:hover { background: #e2e8f0; }
        .kanban-column[data-color-theme="emerald"] .task-card { border: 1px solid #6ee7b7 !important; }
        .kanban-column[data-color-theme="emerald"] .task-card:hover {
            border-color: #34d399 !important;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.15);
        }

        .kanban-column[data-color-theme="red"] {
            background: rgba(254, 242, 242, 0.4);
            border: 1px solid rgba(254, 202, 202, 0.6);
        }

        .kanban-column[data-color-theme="red"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #fee2e2;
        }

        .kanban-column[data-color-theme="red"] .kanban-dot { background: #ef4444; }
        .kanban-column[data-color-theme="red"] .kanban-column-title { color: #b91c1c; }
        .kanban-column[data-color-theme="red"] .kanban-count { color: #dc2626; border: 1px solid #fecaca; }
        .kanban-column[data-color-theme="red"] .kanban-menu-btn { color: #f87171; }
        .kanban-column[data-color-theme="red"] .kanban-menu-btn:hover { background: #fee2e2; }
        .kanban-column[data-color-theme="red"] .task-card { border: 1px solid #fecaca !important; }
        .kanban-column[data-color-theme="red"] .task-card:hover { border-color: #f87171 !important; }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        .input-error {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .input-error::placeholder {
            color: #ef4444 !important;
            font-style: italic;
        }

        .task-desc {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tag-name {
            --dot-color: #94a3b8;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 0 14px 0 12px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
            white-space: nowrap;
            line-height: 1;
            transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
        }

        .tag-name:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(15, 23, 42, 0.14);
            filter: saturate(1.05);
        }

        .tag-name[data-user-key] {
            cursor: pointer;
        }

        .tag-label {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
        }

        .tag-status-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 9px;
            height: 9px;
            border-radius: 9999px;
            background: var(--dot-color);
            box-shadow:
                0 0 0 1.5px rgba(255, 255, 255, 0.95),
                0 4px 9px color-mix(in srgb, var(--dot-color) 22%, transparent);
            overflow: hidden;
        }

        .tag-status-dot::before,
        .tag-status-dot::after {
            content: "";
            position: absolute;
            inset: 0;
        }

        .tag-status-dot::before {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.78) 0%, rgba(255, 255, 255, 0.18) 42%, transparent 43%);
        }

        .tag-status-dot::after {
            background: linear-gradient(315deg, rgba(0, 0, 0, 0.10) 0%, transparent 45%);
        }

        .tag-name.workflow-backlog {
            --dot-color: #94a3b8;
        }

        .tag-name.workflow-in-progress {
            --dot-color: #3b82f6;
        }

        .tag-name.workflow-in-review {
            --dot-color: #8b5cf6;
        }

        .tag-name.workflow-pending {
            --dot-color: #f59e0b;
        }

        .tag-name.workflow-done {
            --dot-color: #22c55e;
        }

        .tag-name.workflow-cancel {
            --dot-color: #ef4444;
        }
/* --- BỔ SUNG MÀU CHO DATE PICKER --- */
        :root {
            --po-bg-light: #EFF6FF; /* Màu xanh siêu nhạt khi hover ngày */
            --po-text-light: #94A3B8;
        }

        /* --- DATE PICKER WRAPPER --- */
        .po-datepicker { position: relative; width: 140px; user-select: none; }
        
.dp-trigger {
    display: flex; justify-content: space-between; align-items: center;
    background: #FFFFFF; border: 1px solid var(--po-border);
            border-radius: 8px; padding: 0 12px; font-size: 13px; color: var(--po-text-muted);
            cursor: pointer; transition: all 0.2s ease; height: 35px;
        }
        .po-datepicker.open .dp-trigger { border-color: var(--po-primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); color: var(--po-text-main); }
        .dp-icon { width: 14px; height: 14px; color: var(--po-text-muted); }

        .dp-popup {
position: absolute; top: calc(100% + 8px); left: 0; background: #FFFFFF;
            border: 1px solid var(--po-border); border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 16px; width: 260px; z-index: 100;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease;
        }
        .po-datepicker.open .dp-popup { opacity: 1; visibility: visible; transform: translateY(0); }

        .dp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .dp-month-year { font-size: 14px; font-weight: 700; color: var(--po-text-main); display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .dp-month-year svg { width: 14px; height: 14px; }
        .dp-nav { display: flex; gap: 4px; }
        .dp-nav-btn { background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--po-text-main); transition: 0.2s; }
        .dp-nav-btn:hover { background: #F1F5F9; }
        .dp-nav-btn svg { width: 16px; height: 16px; }

        .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .dp-day-name { font-size: 11px; font-weight: 600; color: var(--po-text-main); padding-bottom: 8px; }
        .dp-date { width: 28px; height: 28px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s ease; color: var(--po-text-main); }
        .dp-date:hover:not(.empty) { background: var(--po-bg-light); color: var(--po-primary); }
        .dp-date.empty { color: var(--po-text-light); cursor: default; }
        .dp-date.selected { background: var(--po-primary); color: white; border-color: var(--po-primary); font-weight: 600; }
        .dp-date.selected:hover { background: var(--po-primary-hover); color: white; }

        .dp-footer { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--po-border); }
        .dp-action-btn { background: transparent; border: none; font-size: 12px; font-weight: 600; color: var(--po-primary); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .dp-action-btn:hover { background: var(--po-bg-light); }
        /* --- CUSTOM SELECT STYLES --- */
        .custom-select-wrapper {
            position: relative;
            flex: 1;
            user-select: none;
        }

        .custom-select-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FFFFFF;
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            height: 35px;
            /* Cho bằng với thẻ Date */
        }

        .custom-select-wrapper.open .custom-select-trigger {
            border-color: var(--po-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
            color: var(--po-text-muted);
            transition: transform 0.2s ease;
        }

        .custom-select-wrapper.open .arrow-icon {
            transform: rotate(180deg);
        }

        .custom-options-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;

            border-radius: 0.9rem;

            transition: all 0.18s ease;
        }

        .admin-color-chip:hover {
            border-color: #93c5fd;
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(148, 163, 184, 0.12);
        }

        .admin-color-chip.is-active {
            border-color: #2563eb;
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }

        .admin-color-chip-swatch {
            width: 1rem;
            height: 1rem;
            border-radius: 9999px;

            border: 2px solid rgba(255, 255, 255, 0.95);

        }

        .admin-color-chip-code {
            font-size: 10px;
            color: #64748b;
            line-height: 1.1;
        }

        .admin-toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 48px;
            height: 28px;
            border-radius: 9999px;
            padding: 3px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
            transition: background-color 0.22s ease, box-shadow 0.22s ease, transform 0.18s ease;
            --toggle-shift: 20px;
        }

        .admin-toggle::after {
            content: "";
            width: 22px;
            height: 22px;
            border-radius: 9999px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            box-shadow: 0 3px 10px rgba(15, 23, 42, 0.18);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            will-change: transform;
        }

        .admin-toggle:hover {
            transform: translateY(-1px);
        }

        .admin-toggle.is-compact:hover {
            transform: none;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
        }

        .admin-toggle.is-on {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 10px 18px rgba(34, 197, 94, 0.18);
        }

        .admin-toggle.is-on::after {
            transform: translateX(var(--toggle-shift));
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.22);
        }

        .admin-toggle.is-off {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
        }

        .admin-toggle:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
        }

        .admin-toggle.is-compact {
            width: 42px;
            height: 24px;
            padding: 2px;
            --toggle-shift: 18px;
        }

        .admin-toggle.is-compact::after {
            width: 18px;
            height: 18px;
        }

        .admin-toggle.is-compact.is-on::after {
            transform: translateX(var(--toggle-shift));
        }

        @keyframes adminPressPulse {
            0% {
                transform: scale(1);

            45% {
                transform: scale(0.96);
            }

            100% {
                transform: scale(1);
            }

        function updateKanbanScrollNavState() {
            const scrollArea = document.getElementById('kanbanScrollArea');
            const leftBtn = document.getElementById('kanbanScrollLeft');
            const rightBtn = document.getElementById('kanbanScrollRight');
            if (!scrollArea || !leftBtn || !rightBtn) return;

            const maxScrollLeft = Math.max(0, scrollArea.scrollWidth - scrollArea.clientWidth);
            const canScroll = maxScrollLeft > 12;
            const isAtStart = scrollArea.scrollLeft <= 8;
            const isAtEnd = scrollArea.scrollLeft >= maxScrollLeft - 8;

            leftBtn.disabled = !canScroll || isAtStart;
            rightBtn.disabled = !canScroll || isAtEnd;
            leftBtn.classList.toggle('is-disabled', leftBtn.disabled);
            rightBtn.classList.toggle('is-disabled', rightBtn.disabled);
        }

        function scrollKanbanBoard(direction) {
            const scrollArea = document.getElementById('kanbanScrollArea');
            if (!scrollArea) return;

            const step = Math.max(280, Math.floor(scrollArea.clientWidth * 0.72));
            scrollArea.scrollBy({ left: direction * step, behavior: 'smooth' });
        }

        function initializeKanbanScrollNav() {
            const scrollArea = document.getElementById('kanbanScrollArea');
            const leftBtn = document.getElementById('kanbanScrollLeft');
            const rightBtn = document.getElementById('kanbanScrollRight');
            if (!scrollArea || !leftBtn || !rightBtn) return;

            if (!scrollArea.dataset.navInitialized) {
                scrollArea.addEventListener('scroll', updateKanbanScrollNavState, { passive: true });
                leftBtn.addEventListener('click', () => scrollKanbanBoard(-1));
                rightBtn.addEventListener('click', () => scrollKanbanBoard(1));
                window.addEventListener('resize', updateKanbanScrollNavState);
                scrollArea.dataset.navInitialized = 'true';
            }

            requestAnimationFrame(updateKanbanScrollNavState);
        }

        function initCustomDatePicker(wrapper) {
            if (!wrapper) return;
            const trigger = wrapper.querySelector('.dp-trigger');

            // Nhân bản để xóa các event rác cũ
            const newTrigger = trigger.cloneNode(true);
            trigger.parentNode.replaceChild(newTrigger, trigger);

            // BẮT BUỘC: Phải lấy lại biến từ newTrigger sau khi đã thay thế vào DOM
            const triggerText = newTrigger.querySelector('.dp-text');
            const hiddenInput = wrapper.querySelector('.hidden-date-input');
            const dates = wrapper.querySelectorAll('.dp-date:not(.empty)');
            const btnClear = wrapper.querySelector('.dpClear');
            const btnToday = wrapper.querySelector('.dpToday');

            newTrigger.addEventListener('click', function(e) {
                // Đóng tất cả popup khác
                document.querySelectorAll('.po-datepicker.open, .custom-select-wrapper.open').forEach(w => {
                    if (w !== wrapper) w.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                e.stopPropagation();
            });

            dates.forEach(date => {
                date.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    const day = this.textContent.padStart(2, '0');
                    // Dùng innerHTML để giữ lại icon cuốn lịch
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> ${day}/04/2026`; 
                    triggerText.style.color = 'var(--po-text-main)';
                    
                    // Lưu vào thẻ ẩn để code cũ lấy được
                    hiddenInput.value = `2026-04-${day}`;
                    
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            });

            if(btnClear) {
                btnClear.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> dd/mm/yyyy`;
                    triggerText.style.color = 'var(--po-text-muted)';
                    hiddenInput.value = '';
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            }

            if(btnToday) {
                btnToday.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    const todayDate = Array.from(dates).find(d => d.textContent === '17');
                    if(todayDate) todayDate.classList.add('selected');
                    
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> 17/04/2026`;
                    triggerText.style.color = 'var(--po-text-main)';
                    hiddenInput.value = '2026-04-17';
                    
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            }

            document.addEventListener('click', function(e) {
                if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
            });
        }

            if (wrapper.dataset.initialized === 'true') return;
            wrapper.dataset.initialized = 'true';

            const triggerText = wrapper.querySelector('.trigger-text');
            const options = wrapper.querySelectorAll('.custom-option');
            const nativeSelect = wrapper.querySelector('.hidden-native-select');

            trigger.addEventListener('click', function (e) {
                document.querySelectorAll('.custom-select-wrapper.open, .po-datepicker.open').forEach(w => {
                    if (w !== wrapper) w.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                e.stopPropagation();
            });

            options.forEach(option => {
                option.addEventListener('click', function (e) {
                    triggerText.textContent = this.textContent.trim();
                    options.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');

                    nativeSelect.value = this.getAttribute('data-value');
                    nativeSelect.dispatchEvent(new Event('change'));

                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            });

            document.addEventListener('click', function (e) {
                if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
            });

            if (!teamCode) return [];
            const teamUserIds = USER_ROLES_TEAM
                .filter((row) => row.team_code === teamCode)
                .map((row) => normalizeUserKey(row.user_id));

            TODO: { id: 'TODO', label: 'Chua xu ly', dotColor: '#ef4444' },
            IN_PROGRESS: { id: 'IN_PROGRESS', label: 'Dang xu ly', dotColor: '#f59e0b' },
            DONE: { id: 'DONE', label: 'Hoan thanh', dotColor: '#22c55e' }
        };
        const DEFAULT_ASSIGNEE_STATUS = 'TODO';
        const ASSIGNEE_STATUS_FLOW = ['TODO', 'IN_PROGRESS', 'DONE'];

        function getAssigneeStatusMeta(statusId) {
            return ASSIGNEE_STATUSES[statusId] || ASSIGNEE_STATUSES[DEFAULT_ASSIGNEE_STATUS];
        }

        function getAssigneeStatusClass(statusId) {
            const normalizedStatusId = getAssigneeStatusMeta(statusId).id;
            if (normalizedStatusId === 'IN_PROGRESS') return 'assignee-status-in-progress';
            if (normalizedStatusId === 'DONE') return 'assignee-status-done';
            return 'assignee-status-todo';
        }

        function getWorkflowStateClass(stateCode) {
            const normalizedStateCode = getStateConfig(stateCode)?.stateCode || getDefaultStateCode().stateCode;
            if (normalizedStateCode === 'IN_PROGRESS') return 'workflow-in-progress';
            if (normalizedStateCode === 'IN_REVIEW') return 'workflow-in-review';
            if (normalizedStateCode === 'PENDING') return 'workflow-pending';
            if (normalizedStateCode === 'DONE') return 'workflow-done';
            if (normalizedStateCode === 'CANCEL') return 'workflow-cancel';
            return 'workflow-backlog';
        }

        function normalizeAssigneeRecord(record) {
            if (!record) return null;
            if (typeof record === 'string') {
                const normalizedUserKey = normalizeUserKey(record);
                return normalizedUserKey && USERS[normalizedUserKey]
                    ? { user_key: normalizedUserKey, status: DEFAULT_ASSIGNEE_STATUS, workflow_state: getDefaultStateCode().stateCode }
                    : null;
            }

            const normalizedUserKey = normalizeUserKey(record.user_key || record.userKey);
            if (!normalizedUserKey || !USERS[normalizedUserKey]) return null;

            return {
                user_key: normalizedUserKey,
                status: getAssigneeStatusMeta(record.status).id,
                workflow_state: getStateConfig(record.workflow_state || record.workflowState)?.stateCode || getDefaultStateCode().stateCode
            };
        }

        function buildAssigneeRecordsFromUserKeys(userKeys, existingAssignees = []) {
            const existingStatusMap = new Map(
                existingAssignees
                    .map((record) => normalizeAssigneeRecord(record))
                    .filter(Boolean)
                    .map((record) => [record.user_key, { status: record.status, workflow_state: record.workflow_state }])
            );

            return userKeys
                .map((userKey) => normalizeUserKey(userKey))
                .filter((userKey) => userKey && USERS[userKey])
                .map((userKey) => ({
                    user_key: userKey,
                    status: existingStatusMap.get(userKey)?.status || DEFAULT_ASSIGNEE_STATUS,
                    workflow_state: existingStatusMap.get(userKey)?.workflow_state || getDefaultStateCode().stateCode
                }));
        }

        function getCardAssignees(card) {
            if (!card) return [];

            if (card.dataset.assignees) {
                try {
                    const parsedAssignees = JSON.parse(card.dataset.assignees);
                    if (Array.isArray(parsedAssignees)) {
                        return parsedAssignees.map((record) => normalizeAssigneeRecord(record)).filter(Boolean);
                    }
                } catch (error) {
                }
            }

            return (card.dataset.userKeys || '')
                .split(',')
                .map((key) => normalizeAssigneeRecord(key.trim()))
                .filter(Boolean);
        }

        function setCardAssignees(card, assignees) {
            const normalizedAssignees = assignees.map((record) => normalizeAssigneeRecord(record)).filter(Boolean);
            card.dataset.assignees = JSON.stringify(normalizedAssignees);
            card.dataset.userKeys = normalizedAssignees.map((record) => record.user_key).join(',');

        function getPreferredTrackingUserKey(teamUsers) {

            if (activeTrackingUserKey && teamUsers.includes(activeTrackingUserKey)) return activeTrackingUserKey;
            if (teamUsers.includes(CURRENT_USER_ID)) return CURRENT_USER_ID;

        function getSortedTrackingUsers(teamUsers) {
            return [...teamUsers].sort((userKeyA, userKeyB) => {
                const userA = USERS[userKeyA];
                const userB = USERS[userKeyB];
                const titleA = getJobTitleMetaById(userA.job_title_id);
                const titleB = getJobTitleMetaById(userB.job_title_id);
                const titleSortA = titleA?.sort ?? Number.MAX_SAFE_INTEGER;
                const titleSortB = titleB?.sort ?? Number.MAX_SAFE_INTEGER;

                if (titleSortA !== titleSortB) return titleSortA - titleSortB;

                if (!titleA && !titleB) {
                    const titleCompare = getJobTitleName(userA.job_title_id).localeCompare(getJobTitleName(userB.job_title_id), 'vi');
                    if (titleCompare !== 0) return titleCompare;
                }

            });

        function getTaskDateMeta(dateRaw) {
            if (!dateRaw) {
                return {
                    dateStr: 'Chưa có hạn',
                    statusTextHtml: ''
                };
            }

            const parts = dateRaw.split('-');
            const dateStr = `${parts[2]}/${parts[1]}/${parts[0]}`;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const taskDate = new Date(dateRaw);
            taskDate.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((taskDate - today) / (1000 * 60 * 60 * 24));

            let statusTextHtml = '';
            if (diffDays < 0) statusTextHtml = `<span class="text-[10px] font-bold text-red-500 animate-pulse pl-4">Trễ ${Math.abs(diffDays)} ngày</span>`;
            else if (diffDays === 0) statusTextHtml = `<span class="text-[10px] font-bold text-amber-500 pl-4">Hôm nay</span>`;
            else statusTextHtml = `<span class="text-[10px] font-bold text-blue-500 pl-4">Còn ${diffDays} ngày</span>`;

            return { dateStr, statusTextHtml };
        }

            const matchesStatus = taskDetailChecklistStatusFilter === 'all'
                || (taskDetailChecklistStatusFilter === 'done' && item.is_done)

        function normalizeTaskDocumentLink(value) {
            const trimmedValue = String(value || '').trim();
            if (!trimmedValue) return '';
            if (/^https?:\/\//i.test(trimmedValue)) return trimmedValue;
            if (/^[\w.-]+\.[a-z]{2,}/i.test(trimmedValue)) return `https://${trimmedValue}`;
            return '';
        }

        function hydrateTaskDocumentLinks(root = document) {
            if (!root) return;
            root.querySelectorAll('.task-document-display-note').forEach((noteEl) => {
                if (noteEl.classList.contains('is-placeholder') || noteEl.querySelector('a')) return;
                const noteText = (noteEl.textContent || '').trim();
                const normalizedLink = normalizeTaskDocumentLink(noteText);
                if (!normalizedLink) return;
                noteEl.textContent = '';
                const linkEl = document.createElement('a');
                linkEl.href = normalizedLink;
                linkEl.target = '_blank';
                linkEl.rel = 'noopener noreferrer';
                linkEl.textContent = noteText;
                linkEl.addEventListener('click', (event) => {
                    event.stopPropagation();
                });
                noteEl.appendChild(linkEl);
            });
        }

        function buildLinkifiedTextFragment(text) {
            const fragment = document.createDocumentFragment();
            const sourceText = String(text || '');
            const urlPattern = /(https?:\/\/[^\s<]+|(?:www\.)?[\w.-]+\.[a-z]{2,}(?:\/[^\s<]*)?)/gi;
            let lastIndex = 0;
            let match;
            while ((match = urlPattern.exec(sourceText)) !== null) {
                const matchedText = match[0];
                const matchIndex = match.index;
                if (matchIndex > lastIndex) {
                    fragment.appendChild(document.createTextNode(sourceText.slice(lastIndex, matchIndex)));
                }
                const normalizedLink = normalizeTaskDocumentLink(matchedText);
                if (normalizedLink) {
                    const linkEl = document.createElement('a');
                    linkEl.href = normalizedLink;
                    linkEl.target = '_blank';
                    linkEl.rel = 'noopener noreferrer';
                    linkEl.textContent = matchedText;
                    linkEl.addEventListener('click', (event) => {
                        event.stopPropagation();
                    });
                    fragment.appendChild(linkEl);
                } else {
                    fragment.appendChild(document.createTextNode(matchedText));
                }
                lastIndex = matchIndex + matchedText.length;
            }
            if (lastIndex < sourceText.length) {
                fragment.appendChild(document.createTextNode(sourceText.slice(lastIndex)));
            }
            return fragment;
        }

        function hydrateTaskCommentLinks(root = document) {
            if (!root) return;
            root.querySelectorAll('.task-comment-body').forEach((commentBodyEl) => {
                const walker = document.createTreeWalker(commentBodyEl, NodeFilter.SHOW_TEXT, {
                    acceptNode(textNode) {
                        if (!textNode?.textContent?.trim()) return NodeFilter.FILTER_REJECT;
                        const parentEl = textNode.parentElement;
                        if (!parentEl) return NodeFilter.FILTER_REJECT;
                        if (parentEl.closest('a, .task-comment-mention')) return NodeFilter.FILTER_REJECT;
                        return /https?:\/\/|(?:^|\s)(?:www\.)?[\w.-]+\.[a-z]{2,}/i.test(textNode.textContent)
                            ? NodeFilter.FILTER_ACCEPT
                            : NodeFilter.FILTER_REJECT;
                    }
                });
                const textNodes = [];
                let currentNode = walker.nextNode();
                while (currentNode) {
                    textNodes.push(currentNode);
                    currentNode = walker.nextNode();
                }
                textNodes.forEach((textNode) => {
                    const fragment = buildLinkifiedTextFragment(textNode.textContent || '');
                    textNode.parentNode?.replaceChild(fragment, textNode);
                });
            });
        }

        function hydrateTaskDocumentEditState(root = document) {
            if (!root) return;
            root.querySelectorAll('.task-document-item').forEach((itemEl) => {

        function hydrateTaskDocumentEmptyState(root = document, ticketId = '') {
            if (!root || !ticketId) return;

            if (!documentList) return;

        function normalizeTaskCommentItem(item, fallbackIndex = 0) {
            if (!item) return null;
            const createdBy = normalizeUserKey(item.created_by || item.createdBy || CURRENT_USER_ID);
            return {
                id: item.id || `tcm_${Date.now()}_${fallbackIndex}`,
                created_by: createdBy && USERS[createdBy] ? createdBy : CURRENT_USER_ID,
                created_at: item.created_at || item.createdAt || new Date().toISOString(),
                content_html: sanitizeTaskCommentHtml(item.content_html || item.contentHtml || item.content || ''),
                reply_to_id: item.reply_to_id || item.replyToId || '',
                reactions: normalizeTaskCommentReactions(item.reactions || {})
            };
        }

        function normalizeTaskCommentReactions(reactions) {
            const normalized = {};
            TASK_COMMENT_REACTION_OPTIONS.forEach(({ key }) => {
                normalized[key] = Array.from(new Set(
                    (Array.isArray(reactions?.[key]) ? reactions[key] : [])
                        .map((userKey) => normalizeUserKey(userKey))
                        .filter((userKey) => userKey && USERS[userKey])
                ));
            });
            return normalized;
        }

        function sanitizeTaskCommentNode(node) {
            if (!node) return null;
            if (node.nodeType === Node.TEXT_NODE) {
                return document.createTextNode(node.textContent || '');
            }
            if (node.nodeType !== Node.ELEMENT_NODE) {
                return null;
            }

            const tagName = node.tagName.toLowerCase();
            const allowedTags = new Set(['b', 'strong', 'i', 'em', 'u', 'br', 'p', 'div', 'ul', 'ol', 'li', 'a', 'span']);
            if (!allowedTags.has(tagName)) {
                const fragment = document.createDocumentFragment();
                Array.from(node.childNodes).forEach((childNode) => {
                    const sanitizedChild = sanitizeTaskCommentNode(childNode);
                    if (sanitizedChild) fragment.appendChild(sanitizedChild);
                });
                return fragment;
            }

            const cleanNode = document.createElement(tagName);
            if (tagName === 'a') {
                const href = String(node.getAttribute('href') || '').trim();
                if (/^https?:\/\//i.test(href)) {
                    cleanNode.setAttribute('href', href);
                    cleanNode.setAttribute('target', '_blank');
                    cleanNode.setAttribute('rel', 'noopener noreferrer');
                }
            }
            if (tagName === 'span') {
                const userKey = normalizeUserKey(node.getAttribute('data-user-key') || '');
                if (userKey && USERS[userKey] && node.classList.contains('task-comment-mention')) {
                    cleanNode.className = 'task-comment-mention';
                    cleanNode.setAttribute('data-user-key', userKey);
                    cleanNode.textContent = `@${USERS[userKey].full_name || userKey}`;
                    return cleanNode;
                }
            }

            Array.from(node.childNodes).forEach((childNode) => {
                const sanitizedChild = sanitizeTaskCommentNode(childNode);
                if (sanitizedChild) cleanNode.appendChild(sanitizedChild);
            });
            return cleanNode;
        }

        function sanitizeTaskCommentHtml(value) {
            const template = document.createElement('template');
            template.innerHTML = String(value || '');
            const wrapper = document.createElement('div');
            Array.from(template.content.childNodes).forEach((childNode) => {
                const sanitizedNode = sanitizeTaskCommentNode(childNode);
                if (sanitizedNode) wrapper.appendChild(sanitizedNode);
            });
            return wrapper.innerHTML.trim();
        }

        function getTaskCommentPlainText(value) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = String(value || '');
            return (wrapper.textContent || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function formatTaskCommentTimestamp(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${day}/${month}/${year} ${hours}:${minutes}`;
        }

        function getTaskCommentShortcutKeys() {
            return IS_MAC_OS ? ['Cmd', 'Enter'] : ['Ctrl', 'Enter'];
        }

        function getTaskCommentById(ticketState, commentId) {
            if (!ticketState || !commentId) return null;
            return (ticketState.comments || []).map((item, index) => normalizeTaskCommentItem(item, index)).find((item) => item?.id === commentId) || null;
        }

        function getTaskCommentPreviewText(comment) {
            if (!comment) return '';
            const plainText = getTaskCommentPlainText(comment.content_html || '');
            if (!plainText) return '';
            return plainText.length > 160 ? `${plainText.slice(0, 157)}...` : plainText;
        }

        function toggleTaskCommentReaction(ticketId, commentId, reactionKey, event = null) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            if (!ticketId || !commentId || !reactionKey) return;
            updateTaskComments(ticketId, (comments) => comments.map((comment) => {
                if (comment.id !== commentId) return comment;
                const currentReactionUsers = Array.isArray(comment.reactions?.[reactionKey]) ? comment.reactions[reactionKey] : [];
                const hasReacted = currentReactionUsers.includes(CURRENT_USER_ID);
                return {
                    ...comment,
                    reactions: {
                        ...normalizeTaskCommentReactions(comment.reactions || {}),
                        [reactionKey]: hasReacted
                            ? currentReactionUsers.filter((userKey) => userKey !== CURRENT_USER_ID)
                            : [...currentReactionUsers, CURRENT_USER_ID]
                    }
                };
            }));
        }

        function toggleTaskCommentReactionMenu(commentId, event = null) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            currentTaskCommentReactionMenuId = currentTaskCommentReactionMenuId === commentId ? '' : commentId;
            renderTaskDetailsDrawer();
        }

        function closeTaskCommentReactionMenu() {
            if (!currentTaskCommentReactionMenuId) return;
            currentTaskCommentReactionMenuId = '';
            renderTaskDetailsDrawer();
        }

        function setTaskCommentReply(commentId = '', event = null) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            currentTaskCommentReplyId = commentId || '';
            renderTaskDetailsDrawer();
            window.requestAnimationFrame(() => {
                const { editor } = getTaskCommentComposerElements();
                editor?.focus?.();
            });
        }

        function scrollToTaskComment(commentId, event = null) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            if (!commentId) return;
            const targetEl = document.querySelector(`.task-comment-item[data-comment-id="${commentId}"]`);
            if (!targetEl) return;
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            targetEl.classList.remove('is-jump-target');
            window.requestAnimationFrame(() => {
                targetEl.classList.add('is-jump-target');
            });
            window.setTimeout(() => {
                targetEl.classList.remove('is-jump-target');
            }, 1800);
        }

        function getTaskCommentMentionOptions(ticketState) {
            const normalizedState = normalizeTicketState(ticketState);
            if (!normalizedState) return [];
            return Array.from(new Set([
                CURRENT_USER_ID,
                ...getAssignableUserKeys(),
                ...normalizedState.assignees.map((record) => record.user_key)
            ])).filter((userKey) => userKey && USERS[userKey] && USERS[userKey].is_active);
        }

        function updateTaskComments(ticketId, updater) {
            updateBoardTicket(ticketId, (ticketState) => {
                const comments = (ticketState.comments || []).map((item, index) => normalizeTaskCommentItem(item, index)).filter(Boolean);
                const nextComments = typeof updater === 'function' ? updater(comments, ticketState) : updater;
                return {
                    ...ticketState,
                    comments: (nextComments || []).map((item, index) => normalizeTaskCommentItem(item, index)).filter(Boolean)
                };
            });
            saveBoardState();
            if (currentTaskDetailTicketId === ticketId) {
                renderTaskDetailsDrawer();
            }
        }

        function getTaskCommentComposerElements() {
            const root = document.getElementById('taskDetailsDrawerRoot');
            if (!root) return {};
            return {
                root,
                editor: root.querySelector('#taskCommentComposerInput'),
                popup: root.querySelector('#taskCommentMentionPopup')
            };
        }

        function syncTaskCommentComposerPlaceholder(editor) {
            if (!editor) return;
            const hasText = !!getTaskCommentPlainText(editor.innerHTML);
            editor.classList.toggle('is-empty', !hasText);
        }

        function closeTaskCommentMentionPopup() {
            const { popup } = getTaskCommentComposerElements();
            if (!popup) return;
            popup.classList.remove('is-open');
            popup.innerHTML = '';
            taskCommentMentionActiveIndex = 0;
        }

        function renderTaskCommentMentionPopup(options = [], query = '') {
            const { popup } = getTaskCommentComposerElements();
            if (!popup) return;
            if (!options.length) {
                closeTaskCommentMentionPopup();
                return;
            }
            if (taskCommentMentionActiveIndex >= options.length) {
                taskCommentMentionActiveIndex = 0;
            }
            popup.innerHTML = options.map((userKey, index) => {
                const user = USERS[userKey];
                const jobTitle = getJobTitleName(user.job_title_id);
                return `
                    <button
                        type="button"
                        class="task-comment-mention-option ${index === taskCommentMentionActiveIndex ? 'is-active' : ''}"
                        data-user-key="${escapeHtml(userKey)}"
                        onmousedown="chooseTaskCommentMention('${escapeHtml(userKey)}', event)"
                    >
                        <span class="task-comment-mention-avatar" style="background:${escapeHtml(user.color || '#2563eb')}">${escapeHtml(adminUserInitials(user.full_name || userKey))}</span>
                        <span class="task-comment-mention-meta">
                            <span class="task-comment-mention-name">${escapeHtml(user.full_name || userKey)}</span>
                            <span class="task-comment-mention-subtitle">${escapeHtml(jobTitle)}${query ? ` • @${escapeHtml(query)}` : ''}</span>
                        </span>
                    </button>
                `;
            }).join('');
            popup.classList.add('is-open');
        }

        function getTaskCommentActiveMention(editor) {
            if (!editor) return null;
            const selection = window.getSelection();
            if (!selection || !selection.rangeCount || !selection.isCollapsed) return null;
            const range = selection.getRangeAt(0);
            if (!editor.contains(range.endContainer)) return null;
            if (range.endContainer.nodeType !== Node.TEXT_NODE) return null;
            const textBeforeCaret = range.endContainer.textContent.slice(0, range.endOffset);
            const mentionMatch = textBeforeCaret.match(/(^|\s)@([^\s@]*)$/);
            if (!mentionMatch) return null;
            const query = mentionMatch[2] || '';
            const startOffset = textBeforeCaret.lastIndexOf(`@${query}`);
            if (startOffset < 0) return null;
            return {
                textNode: range.endContainer,
                startOffset,
                query
            };
        }

        function updateTaskCommentMentionSuggestions(ticketId = currentTaskDetailTicketId) {
            if (!ticketId) return closeTaskCommentMentionPopup();
            const ticketState = getTaskDetailById(ticketId);
            const { editor } = getTaskCommentComposerElements();
            if (!ticketState || !editor) return closeTaskCommentMentionPopup();
            const activeMention = getTaskCommentActiveMention(editor);
            if (!activeMention) return closeTaskCommentMentionPopup();
            const normalizedQuery = activeMention.query.trim().toLowerCase();
            const options = getTaskCommentMentionOptions(ticketState).filter((userKey) => {
                const user = USERS[userKey];
                const haystack = `${user.full_name || ''} ${userKey}`.toLowerCase();
                return !normalizedQuery || haystack.includes(normalizedQuery);
            });
            renderTaskCommentMentionPopup(options, activeMention.query);
        }

        function chooseTaskCommentMention(userKey, event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const { editor } = getTaskCommentComposerElements();
            if (!editor || !USERS[userKey]) return;
            editor.focus();
            const activeMention = getTaskCommentActiveMention(editor);
            const selection = window.getSelection();
            if (!selection || !selection.rangeCount) return;
            const currentRange = selection.getRangeAt(0);
            if (activeMention && activeMention.textNode === currentRange.endContainer) {
                const replaceRange = document.createRange();
                replaceRange.setStart(activeMention.textNode, activeMention.startOffset);
                replaceRange.setEnd(currentRange.endContainer, currentRange.endOffset);
                selection.removeAllRanges();
                selection.addRange(replaceRange);
            }
            const mentionHtml = `<span class="task-comment-mention" data-user-key="${escapeHtml(userKey)}" contenteditable="false">@${escapeHtml(USERS[userKey].full_name || userKey)}</span>&nbsp;`;
            document.execCommand('insertHTML', false, mentionHtml);
            taskCommentComposerDraftHtml = sanitizeTaskCommentHtml(editor.innerHTML);
            syncTaskCommentComposerPlaceholder(editor);
            closeTaskCommentMentionPopup();
        }

        function handleTaskCommentComposerKeydown(event) {
            const { popup } = getTaskCommentComposerElements();
            if (!popup || !popup.classList.contains('is-open')) {
                if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
                    submitTaskComment(currentTaskDetailTicketId, event);
                }
                return;
            }
            const options = Array.from(popup.querySelectorAll('.task-comment-mention-option'));
            if (!options.length) return;
            if (event.key === 'ArrowDown') {
                event.preventDefault();
                taskCommentMentionActiveIndex = (taskCommentMentionActiveIndex + 1) % options.length;
                const userKey = options[taskCommentMentionActiveIndex]?.dataset.userKey || '';
                renderTaskCommentMentionPopup(options.map((option) => option.dataset.userKey), '');
                popup.querySelector(`[data-user-key="${userKey}"]`)?.scrollIntoView({ block: 'nearest' });
                return;
            }
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                taskCommentMentionActiveIndex = (taskCommentMentionActiveIndex - 1 + options.length) % options.length;
                const userKey = options[taskCommentMentionActiveIndex]?.dataset.userKey || '';
                renderTaskCommentMentionPopup(options.map((option) => option.dataset.userKey), '');
                popup.querySelector(`[data-user-key="${userKey}"]`)?.scrollIntoView({ block: 'nearest' });
                return;
            }
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                const activeOption = options[taskCommentMentionActiveIndex] || options[0];
                if (activeOption?.dataset.userKey) {
                    chooseTaskCommentMention(activeOption.dataset.userKey, event);
                }
                return;
            }
            if (event.key === 'Escape') {
                event.preventDefault();
                closeTaskCommentMentionPopup();
            }
        }

        function formatTaskComment(command, event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const { editor } = getTaskCommentComposerElements();
            if (!editor) return;
            editor.focus();
            document.execCommand(command, false, null);
            taskCommentComposerDraftHtml = sanitizeTaskCommentHtml(editor.innerHTML);
            syncTaskCommentComposerPlaceholder(editor);
        }

        function openTaskCommentMentionPicker(event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const { editor } = getTaskCommentComposerElements();
            if (!editor) return;
            editor.focus();
            taskCommentMentionActiveIndex = 0;
            renderTaskCommentMentionPopup(getTaskCommentMentionOptions(getTaskDetailById(currentTaskDetailTicketId)), '');
        }

        function submitTaskComment(ticketId, event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            if (!ticketId) return;
            const { editor } = getTaskCommentComposerElements();
            if (!editor) return;
            const contentHtml = sanitizeTaskCommentHtml(editor.innerHTML);
            if (!getTaskCommentPlainText(contentHtml)) {
                editor.focus();
                syncTaskCommentComposerPlaceholder(editor);
                return;
            }
            const newComment = normalizeTaskCommentItem({
                id: `tcm_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                created_by: CURRENT_USER_ID,
                created_at: new Date().toISOString(),
                content_html: contentHtml,
                reply_to_id: currentTaskCommentReplyId
            });
            updateTaskComments(ticketId, (comments) => [newComment, ...comments]);
            taskCommentComposerDraftHtml = '';
            currentTaskCommentReplyId = '';
            closeTaskCommentMentionPopup();
            window.requestAnimationFrame(() => {
                const { editor: nextEditor } = getTaskCommentComposerElements();
                if (!nextEditor) return;
                nextEditor.innerHTML = '';
                syncTaskCommentComposerPlaceholder(nextEditor);
                nextEditor.focus();
            });
        }

        function hydrateTaskCommentComposer(root = document, ticketState = null) {
            if (!root || !ticketState) return;
            const editor = root.querySelector('#taskCommentComposerInput');
            if (!editor) return;
            const popup = root.querySelector('#taskCommentMentionPopup');
            if (editor.dataset.bound !== 'true') {
                editor.addEventListener('input', function () {
                    taskCommentComposerDraftHtml = sanitizeTaskCommentHtml(this.innerHTML);
                    syncTaskCommentComposerPlaceholder(this);
                    updateTaskCommentMentionSuggestions(ticketState.ticket_id);
                });
                editor.addEventListener('keydown', handleTaskCommentComposerKeydown);
                editor.addEventListener('focus', function () {
                    syncTaskCommentComposerPlaceholder(this);
                });
                editor.addEventListener('blur', function () {
                    window.setTimeout(() => {
                        if (!popup?.matches(':hover')) closeTaskCommentMentionPopup();
                    }, 120);
                });
                editor.addEventListener('paste', function (pasteEvent) {
                    pasteEvent.preventDefault();
                    const pastedText = pasteEvent.clipboardData?.getData('text/plain') || '';
                    document.execCommand('insertText', false, pastedText);
                });
                editor.dataset.bound = 'true';
            }
            editor.innerHTML = taskCommentComposerDraftHtml || '';
            syncTaskCommentComposerPlaceholder(editor);
        }

        function focusChecklistItemInput(itemId) {
            if (!itemId) return;
            const input = document.querySelector(`#taskChecklistList [data-checklist-id="${itemId}"] .task-checklist-title-input`);
            if (!input) return;
            input.focus();
            const valueLength = input.value?.length || 0;
            if (typeof input.setSelectionRange === 'function') {
                input.setSelectionRange(valueLength, valueLength);
            }
        }

        function updateTaskChecklist(ticketId, updater) {
            updateBoardTicket(ticketId, (ticketState) => {
                const checklist = (ticketState.checklist || []).map((item, index) => normalizeChecklistItem(item, index)).filter(Boolean);
                const nextChecklist = typeof updater === 'function' ? updater(checklist, ticketState) : updater;
                return {
                    ...ticketState,
                    checklist: (nextChecklist || []).map((item, index) => normalizeChecklistItem(item, index)).filter(Boolean)
                };
            });
            saveBoardState();
            if (currentTaskDetailTicketId === ticketId) {
                renderTaskDetailsDrawer();
            }
        }

        function addTaskChecklistItem(ticketId, event) {
            event?.stopPropagation?.();
            const ticketState = getTaskDetailById(ticketId);
            if (!ticketState) return;
            if (taskDetailChecklistStatusFilter === 'done') {
                taskDetailChecklistStatusFilter = 'incomplete';
                localStorage.setItem(TASK_CHECKLIST_STATUS_FILTER_STORAGE_KEY, taskDetailChecklistStatusFilter);
            }
            if (isTaskChecklistCollapsed) {
                isTaskChecklistCollapsed = false;
                localStorage.setItem(TASK_CHECKLIST_COLLAPSED_STORAGE_KEY, 'false');
            }

        function getChecklistDateViewBase(dateRaw) {
            if (dateRaw) {
                const [year, month] = dateRaw.split('-').map(Number);
                if (year && month) {
                    return { year, month: month - 1 };
                }
            }
            const today = new Date();
            return { year: today.getFullYear(), month: today.getMonth() };
        }

        function buildTaskChecklistDateGrid(year, month, selectedDateRaw) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const firstDay = new Date(year, month, 1);
            const startDate = new Date(year, month, 1 - firstDay.getDay());
            const selectedDate = selectedDateRaw ? new Date(selectedDateRaw) : null;
            if (selectedDate) selectedDate.setHours(0, 0, 0, 0);
            const cells = [];

            for (let index = 0; index < 42; index += 1) {
                const cellDate = new Date(startDate);
                cellDate.setDate(startDate.getDate() + index);
                cellDate.setHours(0, 0, 0, 0);
                const isOutside = cellDate.getMonth() !== month;
                const isToday = cellDate.getTime() === today.getTime();
                const isSelected = selectedDate && cellDate.getTime() === selectedDate.getTime();
                const raw = `${cellDate.getFullYear()}-${String(cellDate.getMonth() + 1).padStart(2, '0')}-${String(cellDate.getDate()).padStart(2, '0')}`;
                cells.push({
                    raw,
                    label: String(cellDate.getDate()),
                    isOutside,
                    isToday,
                    isSelected
                });
            }

            return cells;
        }

        function getChecklistDateViewLabel(year, month) {
            return new Date(year, month, 1).toLocaleDateString('en-US', {

            openTaskChecklistAssigneeItemId = null;
            const viewBase = getChecklistDateViewBase(dateRaw);
            openTaskChecklistDateItemId = itemId;
            taskChecklistDateViewYear = viewBase.year;
            taskChecklistDateViewMonth = viewBase.month;
            syncTaskDetailsDrawer();

            const raw = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            openTaskChecklistDateItemId = null;

        function getChecklistDeadlineDisplayMeta(dateRaw) {
            if (!dateRaw) {
                return {
                    is_placeholder: true,
                    date_label: 'dd/mm/yyyy',
                    days_value: null,
                    days_class: ''
                };
            }

            const parts = dateRaw.split('-');
            const dateLabel = parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : dateRaw;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const targetDate = new Date(dateRaw);
            targetDate.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                return {
                    is_placeholder: false,
                    date_label: dateLabel,
                    days_value: diffDays,
                    days_class: 'is-positive'
                };
            }

            if (diffDays < 0) {
                return {
                    is_placeholder: false,
                    date_label: dateLabel,
                    days_value: Math.abs(diffDays),
                    days_class: 'is-negative'
                };
            }

            return {
                is_placeholder: false,
                date_label: dateLabel,
                days_value: 0,
                days_class: 'is-today'
            };
        }

        function reorderTaskChecklist(ticketId, orderedIds) {
            updateTaskChecklist(ticketId, (checklist) => {
                const itemMap = new Map(checklist.map((item) => [item.id, item]));
                if (!taskDetailChecklistFilterKey && taskDetailChecklistStatusFilter === 'all') {
                    return orderedIds.map((id) => itemMap.get(id)).filter(Boolean);
                }

                const visibleIds = checklist
                    .filter((item) => matchesTaskChecklistActiveFilters(item))
                    .map((item) => item.id);
                const visibleSet = new Set(visibleIds);
                const reorderedVisibleItems = orderedIds.map((id) => itemMap.get(id)).filter(Boolean);
                let visibleIndex = 0;

                return checklist.map((item) => {
                    if (!visibleSet.has(item.id)) return item;
                    const nextVisibleItem = reorderedVisibleItems[visibleIndex];
                    visibleIndex += 1;
                    return nextVisibleItem || item;
                });
            });
        }

        function renderTaskDetailsDrawer(options = {}) {
            const { animate = false } = options;
            const root = document.getElementById('taskDetailsDrawerRoot');
            if (!root) return;

            const ticketState = currentTaskDetailTicketId ? getTaskDetailById(currentTaskDetailTicketId) : null;
            if (!ticketState) {
                root.innerHTML = '';
                return;
            }

            const hadOpenDrawer = !!root.querySelector('.task-detail-drawer-layer.is-open');
            root.innerHTML = buildTaskDetailsDrawerHtmlV2(ticketState);
            const drawerLayer = root.querySelector('.task-detail-drawer-layer');
            if (!drawerLayer) return;
            if (!animate || hadOpenDrawer) {
                drawerLayer.classList.add('is-open');
            }
            root.querySelectorAll('.task-checklist-title-input').forEach((textarea) => {
                autoResize(textarea);
            });
            root.querySelectorAll('.task-document-note-input').forEach((textarea) => {
                autoResize(textarea);
            });
            if (pendingChecklistFocusItemId) {
                const targetItemId = pendingChecklistFocusItemId;
                pendingChecklistFocusItemId = null;
                window.requestAnimationFrame(() => {
                    focusChecklistItemInput(targetItemId);
                });
            }
            if (pendingTaskDocumentFocusItemId) {
                const targetItemId = pendingTaskDocumentFocusItemId;
                pendingTaskDocumentFocusItemId = null;
                window.requestAnimationFrame(() => {
                    focusTaskDocumentTitleInput(targetItemId);
                });
            }
            initializeTaskChecklistSortable(ticketState.ticket_id);
            initializeTaskDocumentSortable(ticketState.ticket_id);
            syncTaskChecklistTagStyles(ticketState);
            hydrateTaskDocumentLinks(root);
            hydrateTaskDocumentEditState(root);
            hydrateTaskDocumentEmptyState(root, ticketState.ticket_id);
            hydrateTaskCommentLinks(root);
            hydrateTaskCommentComposer(root, ticketState);
            if (taskDetailEditDraft?.ticket_id === ticketState.ticket_id) {
                const editDesc = root.querySelector('#taskDetailEditDesc');
                if (editDesc) {
                    autoResize(editDesc);
                    editDesc.addEventListener('input', function () { autoResize(this); });
                }
                const editNote = root.querySelector('#taskDetailEditNote');
                if (editNote) {
                    autoResize(editNote);
                    editNote.addEventListener('input', function () { autoResize(this); });
                }
                initCustomSelect(root.querySelector('#taskDetailEditPrivacyWrapper'));
                initCustomDatePicker(root.querySelector('#taskDetailEditDateWrapper'));
            }

            if (animate && !hadOpenDrawer) {
                window.requestAnimationFrame(() => {
                    window.requestAnimationFrame(() => {
                        drawerLayer.classList.add('is-open');

            if (!currentTaskDetailTicketId) return;
            if (!getTaskDetailById(currentTaskDetailTicketId)) {
                currentTaskDetailTicketId = null;
                taskDetailEditDraft = null;

                return;

            renderTaskDetailsDrawer();

            if (!ticketId) return;
            currentTaskDetailTicketId = ticketId;
            taskDetailEditDraft = null;
            taskDetailChecklistFilterKey = localStorage.getItem(TASK_CHECKLIST_USER_FILTER_STORAGE_KEY) || '';
            taskDetailChecklistStatusFilter = localStorage.getItem(TASK_CHECKLIST_STATUS_FILTER_STORAGE_KEY) || 'all';
            taskDetailCommentFilterKey = '';
            isTaskChecklistCollapsed = localStorage.getItem(TASK_CHECKLIST_COLLAPSED_STORAGE_KEY) === 'true';

            if (!root) return;

            if (!drawerLayer) {
                currentTaskDetailTicketId = null;
                taskDetailEditDraft = null;
                openTaskChecklistDateItemId = null;
                taskDetailCommentFilterKey = '';
                taskCommentComposerDraftHtml = '';
                currentTaskCommentReplyId = '';
                currentTaskCommentReactionMenuId = '';

                taskDetailEditDraft = null;
                openTaskChecklistDateItemId = null;
                taskDetailCommentFilterKey = '';
                taskCommentComposerDraftHtml = '';
                currentTaskCommentReplyId = '';
                currentTaskCommentReactionMenuId = '';
