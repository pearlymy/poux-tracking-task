<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.468.0?deps=react@18.2.0"
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes flashHighlight {
            0%, 100% { background-color: rgba(253, 230, 138, 0.7); }
            50% { background-color: #f59e0b; color: #ffffff; }
        }
        .animate-flash-once {
            animation: flashHighlight 0.7s ease-in-out 1;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(1rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-toast-in {
            animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes smartSortMenuIn {
            from { opacity: 0; transform: translateY(-8px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .smart-sort-lov {
            min-width: 188px;
        }
        .smart-filter-lov {
            min-width: 150px;
        }
        .smart-sort-trigger {
            width: 100%;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid #dbe3ef;
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            color: #334155;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.07);
            font-size: 13px;
            font-weight: 800;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
        }
        .smart-sort-trigger:hover,
        .smart-sort-lov.is-open .smart-sort-trigger {
            border-color: #cbd5e1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12), 0 12px 24px rgba(15, 23, 42, 0.08);
        }
        .smart-sort-trigger:active {
            transform: none;
        }
        .smart-sort-chevron {
            color: #64748b;
            transition: transform 0.18s ease;
        }
        .smart-sort-lov.is-open .smart-sort-chevron {
            transform: rotate(180deg);
        }
        .smart-sort-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            z-index: 80;
            width: 100%;
            min-width: 210px;
            padding: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 22px 48px rgba(15, 23, 42, 0.16), 0 8px 18px rgba(15, 23, 42, 0.08);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px) scale(0.96);
            transform-origin: left top;
        }
        .smart-sort-lov.is-open .smart-sort-menu {
            animation: smartSortMenuIn 0.18s cubic-bezier(0.2, 0.8, 0.2, 1) both;
            pointer-events: auto;
        }
        .smart-filter-lov .smart-sort-menu {
            min-width: 190px;
        }
        .smart-sort-option {
            width: 100%;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 0 10px 0 12px;
            border: 0;
            border-radius: 11px;
            background: transparent;
            color: #475569;
            cursor: pointer;
            font-size: 13px;
            font-weight: 750;
            text-align: left;
            transition: background 0.14s ease, color 0.14s ease, transform 0.14s ease;
        }
        .smart-sort-option:hover,
        .smart-sort-option:focus-visible {
            background: #f8fafc;
            color: #0f172a;
            outline: none;
            transform: none;
        }
        .smart-sort-option.is-active {
            background: #eef2f7;
            color: #0f172a;
        }
        .smart-sort-check {
            opacity: 0;
            transform: scale(0.86);
            transition: opacity 0.14s ease, transform 0.14s ease;
        }
        .smart-sort-option.is-active .smart-sort-check {
            opacity: 1;
            transform: scale(1);
        }
        .inline-date-filter {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #dbe3ef;
            border-radius: 14px;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.07);
            padding: 4px;
            color: #475569;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        .inline-date-filter:hover,
        .inline-date-filter:focus-within,
        .inline-date-filter.is-active {
            border-color: #cbd5e1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12), 0 12px 24px rgba(15, 23, 42, 0.08);
        }
        .inline-date-title {
            padding: 0 7px 0 8px;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }
        .date-pill {
            position: relative;
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: 1px solid transparent;
            border-radius: 11px;
            background: #f8fafc;
            padding: 0 10px;
            color: #475569;
            cursor: pointer;
            transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
        }
        .date-pill:hover,
        .date-pill:focus-within {
            border-color: #e2e8f0;
            background: #ffffff;
            color: #0f172a;
        }
        .date-pill-label {
            color: #94a3b8;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
        }
        .date-pill-value {
            min-width: 74px;
            color: #334155;
            font-size: 12px;
            font-weight: 850;
            white-space: nowrap;
        }
        .date-pill-value.is-empty {
            color: #94a3b8;
        }
        .date-pill-icon {
            width: 14px;
            height: 14px;
            color: #94a3b8;
            pointer-events: none;
        }
        .inline-date-separator {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 800;
            padding: 0 2px;
        }
        .date-popover {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            z-index: 90;
            width: 286px;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 24px 54px rgba(15, 23, 42, 0.16), 0 8px 18px rgba(15, 23, 42, 0.08);
            animation: smartSortMenuIn 0.18s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        }
        .date-popover-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }
        .date-popover-title {
            color: #0f172a;
            font-size: 13px;
            font-weight: 850;
        }
        .date-nav-btn {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            color: #64748b;
            cursor: pointer;
            transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
        }
        .date-nav-btn:hover,
        .date-nav-btn:focus-visible {
            border-color: #cbd5e1;
            background: #f8fafc;
            color: #0f172a;
            outline: none;
        }
        .date-week-grid,
        .date-day-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 4px;
        }
        .date-weekday {
            display: grid;
            place-items: center;
            height: 24px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .date-day-btn {
            height: 32px;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: #334155;
            cursor: pointer;
            font-size: 12px;
            font-weight: 800;
            transition: background 0.12s ease, color 0.12s ease, transform 0.12s ease;
        }
        .date-day-btn:hover,
        .date-day-btn:focus-visible {
            background: #f1f5f9;
            color: #0f172a;
            outline: none;
        }
        .date-day-btn.is-muted {
            color: #cbd5e1;
        }
        .date-day-btn.is-today {
            box-shadow: inset 0 0 0 1px #cbd5e1;
        }
        .date-day-btn.is-selected {
            background: #0f172a;
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.16);
        }
        .date-popover-foot {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f1f5f9;
        }
        .date-foot-btn {
            min-height: 30px;
            border: 0;
            border-radius: 10px;
            background: transparent;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
            font-weight: 850;
            padding: 0 10px;
        }
        .date-foot-btn:hover,
        .date-foot-btn:focus-visible {
            background: #f8fafc;
            color: #0f172a;
            outline: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>

    <script type="module">
        import React, { useEffect, useMemo, useState, useRef } from "react";
        import { createRoot } from "react-dom/client";
        import {
            Search,
            Plus,
            Folder,
            File,
            Menu,
            X,
            Pencil,
            Trash2,
            BookOpen,
            ChevronRight,
            ChevronLeft,
            ArrowLeft,
            ArrowRight,
            ChevronDown,
            Check,
            Clock,
            CalendarDays,
            User,
            Link2,
        } from "lucide-react";

        const h = React.createElement;
        const DATA_SOURCE = "local";
        const STORAGE_KEY = "team_documents_dashboard_v1";
        const BUILDER_DOCUMENTS_STORAGE_KEY = "document_builder_documents_v1";
        const SEARCH_HISTORY_KEY = "team_documents_search_history_v1";
        const VIEW_MODES = [
            { id: "card", title: "Card" },
            { id: "timeline", title: "Timeline" }
        ];
        const SORT_MODES = [
            { id: "updated-desc", title: "Cập nhật mới nhất" },
            { id: "created-desc", title: "Ngày tạo mới nhất" },
            { id: "title-asc", title: "Tên A-Z" }
        ];

        const initialData = {
            categories: [
                { id: "cat-onboarding", name: "Onboarding" },
                { id: "cat-process", name: "Quy trình" },
                { id: "cat-technical", name: "Technical" }
            ],
            articles: [
                {
                    id: "art-welcome",
                    categoryId: "cat-onboarding",
                    title: "Checklist thành viên mới",
                    description: "Những việc cần hoàn tất trong tuần đầu tiên.",
                    content: "Cấp tài khoản, đọc quy định team, setup công cụ và tham gia buổi sync đầu tiên.",
                    createdAt: "2026-04-26T08:00:00.000Z",
                    author: "Phan Hiếu"
                },
                {
                    id: "art-release",
                    categoryId: "cat-process",
                    title: "Quy trình release",
                    description: "",
                    content: "Kiểm tra checklist QA trước khi release.\nThông báo thay đổi trên kênh team và cập nhật changelog.",
                    createdAt: "2026-04-26T09:30:00.000Z",
                    author: "An Nguyễn"
                },
                {
                    id: "art-api",
                    categoryId: "cat-technical",
                    title: "Hướng dẫn tích hợp API",
                    description: "Tài liệu mẫu cho các endpoint nội bộ.",
                    content: "Mỗi endpoint cần có request sample, response sample và mã lỗi thường gặp.",
                    createdAt: "2026-04-26T10:00:00.000Z",
                    author: "Đắc Lê"
                }
            ]
        };

        const createId = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;

        const normalizeStatus = (status) => ["draft", "published", "archived"].includes(status) ? status : "published";

        const syncBuilderDocumentStatus = (article) => {
            if (DATA_SOURCE !== "local" || !article?.id) return;
            try {
                const raw = JSON.parse(localStorage.getItem(BUILDER_DOCUMENTS_STORAGE_KEY) || "{}");
                const docs = Array.isArray(raw) ? raw : raw.documents;
                if (!Array.isArray(docs)) return;
                let changed = false;
                const status = normalizeStatus(article.status);
                const nextDocs = docs.map((doc) => {
                    if (!doc || (doc.id !== article.id && doc.sourceArticleId !== article.id)) return doc;
                    changed = true;
                    return {
                        ...doc,
                        status,
                        archived: status === "archived",
                        publishedAt: article.publishedAt || null,
                        title: article.title || doc.title || 'Untitled document',
                        sourceArticleId: article.id,
                        sourceCategoryId: article.categoryId || doc.sourceCategoryId || null,
                        sourceAuthor: article.author || doc.sourceAuthor || null,
                        sourceDescription: article.description || "",
                        updatedAt: article.updatedAt || doc.updatedAt || new Date().toISOString(),
                        publishedSignature: status === "published" ? doc.publishedSignature || "" : ""
                    };
                });
                if (!changed) return;
                localStorage.setItem(BUILDER_DOCUMENTS_STORAGE_KEY, JSON.stringify(Array.isArray(raw) ? nextDocs : { ...raw, documents: nextDocs }));
            } catch (error) {
                console.warn("Không thể đồng bộ trạng thái sang builder draft.", error);
            }
        };

        const deleteBuilderDocumentForArticle = (articleId) => {
            if (DATA_SOURCE !== "local" || !articleId) return;
            try {
                const raw = JSON.parse(localStorage.getItem(BUILDER_DOCUMENTS_STORAGE_KEY) || "{}");
                const docs = Array.isArray(raw) ? raw : raw.documents;
                if (!Array.isArray(docs)) return;
                const nextDocs = docs.filter((doc) => doc && doc.id !== articleId && doc.sourceArticleId !== articleId);
                if (nextDocs.length === docs.length) return;
                localStorage.setItem(BUILDER_DOCUMENTS_STORAGE_KEY, JSON.stringify(Array.isArray(raw) ? nextDocs : { ...raw, documents: nextDocs }));
            } catch (error) {
                console.warn("KhÃ´ng thá»ƒ xÃ³a draft liÃªn káº¿t trong builder.", error);
            }
        };

        const getStatusMeta = (status) => {
            if (status === "draft") return { label: "Draft", className: "bg-amber-50 text-amber-700 border-amber-200" };
            if (status === "archived") return { label: "Archived", className: "bg-rose-50 text-rose-700 border-rose-200" };
            return { label: "Published", className: "bg-emerald-50 text-emerald-700 border-emerald-200" };
        };

        const normalizeArticle = (article) => {
            const createdAt = article?.createdAt || new Date().toISOString();
            return {
                id: article?.id || createId("art"),
                categoryId: article?.categoryId || "",
                title: article?.title || "Untitled document",
                description: article?.description || "",
                content: article?.content || "",
                builderBlocks: Array.isArray(article?.builderBlocks) ? article.builderBlocks : null,
                createdAt,
                updatedAt: article?.updatedAt || createdAt,
                publishedAt: article?.publishedAt || null,
                status: normalizeStatus(article?.status),
                author: article?.author || "Thành viên"
            };
        };

        const normalizeStore = (data) => {
            const source = data && typeof data === "object" ? data : initialData;
            return {
                categories: Array.isArray(source.categories) ? source.categories : [],
                articles: Array.isArray(source.articles) ? source.articles.map(normalizeArticle) : []
            };
        };

        const readStore = () => {
            if (DATA_SOURCE !== "local") return normalizeStore(initialData);

            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    const normalized = normalizeStore(initialData);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
                    return normalized;
                }

                const parsed = JSON.parse(raw);
                const normalized = normalizeStore(parsed);
                if (JSON.stringify(parsed) !== JSON.stringify(normalized)) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
                }
                return normalized;
            } catch (error) {
                console.warn("Không thể đọc kho tài liệu. Đang dùng dữ liệu mặc định.", error);
                return normalizeStore(initialData);
            }
        };

        const writeStore = (data) => {
            if (DATA_SOURCE === "local") {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
            return data;
        };

        const DataService = {
            getData() {
                return readStore();
            },
            getCategories() {
                return readStore().categories;
            },
            getArticles() {
                return readStore().articles;
            },
            addCategory(name) {
                const data = readStore();
                const category = { id: createId("cat"), name: name.trim() };
                return writeStore({ ...data, categories: [category, ...data.categories] });
            },
            reorderCategories(categories) {
                const data = readStore();
                return writeStore({ ...data, categories });
            },
            updateCategory(id, updates) {
                const data = readStore();
                return writeStore({
                    ...data,
                    categories: data.categories.map((category) =>
                        category.id === id ? { ...category, ...updates } : category
                    )
                });
            },
            deleteCategory(id) {
                const data = readStore();
                const fallbackCategory = data.categories.find((category) => category.id !== id);
                return writeStore({
                    categories: data.categories.filter((category) => category.id !== id),
                    articles: data.articles.map((article) =>
                        article.categoryId === id
                            ? { ...article, categoryId: fallbackCategory?.id || "" }
                            : article
                    )
                });
            },
            addArticle(article) {
                const data = readStore();
                const now = new Date().toISOString();
                const nextArticle = {
                    ...article,
                    id: createId("art"),
                    createdAt: now,
                    updatedAt: now,
                    publishedAt: null,
                    status: "draft",
                    author: "Bạn"
                };
                const nextData = writeStore({ ...data, articles: [nextArticle, ...data.articles] });
                syncBuilderDocumentStatus(nextArticle);
                return nextData;
            },
            updateArticle(id, updates) {
                const data = readStore();
                const now = new Date().toISOString();
                let updatedArticle = null;
                const nextData = writeStore({
                    ...data,
                    articles: data.articles.map((article) => {
                        if (article.id !== id) return article;
                        updatedArticle = {
                            ...article,
                            ...updates,
                            updatedAt: now,
                            status: normalizeStatus(updates.status || article.status),
                            publishedAt: updates.publishedAt === undefined ? article.publishedAt || null : updates.publishedAt
                        };
                        return updatedArticle;
                    })
                });
                if (updatedArticle) syncBuilderDocumentStatus(updatedArticle);
                return nextData;
            },
            deleteArticle(id) {
                const data = readStore();
                const nextData = writeStore({
                    ...data,
                    articles: data.articles.filter((article) => article.id !== id)
                });
                deleteBuilderDocumentForArticle(id);
                return nextData;
            }
        };

        const IconButton = ({ label, children, className = "", ...props }) =>
            h("button", {
                type: "button",
                "aria-label": label,
                title: label,
                className: `inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-500 shadow-sm transition hover:border-blue-200 hover:bg-blue-50 hover:text-blue-600 ${className}`,
                ...props
            }, children);

        const EmptyState = ({ title, text, onAdd, actionLabel = "Thêm tài liệu", actionIcon = Plus }) =>
            h("div", { className: "flex min-h-[360px] flex-col items-center justify-center rounded-2xl border border-dashed border-slate-300 bg-white px-6 text-center shadow-sm" },
                h("div", { className: "mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-50 text-blue-500" },
                    h(BookOpen, { className: "h-8 w-8", strokeWidth: 2 })
                ),
                h("h2", { className: "text-lg font-bold text-slate-800 tracking-tight" }, title),
                h("p", { className: "mt-2 max-w-md text-[13px] font-medium leading-6 text-slate-500" }, text),
                h("button", {
                    type: "button",
                    onClick: onAdd,
                    className: "mt-5 inline-flex items-center gap-2 rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-bold text-white shadow-lg shadow-blue-500/30 transition hover:bg-blue-700 active:scale-95"
                }, h(actionIcon, { className: "h-4 w-4" }), actionLabel)
            );

        const SmartSortLov = ({ value, onChange }) => {
            const [isOpen, setIsOpen] = useState(false);
            const rootRef = useRef(null);
            const activeMode = SORT_MODES.find((mode) => mode.id === value) || SORT_MODES[0];

            useEffect(() => {
                if (!isOpen) return undefined;
                const closeOnPointerDown = (event) => {
                    if (rootRef.current && !rootRef.current.contains(event.target)) setIsOpen(false);
                };
                const closeOnEscape = (event) => {
                    if (event.key === "Escape") setIsOpen(false);
                };
                document.addEventListener("pointerdown", closeOnPointerDown);
                document.addEventListener("keydown", closeOnEscape);
                return () => {
                    document.removeEventListener("pointerdown", closeOnPointerDown);
                    document.removeEventListener("keydown", closeOnEscape);
                };
            }, [isOpen]);

            const selectMode = (modeId) => {
                onChange(modeId);
                setIsOpen(false);
            };

            return h("div", { ref: rootRef, className: `smart-sort-lov relative ml-2 ${isOpen ? "is-open" : ""}` },
                h("button", {
                    type: "button",
                    className: "smart-sort-trigger px-3",
                    "aria-haspopup": "listbox",
                    "aria-expanded": isOpen ? "true" : "false",
                    onClick: () => setIsOpen((current) => !current)
                },
                    h("span", { className: "min-w-0 truncate" }, activeMode.title),
                    h(ChevronDown, { className: "smart-sort-chevron h-4 w-4 shrink-0", strokeWidth: 2.5 })
                ),
                h("div", { className: "smart-sort-menu", role: "listbox" },
                    SORT_MODES.map((mode) => {
                        const isActive = mode.id === value;
                        return h("button", {
                            key: mode.id,
                            type: "button",
                            role: "option",
                            "aria-selected": isActive ? "true" : "false",
                            className: `smart-sort-option ${isActive ? "is-active" : ""}`,
                            onClick: () => selectMode(mode.id)
                        },
                            h("span", { className: "min-w-0 truncate" }, mode.title),
                            h(Check, { className: "smart-sort-check h-4 w-4 shrink-0", strokeWidth: 2.5 })
                        );
                    })
                )
            );
        };

        const Sidebar = ({
            categories,
            articles,
            activeCategoryId,
            onSelectCategory,
            onAddCategory,
            onUpdateCategory,
            onDeleteCategory,
            onReorderCategories,
            createCategoryRequest,
            isOpen,
            onClose
        }) => {
            const [draggedCategoryId, setDraggedCategoryId] = useState(null);
            const [dragOverCategoryId, setDragOverCategoryId] = useState(null);
            const [dropPosition, setDropPosition] = useState("before");
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [editingCategoryName, setEditingCategoryName] = useState("");
            const [isCreatingCategory, setIsCreatingCategory] = useState(false);
            const [newCategoryName, setNewCategoryName] = useState("");
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            useEffect(() => {
                const handleClickOutside = () => setDeleteConfirmId(null);
                document.addEventListener("click", handleClickOutside);
                return () => document.removeEventListener("click", handleClickOutside);
            }, []);

            const handleDragStart = (e, id) => {
                setDraggedCategoryId(id);
                e.dataTransfer.effectAllowed = "move";
            };
            const handleDragOver = (e, id) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
                if (id !== draggedCategoryId) {
                    setDragOverCategoryId(id);
                    const rect = e.currentTarget.getBoundingClientRect();
                    const y = e.clientY - rect.top;
                    setDropPosition(y < rect.height / 2 ? "before" : "after");
                }
            };
            const handleDragLeave = () => setDragOverCategoryId(null);
            const handleDrop = (e, targetId) => {
                e.preventDefault();
                setDragOverCategoryId(null);
                if (!draggedCategoryId || draggedCategoryId === targetId) return;

                const draggedIndex = categories.findIndex((c) => c.id === draggedCategoryId);
                let targetIndex = categories.findIndex((c) => c.id === targetId);

                if (dropPosition === "after") {
                    targetIndex += 1;
                }

                const newCategories = [...categories];
                const [draggedItem] = newCategories.splice(draggedIndex, 1);
                
                if (draggedIndex < targetIndex) {
                    targetIndex -= 1;
                }
                
                newCategories.splice(targetIndex, 0, draggedItem);
                
                onReorderCategories(newCategories);
                setDraggedCategoryId(null);
            };
            const handleDragEnd = () => {
                setDraggedCategoryId(null);
                setDragOverCategoryId(null);
            };
            const startCreateCategory = () => {
                setDeleteConfirmId(null);
                setEditingCategoryId(null);
                setNewCategoryName("");
                setIsCreatingCategory(true);
            };
            const cancelEmptyCreateCategory = () => {
                if (!newCategoryName.trim()) setIsCreatingCategory(false);
            };
            const saveNewCategory = () => {
                const nextName = newCategoryName.trim();
                if (!nextName) {
                    setIsCreatingCategory(false);
                    return;
                }
                onAddCategory(nextName);
                setNewCategoryName("");
                setIsCreatingCategory(false);
            };
            useEffect(() => {
                if (createCategoryRequest) startCreateCategory();
            }, [createCategoryRequest]);

            return h("aside", {
                className: `${isOpen ? "translate-x-0" : "-translate-x-full"} fixed inset-y-0 left-0 z-40 w-[82vw] max-w-xs border-r border-slate-200 bg-white shadow-sm transition-transform duration-200 md:static md:z-auto md:w-64 md:max-w-none md:translate-x-0 flex flex-col`

                        },
                        h(File, { className: "h-5 w-5 shrink-0" }),
                        h("span", { className: "min-w-0 flex-1 truncate text-left" }, "Tất cả tài liệu"),
                        h("span", { className: "text-xs font-bold text-slate-400" }, articles.length)
                        ),
                    h("div", { className: "mt-6 mb-2 flex items-center justify-between px-3" },
                        h("span", { className: "text-[10px] font-extrabold uppercase tracking-[0.16em] text-slate-400" }, "Danh mục"),
                        h(IconButton, { label: "Thêm danh mục", className: "h-6 w-6 border-transparent bg-transparent hover:bg-slate-100 shadow-none hover:shadow-none", onClick: startCreateCategory },
                            h(Plus, { className: "h-3.5 w-3.5" })
                            )
                        ),
                            isCreatingCategory && h("div", {
                                className: "group relative w-full flex items-center gap-3 p-3 rounded-xl bg-blue-50 text-blue-600 font-semibold text-sm shadow-inner ring-1 ring-blue-100",
                                onMouseLeave: cancelEmptyCreateCategory

                                    },

                                    onDragEnd: !isEditing ? handleDragEnd : undefined,

                                },
                                h(Folder, { className: "h-5 w-5 shrink-0" }),
                                isEditing ? h("input", {
                                    autoFocus: true,
                                    value: editingCategoryName,

                                            onUpdateCategory(category.id, { name: editingCategoryName.trim() });

        const SkeletonTimeline = () =>

                        h("div", { className: "flex min-w-0 items-start gap-3 sm:gap-4" },

                                    )

            );

        const normalizeSearchText = (value) =>
            String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/đ/g, "d")
                .replace(/Đ/g, "D")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();

        const normalizeSearchTextFast = (value) =>
            String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\u0111/g, "d")
                .replace(/\u0110/g, "D")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();

        const buildArticleSearchIndex = (article, scope = "meta") =>
            normalizeSearchTextFast([
                article?.title,
                article?.description,
                scope === "full" ? article?.content : ""
            ].join(" "));

        const getSearchTermsFast = (normalizedQuery) =>
            String(normalizedQuery || "")
                .split(" ")
                .filter(Boolean)
                .filter((term, index, terms) => terms.indexOf(term) === index);

        const escapeRegExpFast = (value) => String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

        const highlightTextFast = (text, query) => {
            const source = String(text || "");
            const term = String(query || "").trim();
            if (!source || !term) return source;
            const parts = source.split(new RegExp("(" + escapeRegExpFast(term) + ")", "gi"));
            if (parts.length === 1) return source;
            return parts.map((part, index) =>
                part.toLowerCase() === term.toLowerCase()
                    ? h("mark", {
                        key: `match-${index}`,
                        className: "animate-flash-once bg-amber-200 text-amber-950 rounded-sm px-0.5 font-medium bg-opacity-70"
                    }, part)
                    : part
            );
        };

        const App = () => {
            const params = useMemo(() => new URLSearchParams(window.location.search), []);

            const [data, setData] = useState(() => DataService.getData());
            const [activeCategoryId, setActiveCategoryId] = useState(params.get("c") || "all");
            const [searchInput, setSearchInput] = useState(params.get("q") || "");
            const [query, setQuery] = useState(params.get("q") || "");
            const searchScope = "meta";
            const [editingArticle, setEditingArticle] = useState(null);
            const [createArticleCategoryId, setCreateArticleCategoryId] = useState("");
            const [isArticleModalOpen, setIsArticleModalOpen] = useState(false);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [categoryCreateRequest, setCategoryCreateRequest] = useState(0);
            const [viewMode, setViewMode] = useState(params.get("v") || "card");
            const [currentPage, setCurrentPage] = useState(Number(params.get("p")) || 1);
            const [itemsPerPage, setItemsPerPage] = useState(Number(params.get("limit")) || 12);
            const [isNavigating, setIsNavigating] = useState(false);
            const [isSearchFocused, setIsSearchFocused] = useState(false);
            const [searchHistory, setSearchHistory] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || "[]");
                } catch {
                    return [];
                }
            });
            const [toast, setToast] = useState(null);
            const [filterAuthor, setFilterAuthor] = useState(params.get("author") || "all");
            const [filterStatus, setFilterStatus] = useState(params.get("status") || "all");
            const [filterDateFrom, setFilterDateFrom] = useState(params.get("from") || "");
            const [filterDateTo, setFilterDateTo] = useState(params.get("to") || "");
            const [sortMode, setSortMode] = useState(params.get("sort") || "updated-desc");
            const [deleteArticleConfirmId, setDeleteArticleConfirmId] = useState(null);
            const [quickEditingArticleId, setQuickEditingArticleId] = useState(null);
            const [quickEditDraft, setQuickEditDraft] = useState({ title: "", description: "" });
            const [newDraftArticleId, setNewDraftArticleId] = useState(null);
            const [openCategoryMenuArticleId, setOpenCategoryMenuArticleId] = useState(null);
            const [openDateFilter, setOpenDateFilter] = useState(null);
            const [calendarMonth, setCalendarMonth] = useState(() => new Date());
            const dateFilterRef = useRef(null);

            useEffect(() => {
                const articleId = params.get("articleId");
                if (articleId) {
                    const returnUrl = new URL(window.location);
                    returnUrl.searchParams.delete("articleId");
                    const returnTo = `document-list.html${returnUrl.search}${returnUrl.hash}`;
                    window.location.replace(`document-builder.html?id=${encodeURIComponent(articleId)}&mode=preview&returnTo=${encodeURIComponent(returnTo)}`);
                }
            }, []);

            useEffect(() => {
                const handleStorage = (event) => {
                    if (event.key !== STORAGE_KEY) return;
                    setData(DataService.getData());
                };
                window.addEventListener("storage", handleStorage);
                return () => window.removeEventListener("storage", handleStorage);
            }, []);

            const getBuilderUrl = (articleId, mode = "preview") => {
                const returnUrl = new URL(window.location);
                returnUrl.searchParams.delete("articleId");
                const returnTo = `document-list.html${returnUrl.search}${returnUrl.hash}`;
                return `document-builder.html?id=${encodeURIComponent(articleId)}&mode=${encodeURIComponent(mode)}&returnTo=${encodeURIComponent(returnTo)}`;
            };

            const openArticleInBuilder = (article) => {
                const articleId = typeof article === "string" ? article : article?.id;
                const mode = article && typeof article === "object" && article.status === "draft" ? "edit" : "preview";
                if (!articleId) return;
                window.location.href = getBuilderUrl(articleId, mode);
            };

            const copyArticleLink = (articleId) => {
                const url = new URL(getBuilderUrl(articleId, "preview"), window.location.href);
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url.toString()).then(
                        () => showToast("Đã sao chép liên kết tài liệu"),
                        () => showToast(url.toString())
                    );
                    return;
                }
                showToast(url.toString());
            };

            useEffect(() => {
                const handleClickOutside = () => {
                    setDeleteArticleConfirmId(null);
                    setOpenCategoryMenuArticleId(null);
                };
                document.addEventListener("click", handleClickOutside);
                return () => document.removeEventListener("click", handleClickOutside);
            }, []);

            useEffect(() => {
                if (!toast) return;
                const timer = setTimeout(() => setToast(null), 3000);
                return () => clearTimeout(timer);
            }, [toast]);

            const showToast = (message) => {
                setToast({ message, id: Date.now() });
            };

            useEffect(() => {
                const timer = setTimeout(() => setQuery(searchInput), 150);
                return () => clearTimeout(timer);
            }, [searchInput]);

            const isInitialMount = useRef(true);
            useEffect(() => {
                if (isInitialMount.current) {
                    isInitialMount.current = false;
                    return;
                }
                setCurrentPage(1);
            }, [query, activeCategoryId, viewMode, itemsPerPage, filterAuthor, filterStatus, filterDateFrom, filterDateTo, sortMode, searchScope]);

            useEffect(() => {
                setIsNavigating(true);
                const timer = setTimeout(() => setIsNavigating(false), 400);
                return () => clearTimeout(timer);
            }, [currentPage, itemsPerPage, viewMode, activeCategoryId, query, searchScope, filterAuthor, filterStatus, filterDateFrom, filterDateTo, sortMode]);

            useEffect(() => {
                const url = new URL(window.location);
                if (activeCategoryId !== "all") url.searchParams.set("c", activeCategoryId);
                else url.searchParams.delete("c");
                
                if (query) url.searchParams.set("q", query);
                else url.searchParams.delete("q");

                url.searchParams.delete("scope");

                if (viewMode !== "card") url.searchParams.set("v", viewMode);
                else url.searchParams.delete("v");

                if (currentPage !== 1) url.searchParams.set("p", currentPage);
                else url.searchParams.delete("p");

                if (itemsPerPage !== 12) url.searchParams.set("limit", itemsPerPage);
                else url.searchParams.delete("limit");

                if (filterAuthor !== "all") url.searchParams.set("author", filterAuthor);
                else url.searchParams.delete("author");

                if (filterStatus !== "all") url.searchParams.set("status", filterStatus);
                else url.searchParams.delete("status");

                if (filterDateFrom) url.searchParams.set("from", filterDateFrom);
                else url.searchParams.delete("from");

                if (filterDateTo) url.searchParams.set("to", filterDateTo);
                else url.searchParams.delete("to");

                if (sortMode !== "updated-desc") url.searchParams.set("sort", sortMode);
                else url.searchParams.delete("sort");

                window.history.replaceState({}, "", url);
            }, [activeCategoryId, query, searchScope, viewMode, currentPage, itemsPerPage, filterAuthor, filterStatus, filterDateFrom, filterDateTo, sortMode]);

            useEffect(() => {
                if (!query.trim()) return;
                const timer = setTimeout(() => {
                    const keyword = query.trim();
                    setSearchHistory(prev => {
                        const next = [keyword, ...prev.filter(k => k.toLowerCase() !== keyword.toLowerCase())].slice(0, 5);
                        localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(next));
                        return next;
                    });
                }, 1000);
                return () => clearTimeout(timer);
            }, [query]);

            useEffect(() => {
                if (!openDateFilter) return undefined;
                const closeOnPointerDown = (event) => {
                    if (dateFilterRef.current && !dateFilterRef.current.contains(event.target)) setOpenDateFilter(null);
                };
                const closeOnEscape = (event) => {
                    if (event.key === "Escape") setOpenDateFilter(null);
                };
                document.addEventListener("pointerdown", closeOnPointerDown);
                document.addEventListener("keydown", closeOnEscape);
                return () => {
                    document.removeEventListener("pointerdown", closeOnPointerDown);
                    document.removeEventListener("keydown", closeOnEscape);
                };
            }, [openDateFilter]);

            useEffect(() => {
                if (activeCategoryId !== "all" && !data.categories.some((category) => category.id === activeCategoryId)) {
                    setActiveCategoryId("all");
                }
            }, [activeCategoryId, data.categories]);

            const categoryById = useMemo(() => {
                return data.categories.reduce((map, category) => {
                    map[category.id] = category;
                    return map;
                }, {});
            }, [data.categories]);

            const articleSearchIndexById = useMemo(() => {
                return data.articles.reduce((map, article) => {
                    map[article.id] = buildArticleSearchIndex(article, searchScope);
                    return map;
                }, {});
            }, [data.articles, searchScope]);

            const normalizedQuery = useMemo(() => normalizeSearchTextFast(query), [query]);
            const queryTerms = useMemo(() => getSearchTermsFast(normalizedQuery), [normalizedQuery]);

            const articlesMatchingGlobalFilters = useMemo(() => {
                const fromDate = filterDateFrom ? new Date(filterDateFrom).getTime() : null;
                // Cộng thêm 1 ngày để bao gồm trọn vẹn "Đến ngày"
                const toDate = filterDateTo ? new Date(filterDateTo).getTime() + 86400000 - 1 : null;

                return data.articles.filter((article) => {
                    const searchIndex = articleSearchIndexById[article.id] || "";
                    const matchesQuery = !queryTerms.length
                        || searchIndex.includes(normalizedQuery)
                        || queryTerms.every((term) => searchIndex.includes(term));
                    const matchesAuthor = filterAuthor === "all" || (filterAuthor === "me" && article.author === "Bạn");
                    const matchesStatus = filterStatus === "all" || article.status === filterStatus;
                    
                    const articleDate = new Date(article.updatedAt || article.createdAt).getTime();
                    const matchesDateFrom = !fromDate || articleDate >= fromDate;
                    const matchesDateTo = !toDate || articleDate <= toDate;

                    return matchesQuery && matchesAuthor && matchesStatus && matchesDateFrom && matchesDateTo;
                });
            }, [data.articles, articleSearchIndexById, normalizedQuery, queryTerms, filterAuthor, filterStatus, filterDateFrom, filterDateTo]);

            const visibleArticles = useMemo(() => {
                const filtered = articlesMatchingGlobalFilters.filter((article) => (
                    activeCategoryId === "all" || article.categoryId === activeCategoryId
                ));

                return filtered.sort((a, b) => {
                    if (sortMode === "created-desc") {
                        return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
                    }
                    if (sortMode === "title-asc") {
                        return String(a.title || "").localeCompare(String(b.title || ""), "vi", { sensitivity: "base" });
                    }
                    return new Date(b.updatedAt || b.createdAt).getTime() - new Date(a.updatedAt || a.createdAt).getTime();
                });
            }, [activeCategoryId, articlesMatchingGlobalFilters, sortMode]);

            const activeCategory = activeCategoryId === "all"
                ? null
                : data.categories.find((category) => category.id === activeCategoryId);
            const currentView = VIEW_MODES.find((mode) => mode.id === viewMode) || VIEW_MODES[0];
            const parseDateValue = (value) => {
                if (!value) return null;
                const parts = String(value).split("-").map(Number);
                if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
                return new Date(parts[0], parts[1] - 1, parts[2]);
            };
            const toDateValue = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, "0");
                const day = String(date.getDate()).padStart(2, "0");
                return `${year}-${month}-${day}`;
            };
            const formatDateChip = (value) => {
                if (!value) return "Chọn ngày";
                const parts = String(value).split("-");
                if (parts.length !== 3) return value;
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            };
            const openCalendar = (type, value) => {
                if (openDateFilter === type) {
                    setOpenDateFilter(null);
                    return;
                }
                const selectedDate = parseDateValue(value);
                setCalendarMonth(selectedDate || new Date());
                setOpenDateFilter(type);
            };
            const setCalendarDate = (type, date) => {
                const value = toDateValue(date);
                if (type === "from") setFilterDateFrom(value);
                else setFilterDateTo(value);
                setOpenDateFilter(null);
            };
            const renderDateCalendar = () => {
                if (!openDateFilter) return null;
                const selectedValue = openDateFilter === "from" ? filterDateFrom : filterDateTo;
                const selectedDate = parseDateValue(selectedValue);
                const todayValue = toDateValue(new Date());
                const monthStart = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
                const gridStart = new Date(monthStart);
                gridStart.setDate(monthStart.getDate() - monthStart.getDay());
                const days = Array.from({ length: 42 }, (_, index) => {
                    const day = new Date(gridStart);
                    day.setDate(gridStart.getDate() + index);
                    return day;
                });
                const monthLabel = monthStart.toLocaleDateString("vi-VN", { month: "long", year: "numeric" });
                const changeMonth = (offset) => {
                    setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + offset, 1));
                };
                const clearDate = () => {
                    if (openDateFilter === "from") setFilterDateFrom("");
                    else setFilterDateTo("");
                    setOpenDateFilter(null);
                };
                return h("div", { className: "date-popover", role: "dialog", "aria-label": "Chọn ngày" },
                    h("div", { className: "date-popover-head" },
                        h("span", { className: "date-popover-title" }, monthLabel),
                        h("div", { className: "flex items-center gap-1" },
                            h("button", { type: "button", className: "date-nav-btn", onClick: () => changeMonth(-1), "aria-label": "Tháng trước" }, h(ArrowLeft, { className: "h-4 w-4" })),
                            h("button", { type: "button", className: "date-nav-btn", onClick: () => changeMonth(1), "aria-label": "Tháng sau" }, h(ArrowRight, { className: "h-4 w-4" }))
                        )
                    ),
                    h("div", { className: "date-week-grid" }, ["CN", "T2", "T3", "T4", "T5", "T6", "T7"].map((day) =>
                        h("span", { key: day, className: "date-weekday" }, day)
                    )),
                    h("div", { className: "date-day-grid" }, days.map((day) => {
                        const value = toDateValue(day);
                        const isMuted = day.getMonth() !== monthStart.getMonth();
                        const isSelected = selectedDate && value === toDateValue(selectedDate);
                        const isToday = value === todayValue;
                        return h("button", {
                            key: value,
                            type: "button",
                            className: `date-day-btn ${isMuted ? "is-muted" : ""} ${isToday ? "is-today" : ""} ${isSelected ? "is-selected" : ""}`,
                            onClick: () => setCalendarDate(openDateFilter, day)
                        }, day.getDate());
                    })),
                    h("div", { className: "date-popover-foot" },
                        h("button", { type: "button", className: "date-foot-btn", onClick: clearDate }, "Clear"),
                        h("button", { type: "button", className: "date-foot-btn", onClick: () => setCalendarDate(openDateFilter, new Date()) }, "Today")
                    )
                );
            };

            const totalPages = Math.max(1, Math.ceil(visibleArticles.length / itemsPerPage));
            const paginatedArticles = useMemo(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                return visibleArticles.slice(startIndex, startIndex + itemsPerPage);
            }, [visibleArticles, currentPage, itemsPerPage]);

            const getTimelineDateValue = (article) =>
                sortMode === "created-desc" ? article.createdAt : (article.updatedAt || article.createdAt);

            const groupedArticles = useMemo(() => {
                if (viewMode !== "timeline") return null;
                const monthGroups = new Map();
                paginatedArticles.forEach(article => {
                    const dateValue = getTimelineDateValue(article);
                    const date = new Date(dateValue);
                    const monthYear = `${String(date.getMonth() + 1).padStart(2, "0")}/${date.getFullYear()}`;
                    const dayKey = new Intl.DateTimeFormat("en-CA", { year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
                    const dayLabel = new Intl.DateTimeFormat("vi-VN", { day: "2-digit" }).format(date);
                    const monthYearLabel = monthYear;
                    if (!monthGroups.has(monthYear)) {
                        monthGroups.set(monthYear, { key: monthYear, label: monthYear, dateValue, days: new Map() });
                    }
                    const monthGroup = monthGroups.get(monthYear);
                    if (new Date(dateValue) > new Date(monthGroup.dateValue)) monthGroup.dateValue = dateValue;
                    if (!monthGroup.days.has(dayKey)) {
                        monthGroup.days.set(dayKey, {
                            key: dayKey,
                            dayLabel,
                            monthYearLabel,
                            dateValue,
                            articles: []
                        });
                    }
                    monthGroup.days.get(dayKey).articles.push(article);
                });
                return Array.from(monthGroups.values())
                    .map((monthGroup) => ({
                        ...monthGroup,
                        days: Array.from(monthGroup.days.values()).sort((a, b) => new Date(b.dateValue) - new Date(a.dateValue))
                    }))

                                    },
                                        h("div", { className: "bg-slate-50 px-3 py-2 text-[11px] font-extrabold uppercase tracking-wider text-slate-400 border-b border-slate-200 flex justify-between items-center" }, 
                                            "Tìm kiếm gần đây",
                                            h("button", {
                                                type: "button",
                                                className: "hover:text-slate-700 transition",
                                                onMouseDown: (e) => {
                                                    e.preventDefault();
                                                    setSearchHistory([]);
                                                    localStorage.removeItem(SEARCH_HISTORY_KEY);
                                                }
                                            }, "Xóa")
                                        ),
                                        h("ul", { className: "py-1" },
                                            searchHistory.map((item, i) => h("li", { key: i },
                                                h("button", {
                                                    type: "button",
                                                    className: "flex w-full items-center gap-2.5 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors",
                                                    onMouseDown: (e) => {
                                                        e.preventDefault();
                                                        setSearchInput(item);
                                                        setQuery(item);
                                                        setIsSearchFocused(false);
                                                    }
                                                },
                                                    h(Clock, { className: "h-3.5 w-3.5 text-slate-400" }),
                                                    item
                                                )
                                            ))
                                        )
                                    )
                                ),
                                h("button", {
                                    type: "button",
                                    onClick: openCreateArticle,
                                    disabled: data.categories.length === 0,
                                    className: "bg-blue-600 hover:bg-blue-700 active:scale-95 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all text-sm flex items-center gap-2 whitespace-nowrap disabled:opacity-50 disabled:cursor-not-allowed"
                                }, h(Plus, { className: "h-4 w-4 pointer-events-none" }), h("span", { className: "hidden sm:inline" }, "Tài liệu"))
                            )
                        ),
                        h("div", { className: "mb-6 flex flex-wrap items-center gap-2" },
                            h(ViewModeSwitch, { value: viewMode, onChange: setViewMode }),
                            h(SmartSortLov, { value: sortMode, onChange: setSortMode }),
                            h(SmartFilterLov, {
                                value: filterAuthor,
                                onChange: setFilterAuthor,
                                ariaLabel: "Tạo bởi",
                                options: [
                                    { id: "all", title: "Tạo bởi: Tất cả" },
                                    { id: "me", title: "Tạo bởi: Tôi" }
                                ]
                            }),
                            h(SmartFilterLov, {
                                value: filterStatus,
                                onChange: setFilterStatus,
                                ariaLabel: "Trạng thái",
                                options: [
                                    { id: "all", title: "Trạng thái: Tất cả" },
                                    { id: "draft", title: "Draft" },
                                    { id: "published", title: "Published" },
                                    { id: "archived", title: "Archived" }
                                ]
                            }),
                            h("div", { ref: dateFilterRef, className: `inline-date-filter relative ${filterDateFrom || filterDateTo ? "is-active" : ""}` },
                                h("span", { className: "inline-date-title" }, "Thời gian"),
                                h("button", { type: "button", className: `date-pill ${openDateFilter === "from" ? "is-open" : ""}`, onClick: () => openCalendar("from", filterDateFrom) },
                                    h("span", { className: "date-pill-label" }, "Từ"),
                                    h("span", { className: `date-pill-value ${filterDateFrom ? "" : "is-empty"}` }, formatDateChip(filterDateFrom)),
                                    h(CalendarDays, { className: "date-pill-icon", strokeWidth: 2.4 })
                                ),
                                h("span", { className: "inline-date-separator" }, "đến"),
                                h("button", { type: "button", className: `date-pill ${openDateFilter === "to" ? "is-open" : ""}`, onClick: () => openCalendar("to", filterDateTo) },
                                    h("span", { className: `date-pill-value ${filterDateTo ? "" : "is-empty"}` }, formatDateChip(filterDateTo)),
                                    h(CalendarDays, { className: "date-pill-icon", strokeWidth: 2.4 })
                                ),
                                renderDateCalendar()
                            ),
                            h("span", { className: "ml-auto text-sm font-bold text-slate-400" },
                                `${visibleArticles.length} tài liệu`
                            )
                        ),
                        activeFilterChips.length > 0 && h("div", { className: "mb-6 flex flex-wrap items-center gap-2" },
                            activeFilterChips.map((chip) =>
                                h("span", {
                                    key: chip.id,
                                    className: "inline-flex min-h-8 items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-1 text-xs font-bold text-slate-600 shadow-sm"
                                },
                                    h("span", { className: "max-w-[220px] truncate" }, chip.label),
                                    h("button", {
                                        type: "button",
                                        onClick: chip.onClear,
                                        className: "flex h-5 w-5 items-center justify-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-700",
                                        "aria-label": `Xóa ${chip.label}`
                                    }, h(X, { className: "h-3.5 w-3.5" }))
                                )
                            ),
                            h("button", {
                                type: "button",
                                onClick: clearAllFilters,
                                className: "min-h-8 rounded-xl border border-blue-100 bg-blue-50 px-3 py-1 text-xs font-extrabold text-blue-600 transition hover:bg-blue-100"
                            }, "Xóa bộ lọc")
                        ),
                            data.categories.length === 0
                                ? h(EmptyState, {
                                    title: "Chưa có danh mục",
                                    text: "Tạo danh mục đầu tiên để bắt đầu sắp xếp tài liệu của team.",
                                    onAdd: requestCreateCategory,
                                    actionLabel: "Thêm danh mục"
                                })
                                : isNavigating
                                    ? h("div", null,
                                        h("div", { className: viewMode === "card" ? "grid gap-4 md:grid-cols-2 xl:grid-cols-3" : "flex flex-col gap-8" },
                                            viewMode === "timeline"
                                                ? h("div", null,
                                                    h("div", { className: "mb-4 h-5 w-32 rounded bg-slate-200 animate-pulse" }),
                                                    h("div", { className: "grid gap-6" },
                                                        Array.from({ length: 3 }).map((_, i) => h(SkeletonTimeline, { key: `sk-tl-${i}` }))
                                                    )
                                                )
                                                : Array.from({ length: Math.min(itemsPerPage, 6) }).map((_, i) => h(SkeletonCard, { key: `sk-card-${i}` }))
                                        ),
                                        paginationUI
                                    )
                                    : visibleArticles.length === 0
                                        ? activeFilterChips.length > 0
                                            ? h(EmptyState, {
                                                title: "Không tìm thấy kết quả",
                                                text: query ? `Không có tài liệu nào khớp với từ khóa "${query}" và bộ lọc hiện tại.` : "Không có tài liệu nào khớp với bộ lọc hiện tại.",
                                                actionLabel: "Xóa bộ lọc",
                                                actionIcon: X,
                                                onAdd: clearAllFilters
                                            })
                                            : h(EmptyState, {
                                                title: "Chưa có tài liệu",
                                                text: "Danh mục này chưa có tài liệu nào. Hãy tạo tài liệu đầu tiên.",
                                                onAdd: openCreateArticle
                                            })
                                        : h("div", null,
                                            h("div", {
                                                className: viewMode === "card"
                                                    ? "grid gap-4 md:grid-cols-2 xl:grid-cols-3"
                                                    : "flex flex-col gap-8"
                                            },
                                                viewMode === "timeline"
                                                    ? groupedArticles.map((monthGroup) =>
                                                        h("div", { key: monthGroup.key, className: "relative" },
                                                            h("h3", { className: "sticky top-0 z-20 mb-4 rounded-xl bg-slate-50/95 px-1 py-2 text-sm font-bold text-slate-900 shadow-sm shadow-slate-200/40 backdrop-blur" }, monthGroup.label),
                                                            h("div", { className: "grid gap-6" },
                                                                monthGroup.days.map((dayGroup) =>
                                                                    h("div", {
                                                                        key: dayGroup.key,
                                                                        className: "grid grid-cols-[2.75rem_minmax(0,1fr)] gap-2 sm:grid-cols-[4.5rem_minmax(0,1fr)] sm:gap-4"
                                                                    },
                                                                        h("div", { className: "sticky top-12 z-10 self-start rounded-xl bg-slate-50/95 py-1 text-right shadow-sm shadow-slate-200/40 backdrop-blur" },
                                                                            h("div", { className: "text-xl font-extrabold leading-none tracking-tight text-slate-800 sm:text-2xl" }, dayGroup.dayLabel),
                                                                            h("div", { className: "mt-1 text-[10px] font-bold leading-none text-slate-400 sm:text-[11px]" }, dayGroup.monthYearLabel)
                                                                        ),
                                                                        h("div", { className: "grid min-w-0 gap-0 border-l border-slate-200 pl-3 sm:pl-5" },
                                                                            dayGroup.articles.map((article) => renderArticle(article, false, true))
                                                                        )
                                                                    )
                                                                )
                                                            )
                                                        )
                                                    )
                                                    : paginatedArticles.map((article) => renderArticle(article, true, false))
                                            ),
                                            paginationUI
                                        )
                    )
                ),
                isArticleModalOpen && h(ArticleModal, {
                    categories: data.categories,
                    article: editingArticle,
                    defaultCategoryId: createArticleCategoryId || getCreateArticleCategoryId(),
                    onClose: () => {
                        setIsArticleModalOpen(false);
                        setEditingArticle(null);
                    },
                    onSave: saveArticle
                }),
                toast && h("div", {
                    key: toast.id,
                    className: "fixed bottom-6 right-6 z-50 flex items-center gap-3 rounded-xl border border-blue-200 bg-white px-5 py-3.5 text-sm font-bold text-blue-900 shadow-xl animate-toast-in"
                },
                    h("div", { className: "flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-blue-600" },
                        h(Check, { className: "h-5 w-5" })
                    ),
                    toast.message
                )
            );
        };

        createRoot(document.getElementById("root")).render(h(App));
    </script>
</body>
</html>
