<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 0C22.4 0 0 22.4 0 50s22.4 50 50 50V0z' fill='%232563EB'/><path d='M50 0c27.6 0 50 22.4 50 50s-22.4 50-50 50V0z' fill='%23F97316'/><path d='M35 50l10 10 20-20' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracking Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        /* CSS MỚI CỦA BẠN (CÁC BIẾN & STYLE FORM) */
        :root {
            --po-primary: #2563EB;
            --po-primary-hover: #1D4ED8;
            --po-bg-light: #F8FAFC;
            --po-border: #E2E8F0;
            --po-text-main: #1E293B;
            --po-text-muted: #64748B;
            --po-alert-bg: #EFF6FF;
            --po-alert-text: #1E40AF;
        }

        .po-modal {
            background: #FFFFFF;
            width: 100%;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px -2px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--po-border);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--po-text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .po-input,
        .po-textarea {
            width: 100%;
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            outline: none;
            transition: 0.2s;
        }

        .po-input::placeholder,
        .po-textarea::placeholder {
            color: #94A3B8;
        }

        .po-input:focus,
        .po-textarea:focus {
            border-color: var(--po-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .po-textarea {
            height: 70px;
            resize: none;
        }

        .row-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .po-select {
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            outline: none;
            background: #fff;
            cursor: pointer;
        }

        .tags-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border: 1px solid var(--po-border);
            padding: 8px;
            border-radius: 8px;
            min-height: 42px;
            align-items: center;
        }

        .po-tag {
            background: var(--po-bg-light);
            border: 1px solid var(--po-border);
            color: var(--po-text-main);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .po-tag:hover {
            background: #E2E8F0;
        }

        /* Trạng thái Tag được chọn */
        .po-tag-active {
            background: var(--po-primary) !important;
            color: white !important;
            border-color: var(--po-primary) !important;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-cancel {
            background: transparent;
            border: none;
            color: var(--po-text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            color: var(--po-text-main);
        }

        .btn-submit {
            background: var(--po-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-submit:hover {
            background: var(--po-primary-hover);
            transform: translateY(-1px);
        }

        /* CSS TỔNG QUAN (GIỮ NGUYÊN) */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            overflow-x: auto;
        }

        ::-webkit-scrollbar {
            height: 10px;
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

/* --- HIỆU ỨNG KÉO THẢ (PO WORKSPACE STYLE) --- */
        .sortable-ghost {
            background-color: #f8fafc !important; /* Nền xám nhạt */
            border: 2px dashed #94a3b8 !important; /* Viền đứt nét */
            border-radius: 12px !important;
            opacity: 1 !important;
        }

        .sortable-ghost > * {
            opacity: 0 !important; /* Ẩn toàn bộ nội dung chữ bên trong vùng rớt xuống */
            visibility: hidden !important; 
        }

        .sortable-drag {
            cursor: grabbing !important;
            background-color: #ffffff !important;
            box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.25) !important; /* Bóng đổ xanh dương */
            border: 1px solid #3b82f6 !important;
            border-radius: 12px !important;
            opacity: 1 !important;
            transform: rotate(3deg) scale(1.02) !important; /* Nghiêng 3 độ, to lên 2% */
            z-index: 99999 !important;
            transition: none !important; /* BẮT BUỘC: Tắt transition để thẻ không bị lag trễ so với chuột */
        }

        .kanban-list>div {
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
        }

        .task-card {
            cursor: grab;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .kanban-list {
            counter-reset: task-counter;
        }

        .task-title::before {
            counter-increment: task-counter;
            content: counter(task-counter) ". ";
            color: #94a3b8;
            font-weight: 700;
        }

        .kanban-column {
            width: 360px;
            flex-shrink: 0;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        }

        .kanban-column-header {
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }

        .kanban-column-title {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .kanban-count {
            padding: 0.125rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 11px;
            font-weight: 700;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
            margin-left: 0.25rem;
            background: #ffffff;
        }

        .kanban-add-wrap {
            padding: 1rem 1rem 0.25rem;
        }

        .kanban-list-body {
            padding: 1rem;
            padding-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 150px;
        }

        .kanban-column[data-color-theme="slate"] {
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .kanban-column[data-color-theme="slate"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .kanban-column[data-color-theme="slate"] .kanban-dot { background: #94a3b8; }
        .kanban-column[data-color-theme="slate"] .kanban-column-title { color: #475569; }
        .kanban-column[data-color-theme="slate"] .kanban-count { color: #475569; border: 1px solid #e2e8f0; }
        .kanban-column[data-color-theme="slate"] .kanban-menu-btn { color: #94a3b8; }
        .kanban-column[data-color-theme="slate"] .kanban-menu-btn:hover { background: #e2e8f0; }
        .kanban-column[data-color-theme="slate"] .kanban-add-btn {
            border-color: #e2e8f0;
            color: #94a3b8;
        }
        .kanban-column[data-color-theme="slate"] .kanban-add-btn:hover {
            background: #f8fafc;
            border-color: #93c5fd;
            color: #2563eb;
        }
        .kanban-column[data-color-theme="slate"] .task-card { border: 1px solid #cbd5e1 !important; }
        .kanban-column[data-color-theme="slate"] .task-card:hover {
            border-color: #94a3b8 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .kanban-column[data-color-theme="blue"] {
            background: rgba(239, 246, 255, 0.4);
            border: 1px solid rgba(191, 219, 254, 0.6);
        }

        .kanban-column[data-color-theme="blue"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #dbeafe;
        }

        .kanban-column[data-color-theme="blue"] .kanban-dot { background: #3b82f6; }
        .kanban-column[data-color-theme="blue"] .kanban-column-title { color: #1d4ed8; }
        .kanban-column[data-color-theme="blue"] .kanban-count { color: #2563eb; border: 1px solid #bfdbfe; }
        .kanban-column[data-color-theme="blue"] .kanban-menu-btn { color: #60a5fa; }
        .kanban-column[data-color-theme="blue"] .kanban-menu-btn:hover { background: #dbeafe; }
        .kanban-column[data-color-theme="blue"] .task-card { border: 1px solid #93c5fd !important; }
        .kanban-column[data-color-theme="blue"] .task-card:hover {
            border-color: #60a5fa !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.15);
        }

        .kanban-column[data-color-theme="orange"] {
            background: rgba(255, 247, 237, 0.4);
            border: 1px solid rgba(254, 215, 170, 0.6);
        }

        .kanban-column[data-color-theme="orange"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #ffedd5;
        }

        .kanban-column[data-color-theme="orange"] .kanban-dot { background: #f97316; }
        .kanban-column[data-color-theme="orange"] .kanban-column-title { color: #c2410c; }
        .kanban-column[data-color-theme="orange"] .kanban-count { color: #ea580c; border: 1px solid #fed7aa; }
        .kanban-column[data-color-theme="orange"] .kanban-menu-btn { color: #fb923c; }
        .kanban-column[data-color-theme="orange"] .kanban-menu-btn:hover { background: #ffedd5; }
        .kanban-column[data-color-theme="orange"] .task-card { border: 1px solid #fed7aa !important; }
        .kanban-column[data-color-theme="orange"] .task-card:hover { border-color: #fb923c !important; }

        .kanban-column[data-color-theme="emerald"] {
            background: rgba(248, 250, 252, 0.8);
            border: 1px solid rgba(226, 232, 240, 0.8);
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .kanban-column[data-color-theme="emerald"]:hover {
            opacity: 1;
        }

        .kanban-column[data-color-theme="emerald"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .kanban-column[data-color-theme="emerald"] .kanban-dot { background: #10b981; }
        .kanban-column[data-color-theme="emerald"] .kanban-column-title { color: #047857; }
        .kanban-column[data-color-theme="emerald"] .kanban-count { color: #475569; border: 1px solid #e2e8f0; }
        .kanban-column[data-color-theme="emerald"] .kanban-menu-btn { color: #94a3b8; }
        .kanban-column[data-color-theme="emerald"] .kanban-menu-btn:hover { background: #e2e8f0; }
        .kanban-column[data-color-theme="emerald"] .task-card { border: 1px solid #6ee7b7 !important; }
        .kanban-column[data-color-theme="emerald"] .task-card:hover {
            border-color: #34d399 !important;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.15);
        }

        .kanban-column[data-color-theme="red"] {
            background: rgba(254, 242, 242, 0.4);
            border: 1px solid rgba(254, 202, 202, 0.6);
        }

        .kanban-column[data-color-theme="red"] .kanban-column-header {
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid #fee2e2;
        }

        .kanban-column[data-color-theme="red"] .kanban-dot { background: #ef4444; }
        .kanban-column[data-color-theme="red"] .kanban-column-title { color: #b91c1c; }
        .kanban-column[data-color-theme="red"] .kanban-count { color: #dc2626; border: 1px solid #fecaca; }
        .kanban-column[data-color-theme="red"] .kanban-menu-btn { color: #f87171; }
        .kanban-column[data-color-theme="red"] .kanban-menu-btn:hover { background: #fee2e2; }
        .kanban-column[data-color-theme="red"] .task-card { border: 1px solid #fecaca !important; }
        .kanban-column[data-color-theme="red"] .task-card:hover { border-color: #f87171 !important; }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            50% {
                transform: translateX(5px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        .input-error {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
        }

        .input-error::placeholder {
            color: #ef4444 !important;
            font-style: italic;
        }

        .task-desc {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tag-name {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 20px;
            padding: 0 10px 0 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            white-space: nowrap;
            line-height: 1;
        }

        .tag-name::after {
            content: "";
            position: absolute;
            top: -2px;
            right: -2px;
            width: 7px;
            height: 7px;
            border-radius: 9999px;
            background: #ef4444;
            border: 1.5px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.08);
        }
/* --- BỔ SUNG MÀU CHO DATE PICKER --- */
        :root {
            --po-bg-light: #EFF6FF; /* Màu xanh siêu nhạt khi hover ngày */
            --po-text-light: #94A3B8;
        }

        /* --- DATE PICKER WRAPPER --- */
        .po-datepicker { position: relative; width: 140px; user-select: none; }
        
.dp-trigger {
    display: flex; justify-content: space-between; align-items: center;
    background: #FFFFFF; border: 1px solid var(--po-border);
            border-radius: 8px; padding: 0 12px; font-size: 13px; color: var(--po-text-muted);
            cursor: pointer; transition: all 0.2s ease; height: 35px;
        }
        .po-datepicker.open .dp-trigger { border-color: var(--po-primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); color: var(--po-text-main); }
        .dp-icon { width: 14px; height: 14px; color: var(--po-text-muted); }

        .dp-popup {
position: absolute; top: calc(100% + 8px); left: 0; background: #FFFFFF;
            border: 1px solid var(--po-border); border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 16px; width: 260px; z-index: 100;
            opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.2s ease;
        }
        .po-datepicker.open .dp-popup { opacity: 1; visibility: visible; transform: translateY(0); }

        .dp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .dp-month-year { font-size: 14px; font-weight: 700; color: var(--po-text-main); display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .dp-month-year svg { width: 14px; height: 14px; }
        .dp-nav { display: flex; gap: 4px; }
        .dp-nav-btn { background: transparent; border: none; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--po-text-main); transition: 0.2s; }
        .dp-nav-btn:hover { background: #F1F5F9; }
        .dp-nav-btn svg { width: 16px; height: 16px; }

        .dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .dp-day-name { font-size: 11px; font-weight: 600; color: var(--po-text-main); padding-bottom: 8px; }
        .dp-date { width: 28px; height: 28px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s ease; color: var(--po-text-main); }
        .dp-date:hover:not(.empty) { background: var(--po-bg-light); color: var(--po-primary); }
        .dp-date.empty { color: var(--po-text-light); cursor: default; }
        .dp-date.selected { background: var(--po-primary); color: white; border-color: var(--po-primary); font-weight: 600; }
        .dp-date.selected:hover { background: var(--po-primary-hover); color: white; }

        .dp-footer { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--po-border); }
        .dp-action-btn { background: transparent; border: none; font-size: 12px; font-weight: 600; color: var(--po-primary); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .dp-action-btn:hover { background: var(--po-bg-light); }
        /* --- CUSTOM SELECT STYLES --- */
        .custom-select-wrapper {
            position: relative;
            flex: 1;
            user-select: none;
        }

        .custom-select-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FFFFFF;
            border: 1px solid var(--po-border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            height: 35px;
            /* Cho bằng với thẻ Date */
        }

        .custom-select-wrapper.open .custom-select-trigger {
            border-color: var(--po-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
            color: var(--po-text-muted);
            transition: transform 0.2s ease;
        }

        .custom-select-wrapper.open .arrow-icon {
            transform: rotate(180deg);
        }

        .custom-options-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #FFFFFF;
            border: 1px solid var(--po-border);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 6px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
        }

        .custom-select-wrapper.open .custom-options-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .custom-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--po-text-main);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .custom-option:hover {
            background-color: var(--po-primary-light, #EFF6FF);
            color: var(--po-primary-dark, #1E40AF);
        }

        .custom-option.selected {
            background-color: var(--po-primary-light, #EFF6FF);
            color: var(--po-primary-dark, #1E40AF);
            font-weight: 600;
        }

        .check-icon {
            width: 16px;
            height: 16px;
            opacity: 0;
            color: var(--po-primary);
        }

        .custom-option.selected .check-icon {
            opacity: 1;
        }

        .hidden-native-select {
            display: none;
        }
        /* --- HIỆU ỨNG NÚT XÓA & HÀNH ĐỘNG TICKET --- */
        .task-card.deleting {
            transform: scale(0.9);
            opacity: 0;
            margin-top: -80px; 
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-actions-wrap {
            position: absolute; top: 12px; right: 12px;
            display: flex; gap: 6px; z-index: 10;
            opacity: 0; transform: translateX(5px); transition: all 0.2s ease;
        }
        .task-card:hover .card-actions-wrap {
            opacity: 1; transform: translateX(0);
        }
        .icon-btn {
            display: flex; justify-content: center; align-items: center;
            height: 28px; width: 28px; padding: 0;
            background: white; border: 1px solid var(--po-border); border-radius: 8px;
            color: var(--po-text-muted); cursor: pointer; transition: all 0.2s ease; overflow: hidden;
        }
        .icon-btn:hover { background: #F8FAFC; color: var(--po-text-main); border-color: #cbd5e1; }
        .icon-btn svg { width: 14px; height: 14px; flex-shrink: 0; pointer-events: none;}
        
        .delete-btn.confirm-mode {
            width: 56px; 
            background: #FEF2F2; border-color: #EF4444; color: #EF4444;
        }

        function slugifyStateCode(stateCode) {
            return stateCode.toLowerCase().replace(/_/g, '-');

        function getStateColumnId(stateCode) {
            return `col-${slugifyStateCode(stateCode)}`;
        }

        function getStateCountId(stateCode) {
            return `count-${slugifyStateCode(stateCode)}`;
        }

        function getStateConfig(stateCode) {
            return KANBAN_STATES.find(state => state.stateCode === stateCode);

        function renderKanbanBoard() {

            if (!board) return;

                        </button>
                    </div>
                ` : '';

                return `
                    <div class="kanban-column" data-state-code="${state.stateCode}" data-color-theme="${state.colorTheme}" title="${state.description}">
                        <div class="kanban-column-header">
                            <div class="flex items-center gap-2.5">
                                <div class="kanban-dot w-3 h-3 rounded-full shadow-inner"></div>
                                <h3 class="kanban-column-title">${state.stateName}</h3>
                                <span class="kanban-count" id="${getStateCountId(state.stateCode)}">0</span>
                            </div>
                            <button class="kanban-menu-btn w-7 h-7 rounded-lg flex items-center justify-center transition">
                                <i class="fa-solid fa-ellipsis"></i>
                            </button>
                        </div>
                        ${addButtonHtml}
                        <div id="${getStateColumnId(state.stateCode)}" class="kanban-list kanban-list-body">
                            ${formHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Lấy giá trị true/false từ thẻ Select
function togglePersonalMode(select) {
            const assigneeGroup = document.getElementById('inlineAssigneeGroup');
            
            if (select.value === 'true') {
                // Nếu là Private: Ẩn nhóm phụ trách
                assigneeGroup.classList.add('hidden');
            } else {
                // Nếu là Public: Hiện nhóm phụ trách
                assigneeGroup.classList.remove('hidden');
                
                // Tự động chọn PIC mặc định nếu chưa chọn ai

            // Nhân bản để xóa các event rác cũ
            const newTrigger = trigger.cloneNode(true);
            trigger.parentNode.replaceChild(newTrigger, trigger);

            // BẮT BUỘC: Phải lấy lại biến từ newTrigger sau khi đã thay thế vào DOM
            const triggerText = newTrigger.querySelector('.dp-text');
            const hiddenInput = wrapper.querySelector('.hidden-date-input');
            const dates = wrapper.querySelectorAll('.dp-date:not(.empty)');
            const btnClear = wrapper.querySelector('.dpClear');
            const btnToday = wrapper.querySelector('.dpToday');

            newTrigger.addEventListener('click', function(e) {
                // Đóng tất cả popup khác
                document.querySelectorAll('.po-datepicker.open, .custom-select-wrapper.open').forEach(w => {
                    if (w !== wrapper) w.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                e.stopPropagation();
            });

            dates.forEach(date => {
                date.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    this.classList.add('selected');
                    
                    const day = this.textContent.padStart(2, '0');
                    // Dùng innerHTML để giữ lại icon cuốn lịch
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> ${day}/04/2026`; 
                    triggerText.style.color = 'var(--po-text-main)';
                    
                    // Lưu vào thẻ ẩn để code cũ lấy được
                    hiddenInput.value = `2026-04-${day}`;
                    
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            });

            if(btnClear) {
                btnClear.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> dd/mm/yyyy`;
                    triggerText.style.color = 'var(--po-text-muted)';
                    hiddenInput.value = '';
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            }

            if(btnToday) {
                btnToday.addEventListener('click', function(e) {
                    dates.forEach(d => d.classList.remove('selected'));
                    const todayDate = Array.from(dates).find(d => d.textContent === '17');
                    if(todayDate) todayDate.classList.add('selected');
                    
                    triggerText.innerHTML = `<i class="fa-regular fa-calendar mr-1.5"></i> 17/04/2026`;
                    triggerText.style.color = 'var(--po-text-main)';
                    hiddenInput.value = '2026-04-17';
                    
                    wrapper.classList.remove('open');
                    e.stopPropagation();
                });
            }

                if (!wrapper.contains(e.target)) wrapper.classList.remove('open');
            });
        }

            if (wrapper.dataset.initialized === 'true') return;

            const triggerText = wrapper.querySelector('.trigger-text');
            const options = wrapper.querySelectorAll('.custom-option');
            const nativeSelect = wrapper.querySelector('.hidden-native-select');

                document.querySelectorAll('.custom-select-wrapper.open, .po-datepicker.open').forEach(w => {
                    if (w !== wrapper) w.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                e.stopPropagation();
            });

            options.forEach(option => {
                option.addEventListener('click', function (e) {
                    triggerText.textContent = this.textContent.trim();
                    options.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');

                    nativeSelect.value = this.getAttribute('data-value');
                    nativeSelect.dispatchEvent(new Event('change'));

                    wrapper.classList.remove('open');

                });
            });

                if (!wrapper.contains(e.target)) wrapper.classList.remove('open');

        function generateTicketId() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const currentDateStr = `${yyyy}${mm}${dd}`;

            let storedDate = localStorage.getItem('ticket_date');
            let counter = parseInt(localStorage.getItem('ticket_counter') || '0');

            if (storedDate !== currentDateStr) {
                storedDate = currentDateStr;
                counter = 1;
            } else {
                counter++;
            }

            localStorage.setItem('ticket_date', storedDate);
            localStorage.setItem('ticket_counter', counter.toString());

            const counterStr = String(counter).padStart(4, '0');
            return `${currentDateStr}${counterStr}`;
        }

        function loadLegacyBoardState() {
            const legacyState = {};
            let hasLegacyData = false;

            KANBAN_STATES.forEach(state => {
                if (!state.legacyStorageKey) return;
                const raw = localStorage.getItem(state.legacyStorageKey);
                if (!raw) return;

                try {
                    legacyState[state.stateCode] = JSON.parse(raw) || [];
                    hasLegacyData = true;
                } catch (error) {
                    legacyState[state.stateCode] = [];
                }
            });

            return hasLegacyData ? legacyState : null;
        }

        function loadBoardState() {
            let boardState = null;
            let loadedFromLegacyStorage = false;

            try {
                boardState = JSON.parse(localStorage.getItem(BOARD_STORAGE_KEY));
            } catch (error) {
                boardState = null;
            }

            if (!boardState || typeof boardState !== 'object') {
                boardState = loadLegacyBoardState();
                loadedFromLegacyStorage = !!boardState;
            }

            if (boardState) {
                document.querySelectorAll('.task-card').forEach(el => el.remove());

                KANBAN_STATES.forEach((state, index) => {
                    const columnEl = document.getElementById(getStateColumnId(state.stateCode));
                    const tasks = Array.isArray(boardState[state.stateCode]) ? boardState[state.stateCode] : [];
                    if (!columnEl || tasks.length === 0) return;

                    if (index === 0) {
                        const form = document.getElementById('inlineAddForm');
                        tasks.slice().reverse().forEach(html => form.insertAdjacentHTML('afterend', html));
                    } else {
                        tasks.forEach(html => columnEl.insertAdjacentHTML('beforeend', html));
                    }
                });
            }

            updateCounts();
            renderInlinePicSelection();
            syncTagNames();
            refreshTrackingSidebarAndBoard();

            if (loadedFromLegacyStorage) {
                saveBoardState();
            }

        function confirmDelete(btn, event) {
            event.stopPropagation(); // Ngăn sự kiện click lan ra ngoài
            
            if (!btn.classList.contains('confirm-mode')) {
                // Tắt các nút xóa khác đang mở (nếu có)
                document.querySelectorAll('.delete-btn.confirm-mode').forEach(b => {
                    if (b !== btn) b.classList.remove('confirm-mode');
                });
                // Chuyển sang chế độ xác nhận (Nút đỏ)
                btn.classList.add('confirm-mode');
            } else {
                // Bấm lần 2 -> Thực hiện xóa
                const card = btn.closest('.task-card');
                card.classList.add('deleting'); // Chạy CSS thu nhỏ, mờ đi
                
                setTimeout(() => {
                    card.remove(); // Xóa khỏi HTML
                    updateCounts(); // Cập nhật lại số lượng
                    saveBoardState(); // Lưu vào DB / LocalStorage
                }, 300); // Đợi 300ms cho animation chạy xong
            }
        }

        function getBranchConfig(branchKey) { return branchConfigs[branchKey]; }
        function getBranchState(branchKey) { return branchState[branchKey]; }

        function loadBranchPages(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const savedPages = localStorage.getItem(config.storageKey);
            if (savedPages) {
                try {
                    const parsedPages = JSON.parse(savedPages);
                    if (Array.isArray(parsedPages) && parsedPages.length > 0) {
                        state.pages = parsedPages;
                        return;
                    }
                } catch (error) {
                }
            }
            state.pages = config.defaultPages.map((page) => ({ ...page }));
        }

        function saveBranchPages(branchKey) {
            const config = getBranchConfig(branchKey);
            localStorage.setItem(config.storageKey, JSON.stringify(getBranchState(branchKey).pages));
        }

        function syncBranchMenuHeight(branchKey) {
            const config = getBranchConfig(branchKey);
            if (accordionState[config.menuId] && !isSidebarCollapsed) {
                const menu = document.getElementById(config.menuId);
                menu.style.maxHeight = menu.scrollHeight + 'px';
            }
        }

        function clearBranchInvalidState(branchKey, mode) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const input = mode === 'create' ? document.getElementById(config.createInputId) : document.querySelector(`.${branchKey}-edit-input`);
            if (input) input.classList.remove('is-invalid');
            if (state.invalidTimeouts[mode]) {
                clearTimeout(state.invalidTimeouts[mode]);
                state.invalidTimeouts[mode] = null;
            }
        }

        function showBranchInvalidInputState(branchKey, mode, input) {
            const state = getBranchState(branchKey);
            clearBranchInvalidState(branchKey, mode);
            input.classList.remove('is-invalid');
            void input.offsetWidth;
            input.classList.add('is-invalid');
            input.focus();
            state.invalidTimeouts[mode] = setTimeout(() => {
                input.classList.remove('is-invalid');
                state.invalidTimeouts[mode] = null;
            }, 700);
        }

        function animateBranchRowExit(branchKey, pageId, className, callback, duration = 220) {
            const config = getBranchConfig(branchKey);
            const row = document.querySelector(`[${config.rowAttr}="${pageId}"]`);
            if (!row) {
                callback();
                return;
            }
            row.style.maxHeight = row.offsetHeight + 'px';
            row.style.marginTop = '0px';
            row.style.marginBottom = '0px';
            requestAnimationFrame(() => row.classList.add(className));
            setTimeout(callback, duration);
        }

        function renderBranchPages(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const list = document.getElementById(config.listId);

            list.innerHTML = state.pages.map((page, index) => {
                if (page.id === state.editingId) {
                    return `
                        <div class="document-page-row is-editing">
                            <div class="document-inline-form w-full">
                                <input type="text" class="document-inline-input ${branchKey}-edit-input" data-page-id="${page.id}" value="${page.name.replace(/"/g, '&quot;')}" maxlength="60">
                                <div class="document-inline-actions">
                                    <button type="button" class="menu-action-btn ${branchKey}-edit-save-btn" data-page-id="${page.id}" aria-label="Lưu tên page">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M5 13l4 4L19 7" />
                                        </svg>
                                    </button>
                                    <button type="button" class="menu-action-btn ${branchKey}-edit-cancel-btn" data-page-id="${page.id}" aria-label="Hủy sửa page">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                const activeClass = state.activeId === page.id ? 'member-link is-active' : 'member-link';
                const deleteButtonClass = state.deleteConfirmId === page.id
                    ? `menu-action-btn delete document-delete-toggle is-confirming ${branchKey}-delete-toggle`
                    : `menu-action-btn delete document-delete-toggle ${branchKey}-delete-toggle`;
                const rowClass = ['document-page-row', state.removingId === page.id ? 'is-removing' : '', state.animatingId === page.id ? 'is-entering' : ''].filter(Boolean).join(' ');

                return `
                    <div class="${rowClass}" ${config.rowAttr}="${page.id}">
                        <a href="#" class="${activeClass}" data-member-group="${config.memberGroup}" data-page-id="${page.id}">
                            <span class="member-index">${index + 1}</span>
                            <span class="member-name">${page.name}</span>
                        </a>
                        <div class="document-page-actions">
                            <button type="button" class="menu-action-btn ${branchKey}-edit-btn" data-page-id="${page.id}" aria-label="Sửa tên page">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button type="button" class="${deleteButtonClass}" data-page-id="${page.id}" aria-label="Xóa page">
                                <span class="document-delete-icon" aria-hidden="true">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3M4 7h16" />
                                    </svg>
                                </span>
                                <span class="document-delete-label">Xóa</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            document.querySelectorAll(`.${branchKey}-edit-btn`).forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    startEditBranchPage(branchKey, button.dataset.pageId);
                });
            });

            document.querySelectorAll(`.${branchKey}-delete-toggle`).forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    const pageId = button.dataset.pageId;
                    if (state.deleteConfirmId === pageId) {
                        deleteBranchPage(branchKey, pageId);
                        return;
                    }
                    state.deleteConfirmId = pageId;
                    renderBranchPages(branchKey);
                });
            });

            document.querySelectorAll(`.${branchKey}-edit-save-btn`).forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    saveEditedBranchPage(branchKey, button.dataset.pageId);
                });
            });

            document.querySelectorAll(`.${branchKey}-edit-cancel-btn`).forEach((button) => {
                button.addEventListener('click', (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    cancelEditBranchPage(branchKey);
                });
            });

            document.querySelectorAll(`.${branchKey}-edit-input`).forEach((input) => {
                input.addEventListener('input', () => clearBranchInvalidState(branchKey, 'edit'));
                input.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        saveEditedBranchPage(branchKey, input.dataset.pageId);
                    }
                    if (event.key === 'Escape') {
                        event.preventDefault();
                        cancelEditBranchPage(branchKey);
                    }
                });
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 0);
            });

            initializeSelectableMembers();
            syncBranchMenuHeight(branchKey);
        }

        function openBranchCreateForm(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const createForm = document.getElementById(config.createFormId);
            const createInput = document.getElementById(config.createInputId);
            state.editingId = null;
            state.deleteConfirmId = null;
            createForm.classList.remove('hidden');
            createInput.value = '';
            clearBranchInvalidState(branchKey, 'create');
            if (!accordionState[config.menuId]) toggleAccordion(config.menuId, config.chevronId);
            syncBranchMenuHeight(branchKey);
            setTimeout(() => createInput.focus(), 0);
        }

        function closeBranchCreateForm(branchKey) {
            const config = getBranchConfig(branchKey);
            document.getElementById(config.createFormId).classList.add('hidden');
            document.getElementById(config.createInputId).value = '';
            clearBranchInvalidState(branchKey, 'create');
            syncBranchMenuHeight(branchKey);
        }

        function createBranchPage(branchKey) {
            const config = getBranchConfig(branchKey);
            const state = getBranchState(branchKey);
            const createInput = document.getElementById(config.createInputId);
            const trimmedName = createInput.value.trim();
            if (!trimmedName) {
                showBranchInvalidInputState(branchKey, 'create', createInput);
                return;
            }
            const newPage = { id: `${config.pageIdPrefix}-${Date.now()}`, name: trimmedName };
            state.pages.push(newPage);
            state.activeId = newPage.id;
            state.animatingId = newPage.id;
            saveBranchPages(branchKey);
            closeBranchCreateForm(branchKey);
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function startEditBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            closeBranchCreateForm(branchKey);
            state.deleteConfirmId = null;
            animateBranchRowExit(branchKey, pageId, 'is-edit-transitioning', () => {
                state.editingId = pageId;
                renderBranchPages(branchKey);
            });
        }

        function cancelEditBranchPage(branchKey) {
            const state = getBranchState(branchKey);
            const pageId = state.editingId;
            state.editingId = null;
            state.animatingId = pageId;
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function saveEditedBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            const page = state.pages.find((item) => item.id === pageId);
            const editInput = document.querySelector(`.${branchKey}-edit-input[data-page-id="${pageId}"]`);
            if (!page || !editInput) return;
            const trimmedName = editInput.value.trim();
            if (!trimmedName) {
                showBranchInvalidInputState(branchKey, 'edit', editInput);
                return;
            }
            page.name = trimmedName;
            state.editingId = null;
            state.animatingId = pageId;
            saveBranchPages(branchKey);
            renderBranchPages(branchKey);
            setTimeout(() => { state.animatingId = null; }, 320);
        }

        function deleteBranchPage(branchKey, pageId) {
            const state = getBranchState(branchKey);
            state.deleteConfirmId = null;
            state.removingId = pageId;
            animateBranchRowExit(branchKey, pageId, 'is-removing', () => {
                state.pages = state.pages.filter((item) => item.id !== pageId);
                if (state.activeId === pageId) state.activeId = state.pages[0]?.id || null;
                if (state.editingId === pageId) state.editingId = null;
                state.removingId = null;
                saveBranchPages(branchKey);
                renderBranchPages(branchKey);
            }, 300);
        }

        function renderTrackingList(teamKey) {
            const trackingList = document.getElementById('trackingList');
            const members = getUsersByTeamCode(teamKey);

            if (!members.length) {
                activeTrackingUserKey = null;
                trackingList.innerHTML = '<li class="pl-4 py-2 text-xs text-slate-400">Không có user trong team</li>';
                syncActiveNavState();
                return;
            }

            activeTrackingUserKey = getPreferredTrackingUserKey(members);

            trackingList.innerHTML = members.map((userKey, index) => {
                const user = USERS[userKey];
                const isLoggedInUser = userKey === CURRENT_USER_ID;
                const isSelected = userKey === activeTrackingUserKey;
                const currentIndexClass = isLoggedInUser ? 'member-index member-index-current' : 'member-index';
                const activeClass = isSelected ? 'member-link is-active' : 'member-link';
                return `
                    <li>
                        <a href="#" class="${activeClass}" data-member-group="tracking" data-tracking-current="${isLoggedInUser ? 'true' : 'false'}" data-user-key="${userKey}">
                            <span class="${currentIndexClass}">${index + 1}</span>
                            <span class="member-name">${user.full_name}</span>
                            <span class="member-count">${getTaskCountForUser(userKey)}</span>
                        </a>
                    </li>
                `;
            }).join('');
            if (accordionState.trackingMenu && !isSidebarCollapsed) {
                const trackingMenu = document.getElementById('trackingMenu');
                trackingMenu.style.maxHeight = trackingMenu.scrollHeight + 'px';
            }
            initializeSelectableMembers();
        }

        function setTeamDropdownOpen(isOpen) {
            document.getElementById('teamSelectorButton').classList.toggle('is-open', isOpen);
            document.getElementById('teamSelectorMenu').classList.toggle('is-open', isOpen);
        }

        function applySelectedTeam(teamKey) {
            selectedTeamCode = teamKey;
            document.getElementById('teamSelectorValue').textContent = teamKey;
            document.querySelectorAll('.team-option').forEach((option) => {
                option.classList.toggle('is-active', option.dataset.teamValue === teamKey);
            });
            localStorage.setItem(TEAM_STORAGE_KEY, teamKey);
            renderInlinePicSelection();
            renderTrackingList(teamKey);
            initializeCurrentUserProfile();
            applyBoardFilter();
        }

        function initializeTeamSelector() {
            const teamSelectorButton = document.getElementById('teamSelectorButton');
            const teamSelectorMenu = document.getElementById('teamSelectorMenu');
            const availableTeams = getAvailableTeamCodesForUser(CURRENT_USER_ID);
            const savedTeam = localStorage.getItem(TEAM_STORAGE_KEY);
            const defaultTeam = availableTeams.includes(savedTeam) ? savedTeam : (availableTeams[0] || null);

            teamSelectorMenu.innerHTML = availableTeams.map((teamCode) => `
                <button type="button" class="team-option" data-team-value="${teamCode}">
                    <span class="team-option-label">${teamCode}</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="team-option-check" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            `).join('');

            const teamOptions = teamSelectorMenu.querySelectorAll('.team-option');
            if (!defaultTeam) return;
            applySelectedTeam(defaultTeam);

            teamSelectorButton.addEventListener('click', () => {
                setTeamDropdownOpen(!document.getElementById('teamSelectorMenu').classList.contains('is-open'));
            });

            teamOptions.forEach((option) => {
                option.addEventListener('click', () => {
                    applySelectedTeam(option.dataset.teamValue);
                    setTeamDropdownOpen(false);
                });
            });

            document.addEventListener('click', (event) => {
                if (!event.target.closest('.profile-context')) setTeamDropdownOpen(false);
                if (!event.target.closest('.document-page-actions')) {
                    Object.keys(branchConfigs).forEach((branchKey) => {
                        const state = getBranchState(branchKey);
                        if (state.deleteConfirmId !== null) {
                            state.deleteConfirmId = null;
                            renderBranchPages(branchKey);
                        }
                    });
                }
            });
        }

        function initializeBranchManager(branchKey) {
            const config = getBranchConfig(branchKey);
            loadBranchPages(branchKey);
            renderBranchPages(branchKey);
            document.getElementById(config.addBtnId).addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                openBranchCreateForm(branchKey);
            });
            document.getElementById(config.createSaveBtnId).addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                createBranchPage(branchKey);
            });
            document.getElementById(config.createCancelBtnId).addEventListener('click', (event) => {
                event.preventDefault();
                event.stopPropagation();
                closeBranchCreateForm(branchKey);
            });
            document.getElementById(config.createInputId).addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    createBranchPage(branchKey);
                }
                if (event.key === 'Escape') {
                    event.preventDefault();
                    closeBranchCreateForm(branchKey);
                }
            });
            document.getElementById(config.createInputId).addEventListener('input', () => clearBranchInvalidState(branchKey, 'create'));
        }

        function clearNavActiveStates() {
            document.querySelectorAll('[data-nav-target], [data-nav-link]').forEach((item) => {
                item.classList.remove('is-active');
                item.classList.remove('is-parent-active');
            });
        }

        function clearMemberActiveStates() {
            document.querySelectorAll('.member-link[data-member-group]').forEach((item) => item.classList.remove('is-active'));
        }

        function syncActiveNavState() {
            clearNavActiveStates();
            const activeMember = document.querySelector('.member-link[data-member-group].is-active');
            if (activeMember) {
                const menuId = { tracking: 'trackingMenu', document: 'documentMenu', guide: 'guideMenu' }[activeMember.dataset.memberGroup];
                const navItem = document.querySelector(`[data-nav-target="${menuId}"]`);
                if (navItem) navItem.classList.add('is-active');
                return;
            }
            if (preferredNavLink) {
                const navLink = document.querySelector(`[data-nav-link="${preferredNavLink}"]`);
                if (navLink) navLink.classList.add('is-active');
                return;
            }
            if (preferredNavTarget) {
                const navItem = document.querySelector(`[data-nav-target="${preferredNavTarget}"]`);
                if (navItem) navItem.classList.add('is-active');
            }
        }

        function setActiveNavByMenu(menuId) {
            preferredNavTarget = menuId;
            preferredNavLink = null;
            syncActiveNavState();
        }

        function setActiveNavByLink(navLink) {
            preferredNavLink = navLink;
            preferredNavTarget = null;
            syncActiveNavState();
        }

        function setActiveChildLink(link) {
            clearMemberActiveStates();
            link.classList.add('is-active');
            if (link.dataset.memberGroup === 'tracking') {
                activeTrackingUserKey = normalizeUserKey(link.dataset.userKey) || null;
                applyBoardFilter();
            }
            if (link.dataset.memberGroup === 'document') getBranchState('document').activeId = link.dataset.pageId || null;
            if (link.dataset.memberGroup === 'guide') getBranchState('guide').activeId = link.dataset.pageId || null;
            syncActiveNavState();
        }

        function initializeSelectableMembers() {
            document.querySelectorAll('.member-link[data-member-group]').forEach((link) => {
                if (link.dataset.activeBound === 'true') return;
                link.dataset.activeBound = 'true';
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    setActiveChildLink(link);
                });
            });
            syncActiveNavState();
        }

        function initializeSelectableNav() {
            document.querySelectorAll('[data-nav-target]').forEach((button) => {
                button.addEventListener('click', () => setActiveNavByMenu(button.dataset.navTarget));
            });
            document.querySelectorAll('.nav-item-branch').forEach((branchItem) => {
                branchItem.addEventListener('click', (event) => {
                    if (!isSidebarCollapsed) return;
                    const menuId = branchItem.dataset.menuId;
                    const chevronId = branchItem.dataset.chevronId;
                    if (!menuId || !chevronId) return;
                    event.preventDefault();
                    event.stopPropagation();
                    toggleSidebar();
                    setActiveNavByMenu(menuId);
                    if (!accordionState[menuId]) toggleAccordion(menuId, chevronId);
                });
            });
            document.querySelectorAll('[data-nav-link]').forEach((link) => {
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    if (isSidebarCollapsed) toggleSidebar();
                    clearMemberActiveStates();
                    setActiveNavByLink(link.dataset.navLink);
                });
            });
        }

        function initializeProfileCard() {
            const profileCard = document.getElementById('profileCard');
            if (!profileCard) return;
            profileCard.addEventListener('click', (event) => {
                event.preventDefault();
                const currentTrackingLink = document.querySelector('.member-link[data-member-group="tracking"][data-tracking-current="true"]')
                    || document.querySelector('.member-link[data-member-group="tracking"]');
                clearMemberActiveStates();
                if (currentTrackingLink) {
                    setActiveChildLink(currentTrackingLink);
                    return;
                }
                setActiveNavByMenu('trackingMenu');
            });
        }

        function initializeCurrentUserProfile() {
            const currentUser = USERS[CURRENT_USER_ID];
            if (!currentUser) return;

            const avatar = document.getElementById('profileAvatar');
            const name = document.getElementById('profileName');
            const title = document.getElementById('profileTitle');

            if (avatar) {
                const initials = currentUser.full_name
                    .split(/\s+/)
                    .filter(Boolean)
                    .slice(0, 2)
                    .map((part) => part[0]?.toUpperCase() || '')
                    .join('');
                avatar.textContent = initials || 'US';
            }

            if (name) {
                name.textContent = currentUser.full_name;
            }

            if (title) {
                const roles = getEffectiveRoles(CURRENT_USER_ID, getCurrentTeamCode());
                title.textContent = `${currentUser.job_title} / ${roles.join(', ') || 'USER'}`;
            }
        }

        function toggleAccordion(menuId, chevronId) {
            if (isSidebarCollapsed) toggleSidebar();
            const menu = document.getElementById(menuId);
            const chevron = document.getElementById(chevronId);
            if (!accordionState[menuId]) {
                menu.style.maxHeight = menu.scrollHeight + 'px';
                chevron.style.transform = 'rotate(180deg)';
                accordionState[menuId] = true;
            } else {
                menu.style.maxHeight = '0px';
                chevron.style.transform = 'rotate(0deg)';
                accordionState[menuId] = false;
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('sidebarToggleIcon');
            isSidebarCollapsed = !isSidebarCollapsed;
            sidebar.classList.toggle('collapsed', isSidebarCollapsed);
            icon.style.transform = isSidebarCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
            if (isSidebarCollapsed) {
                setTeamDropdownOpen(false);
                Object.keys(accordionState).forEach((menuId) => {
                    const menu = document.getElementById(menuId);
                    const chevronId = menuId === 'trackingMenu' ? 'trackingChevron' : menuId === 'documentMenu' ? 'documentChevron' : 'guideChevron';
                    document.getElementById(chevronId).style.transform = 'rotate(0deg)';
                    menu.style.maxHeight = '0px';
                });
            } else {
                Object.keys(accordionState).forEach((menuId) => {
                    if (accordionState[menuId]) {
                        const menu = document.getElementById(menuId);
                        const chevronId = menuId === 'trackingMenu' ? 'trackingChevron' : menuId === 'documentMenu' ? 'documentChevron' : 'guideChevron';
                        document.getElementById(chevronId).style.transform = 'rotate(180deg)';
                        menu.style.maxHeight = menu.scrollHeight + 'px';
                    }
                });
            }
        }
        // ==========================================
        // 5. KHỞI ĐỘNG (CHẠY NGAY KHI VÀO TRANG)
        // ==========================================
        renderKanbanBoard();
        applyUIPermissions();
        initSortableColumns();
        loadBoardState();
        initializeBranchManager('document');
        initializeBranchManager('guide');
        initializeTeamSelector();
        initializeSelectableNav();
        initializeSelectableMembers();
        initializeProfileCard();
        initializeCurrentUserProfile();
        toggleAccordion('trackingMenu', 'trackingChevron');
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        const inlineDesc = document.getElementById('inlineDesc');
        if (inlineDesc) {
            inlineDesc.addEventListener('input', function () {
                autoResize(this);
            });
        }
    </script>
</body>

</html>
